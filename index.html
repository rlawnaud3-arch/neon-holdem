  }
  document.getElementById('venue-grid').innerHTML = html;

  if (career.bankroll >= WIN_GOAL) {
    showModal(`<h2 style="text-align:center;">🏆 게임 클리어!</h2>
      <p style="text-align:center;font-size:18px;">$${career.bankroll.toLocaleString()}을 모았습니다!</p>
      <p style="text-align:center;color:#aaa;">홀덤펍에서 시작해 트라이튼 하이스테이크까지... 진짜 챔피언이군요.</p>
      <div style="text-align:center;margin-top:20px;"><button onclick="closeModal()">닫기</button>
      <button onclick="resetCareer();closeModal();" class="btn-primary">새 도전 시작</button></div>`);
  }
}

// ===================== Game State =====================
let state = null;

// ===================== Generate Opponents =====================
function pickPersonality(mix) {
  const rand = Math.random();
  let acc = 0;
  for (const [type, prob] of Object.entries(mix)) {
    acc += prob;
    if (rand < acc) return type;
  }
  return Object.keys(mix)[0];
}

function generateOpponents(venue) {
  const namePool = (venue.useKoreanNames ? KOREAN_NAMES : FOREIGN_NAMES).slice();
  for (let i = namePool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [namePool[i], namePool[j]] = [namePool[j], namePool[i]];
  }
  const opponents = [];
  for (let i = 0; i < venue.seats - 1; i++) {
    const personalityType = pickPersonality(venue.mix);
    const skill = venue.skillRange[0] + Math.random() * (venue.skillRange[1] - venue.skillRange[0]);
    opponents.push({
      name: namePool[i] || ('Player' + (i+2)),
      isHuman: false,
      personalityType, skill, tilt: 0,
      stack: venue.buyIn, buyInsTotal: venue.buyIn,
      cards: [], folded: false, allIn: false,
      currentBet: 0, totalBet: 0,
      hasActed: false, busted: false,
      handResult: null, lastWonAmount: 0
    });
  }
  // FAMOUS PLAYER spawn chance
  const famous = trySpawnFamous(venue);
  if (famous) {
    const replaceIdx = Math.floor(Math.random() * opponents.length);
    opponents[replaceIdx] = famous;
    // Show announcement after table renders
    setTimeout(() => showFamousAnnouncement(famous.famousData), 800);
  }
  return opponents;
}

// ===================== Enter Venue =====================
function enterVenue(venueId) {
  const venue = VENUES.find(v => v.id === venueId);
  if (!venue) return;
  if (career.bankroll < venue.buyIn) return alert('자금 부족');

  career.bankroll -= venue.buyIn;
  saveCareer();

  const you = {
    name: career.playerName || '나', isHuman: true,
    personalityType: 'HUMAN', skill: 1, tilt: 0,
    stack: venue.buyIn, buyInsTotal: venue.buyIn,
    cards: [], folded: false, allIn: false,
    currentBet: 0, totalBet: 0, hasActed: false, busted: false, handResult: null
  };
  const players = [you, ...generateOpponents(venue)];

  state = {
    venue, players, bb: venue.bb, sb: venue.sb,
    pot: 0, deck: [], communityCards: [],
    street: 'preHand', currentPlayerIdx: -1,
    dealerIdx: -1, sbIdx: -1, bbIdx: -1,
    currentBet: 0, lastRaiseSize: venue.bb,
    handNumber: 0, log: [],
    winners: null, sessionPnL: 0,
    sessionInvested: venue.buyIn
  };

  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('venue-name').textContent = venue.name;
  document.getElementById('blinds-display').textContent = '$' + venue.sb + '/$' + venue.bb;

  // Sync BGM icon + auto switch to venue-appropriate track
  setTimeout(() => {
    updateBgmIcon();
    autoSwitchVenueBGM(venue.id);
  }, 100);

  // Onboarding: first venue entry
  checkTutorial('venue_first');

  newHand();
}

function leaveTable() {
  if (state.street !== 'preHand' && state.street !== 'showdown' && state.street !== 'handover') {
    if (!confirm('진행 중인 핸드가 있습니다. 떠나면 자동 폴드됩니다. 계속하시겠습니까?')) return;
  }
  // Return your stack to bankroll
  const me = state.players[0];
  career.bankroll += me.stack;
  const sessionPnL = (career.bankroll) - (career.bankroll - me.stack + state.sessionInvested);
  // Track stats
  if (sessionPnL > career.biggestWin) career.biggestWin = sessionPnL;
  if (-sessionPnL > career.biggestLoss) career.biggestLoss = -sessionPnL;
  saveCareer();

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'block';
  state = null;
  renderLobby();
}

// ===================== Hand Lifecycle =====================
function activeCount() { return state.players.filter(p => !p.busted).length; }

function nextActiveIdx(start) {
  let idx = (start + 1) % state.players.length;
  for (let i = 0; i < state.players.length; i++) {
    if (!state.players[idx].busted) return idx;
    idx = (idx + 1) % state.players.length;
  }
  return start;
}

function nextToActIdx(start) {
  let idx = (start + 1) % state.players.length;
  for (let i = 0; i < state.players.length; i++) {
    const p = state.players[idx];
    if (!p.busted && !p.folded && !p.allIn) return idx;
    idx = (idx + 1) % state.players.length;
  }
  return -1;
}

function firstToActIdxPostflop() {
  let idx = (state.dealerIdx + 1) % state.players.length;
  for (let i = 0; i < state.players.length; i++) {
    const p = state.players[idx];
    if (!p.busted && !p.folded && !p.allIn) return idx;
    idx = (idx + 1) % state.players.length;
  }
  return -1;
}

function newHand() {
  // Handle busted AI players — realistic cash game behavior:
  //   70% chance: same player rebuys (most common in real cash)
  //   25% chance: new player takes the seat
  //   5% chance: famous player walks in
  // Tilted players (high tilt) more likely to leave (new player comes in)
  for (let i = 1; i < state.players.length; i++) {
    const p = state.players[i];
    if (!p.busted) continue;

    // Famous players never rebuy (they "leave on a loss")
    if (p.isFamous) {
      handleNewSeat(i, true);
      continue;
    }

    const rand = Math.random();
    // Adjust rebuy chance based on tilt (high tilt = more likely to leave)
    const rebuyChance = 0.70 - (p.tilt * 0.30);  // 0.40 ~ 0.70

    if (rand < 0.05) {
      // 5% — Famous player walks in
      const famous = trySpawnFamous(state.venue);
      if (famous) {
        state.players[i] = famous;
        setTimeout(() => showFamousAnnouncement(famous.famousData), 600);
        log(`<i>★ ${famous.name} 자리에 입장!</i>`, true, true);
        continue;
      }
    }

    if (rand < rebuyChance) {
      // Same player rebuys
      p.busted = false;
      p.stack = state.venue.buyIn;
      p.buyInsTotal = (p.buyInsTotal || state.venue.buyIn) + state.venue.buyIn;
      p.tilt = Math.min(1, p.tilt + 0.15);  // tilted after losing
      p.folded = false;
      p.allIn = false;
      p.lastAction = null;
      log(`💵 ${p.name} 리바이 ($${state.venue.buyIn.toLocaleString()})`, false, true);
    } else {
      // New player sits down
      handleNewSeat(i, false);
    }
  }

  function handleNewSeat(seatIdx, isFamousLeft) {
    const namePool = state.venue.useKoreanNames ? KOREAN_NAMES : FOREIGN_NAMES;
    const personalityType = pickPersonality(state.venue.mix);
    const skill = state.venue.skillRange[0] + Math.random() * (state.venue.skillRange[1] - state.venue.skillRange[0]);
    state.players[seatIdx] = {
      name: namePool[Math.floor(Math.random() * namePool.length)] + (Math.random() < 0.3 ? Math.floor(Math.random()*99) : ''),
      isHuman: false, personalityType, skill, tilt: 0,
      stack: state.venue.buyIn, buyInsTotal: state.venue.buyIn,
      cards: [], folded: false, allIn: false,
      currentBet: 0, totalBet: 0, hasActed: false, busted: false, handResult: null,
      lastWonAmount: 0
    };
    const prefix = isFamousLeft ? '👑 (전설 떠남)' : '🆕';
    log(`${prefix} 새 플레이어 ${state.players[seatIdx].name} 입장 (${PERSONALITIES[personalityType].label})`, false, true);
  }

  // Check if you're busted
  if (state.players[0].stack === 0) {
    return showRebuyModal();
  }

  if (activeCount() < 2) {
    alert('상대가 부족합니다. 로비로 돌아갑니다.');
    leaveTable();
    return;
  }

  state.handNumber++;
  career.handsPlayed++;
  checkHandMilestone();
  checkBeginner30Milestone();
  checkDayProgress();
  state.pot = 0;
  state.communityCards = [];
  state.deck = createDeck();
  state.currentBet = 0;
  state.lastRaiseSize = state.bb;
  state.winners = null;

  for (const p of state.players) {
    p.cards = []; p.folded = false; p.allIn = false;
    p.currentBet = 0; p.totalBet = 0; p.hasActed = false;
    p.handResult = null;
    p.lastAction = null;
    if (p.busted) p.folded = true;
    // Tilt natural decay
    p.tilt = Math.max(0, p.tilt * 0.92);
  }

  if (state.dealerIdx === -1) {
    state.dealerIdx = Math.floor(Math.random() * state.players.length);
  } else {
    state.dealerIdx = nextActiveIdx(state.dealerIdx);
  }

  let firstActIdx;
  if (activeCount() === 2) {
    state.sbIdx = state.dealerIdx;
    state.bbIdx = nextActiveIdx(state.dealerIdx);
    firstActIdx = state.sbIdx;
  } else {
    state.sbIdx = nextActiveIdx(state.dealerIdx);
    state.bbIdx = nextActiveIdx(state.sbIdx);
    firstActIdx = nextActiveIdx(state.bbIdx);
  }

  postBlind(state.sbIdx, state.sb);
  postBlind(state.bbIdx, state.bb);
  state.currentBet = state.bb;

  // Per-hand tracking for stats and review
  state.handTrack = {
    preflopRaises: 0,                  // 0=blinds only, 1=open, 2=3bet, 3=4bet
    preflopAggressorIdx: state.bbIdx,  // last raiser preflop
    preflopCallersBeforePlayer: 0,     // for squeeze detection
    playerVolPreflop: false,
    playerRaisedPreflop: false,
    player3BetOpp: false,
    player3Bet: false,
    player4BetOpp: false,
    player4Bet: false,
    playerWasPFRaiser: false,          // was player last preflop aggressor
    playerCbetOpp: false,
    playerCbet: false,
    playerCheckedThisStreet: false,    // for check-raise detection
    playerStartStack: state.players[0].stack,
    handStartPot: 0,                   // pot at start (just blinds)
    decisions: []                      // log of player's decisions for review
  };

  sfxShuffle();  // Hand-start shuffle sound

  const ac = activeCount();
  for (let round = 0; round < 2; round++) {
    let idx = nextActiveIdx(state.dealerIdx);
    for (let i = 0; i < ac; i++) {
      state.players[idx].cards.push(state.deck.pop());
      setTimeout(() => sfxDeal(), 400 + (round * ac + i) * 50);
      idx = nextActiveIdx(idx);
    }
  }

  // Beginner's luck — first 30 hands get boosted starting-hand frequency
  applyBeginnerLuck();

  state.street = 'preflop';
  state.currentPlayerIdx = firstActIdx;

  log(`<b>핸드 #${state.handNumber}</b> — 딜러: ${state.players[state.dealerIdx].name}`, true);
  saveCareer();
  render();
  scheduleNextAction();
}

function postBlind(idx, amount) {
  const p = state.players[idx];
  const blindAmt = Math.min(amount, p.stack);
  p.stack -= blindAmt;
  p.currentBet = blindAmt;
  p.totalBet = blindAmt;
  state.pot += blindAmt;
  if (p.stack === 0) p.allIn = true;
}

function showRebuyModal() {
  const me = state.players[0];
  const canRebuy = career.bankroll >= state.venue.buyIn;
  let html = `<h2>💸 스택을 모두 잃었습니다</h2>
    <p>이 세션에서 $${state.sessionInvested.toLocaleString()} 투자, 현재 자금: <b>$${career.bankroll.toLocaleString()}</b></p>`;
  if (canRebuy) {
    html += `<p>$${state.venue.buyIn.toLocaleString()} 추가 바이인하시겠습니까?</p>
      <div style="text-align:center;margin-top:16px;">
        <button class="btn-success" onclick="rebuyMe()">리바이 ($${state.venue.buyIn.toLocaleString()})</button>
        <button class="btn-danger" onclick="closeModal();leaveTable();">테이블 떠나기</button>
      </div>`;
  } else {
    html += `<p style="color:#e74c3c;">자금이 부족해 더 이상 이 베뉴에서 플레이할 수 없습니다.</p>
      <div style="text-align:center;margin-top:16px;">
        <button class="btn-primary" onclick="closeModal();leaveTable();">로비로 돌아가기</button>
      </div>`;
  }
  showModal(html);
}

function rebuyMe() {
  career.bankroll -= state.venue.buyIn;
  state.sessionInvested += state.venue.buyIn;
  state.players[0].stack = state.venue.buyIn;
  state.players[0].buyInsTotal += state.venue.buyIn;
  saveCareer();
  closeModal();
  newHand();
}

// ===================== Player Actions =====================
function setLastAction(p, text, type) {
  p.lastAction = { text, type, ts: Date.now() };
}

function flashScreen(type) {
  // Big visual feedback for impactful actions
  const f = document.createElement('div');
  f.className = `action-flash flash-${type}`;
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 600);
}

function actFold() {
  const p = state.players[state.currentPlayerIdx];
  trackOpportunities(p);
  if (p.isHuman) {
    recordDecision(p, 'fold', 0);
    career.stats.folds++;
  }
  p.folded = true;
  p.hasActed = true;
  setLastAction(p, '폴드', 'fold');
  log(`${p.name} 폴드`);
  sfxFold();
  if (p.isHuman) updateChallengeProgress('fold');
  trackAIMemory(p, 'fold');
  advanceTurn();
}

function actCheckCall() {
  const p = state.players[state.currentPlayerIdx];
  const toCall = state.currentBet - p.currentBet;
  trackOpportunities(p);
  let actionLabel;

  if (toCall <= 0) {
    actionLabel = '체크';
    if (p.isHuman) {
      career.stats.checks++;
      state.handTrack.playerCheckedThisStreet = true;
      recordDecision(p, 'check', 0);
    }
    setLastAction(p, '체크', 'check');
    log(`${p.name} 체크`);
    sfxCheck();
  } else {
    const callAmt = Math.min(toCall, p.stack);
    p.stack -= callAmt;
    p.currentBet += callAmt;
    p.totalBet += callAmt;
    state.pot += callAmt;
    actionLabel = '콜';
    if (p.isHuman) {
      career.stats.calls++;
      recordDecision(p, 'call', callAmt);
      if (state.street === 'preflop') {
        state.handTrack.playerVolPreflop = true;
      }
    }
    if (state.street === 'preflop' && state.handTrack.preflopRaises >= 1) {
      state.handTrack.preflopCallersBeforePlayer++;
    }
    if (p.stack === 0) {
      p.allIn = true;
      setLastAction(p, `콜 $${callAmt.toLocaleString()} 올인`, 'allin');
      log(`${p.name} 콜 $${callAmt.toLocaleString()} (올인)`);
    } else {
      setLastAction(p, `콜 $${callAmt.toLocaleString()}`, 'call');
      log(`${p.name} 콜 $${callAmt.toLocaleString()}`);
    }
    const seatIdx = state.players.indexOf(p);
    setTimeout(() => animateChipsToPot(seatIdx, callAmt), 50);
  }
  p.hasActed = true;
  advanceTurn();
}

function actRaise(totalBetTarget) {
  const p = state.players[state.currentPlayerIdx];
  const prevCurrentBet = state.currentBet;
  const additional = totalBetTarget - p.currentBet;
  if (additional <= 0) return alert('현재 베팅보다 높은 금액을 입력해주세요');
  if (additional > p.stack) {
    if (p.isHuman) return alert('칩이 부족합니다');
    totalBetTarget = p.currentBet + p.stack;
  }
  const realAdditional = totalBetTarget - p.currentBet;
  if (totalBetTarget < state.currentBet + state.lastRaiseSize && realAdditional !== p.stack) {
    if (p.isHuman) return alert(`최소 레이즈: $${(state.currentBet + state.lastRaiseSize).toLocaleString()}`);
    totalBetTarget = state.currentBet + state.lastRaiseSize;
  }
  const finalAdd = Math.min(totalBetTarget - p.currentBet, p.stack);
  const finalTotal = p.currentBet + finalAdd;

  const raiseSize = finalTotal - state.currentBet;
  trackOpportunities(p);

  // Determine poker term for this action
  let actionLabel;
  if (state.street === 'preflop') {
    state.handTrack.preflopRaises++;
    if (state.handTrack.preflopRaises === 1) actionLabel = '오픈 레이즈';
    else if (state.handTrack.preflopRaises === 2) {
      // Squeeze detection: 3-bet after open + caller(s)
      actionLabel = state.handTrack.preflopCallersBeforePlayer > 0 ? '스퀴즈 (3-bet)' : '쓰리벳';
    }
    else if (state.handTrack.preflopRaises === 3) actionLabel = '포벳';
    else if (state.handTrack.preflopRaises === 4) actionLabel = '파이브벳';
    else actionLabel = '레이즈';
    state.handTrack.preflopAggressorIdx = state.players.indexOf(p);
    state.handTrack.preflopCallersBeforePlayer = 0;  // reset for next player
  } else {
    if (prevCurrentBet === 0) {
      // First bet on this street
      const wasPFR = state.handTrack.preflopAggressorIdx === state.players.indexOf(p);
      const isOOPvsPFR = !wasPFR && state.street === 'flop';
      if (wasPFR && state.street === 'flop') actionLabel = 'C-벳';
      else if (isOOPvsPFR) actionLabel = '동크 베팅';
      else actionLabel = '베팅';
    } else {
      // Check-raise detection
      if (p.isHuman && state.handTrack.playerCheckedThisStreet) actionLabel = '체크레이즈';
      else actionLabel = '레이즈';
    }
  }

  // Track player stats
  if (p.isHuman) {
    if (prevCurrentBet === 0) career.stats.bets++;
    else career.stats.raises++;
    if (state.street === 'preflop') {
      state.handTrack.playerVolPreflop = true;
      state.handTrack.playerRaisedPreflop = true;
      if (state.handTrack.preflopRaises === 2) state.handTrack.player3Bet = true;
      if (state.handTrack.preflopRaises === 3) state.handTrack.player4Bet = true;
    } else if (state.street === 'flop' && prevCurrentBet === 0 &&
               state.handTrack.preflopAggressorIdx === 0) {
      state.handTrack.playerCbet = true;
    }
    recordDecision(p, actionLabel, finalTotal);
  }

  p.stack -= finalAdd;
  p.currentBet += finalAdd;
  p.totalBet += finalAdd;
  state.pot += finalAdd;
  if (raiseSize >= state.lastRaiseSize) state.lastRaiseSize = raiseSize;
  state.currentBet = p.currentBet;

  if (p.stack === 0) {
    p.allIn = true;
    setLastAction(p, `${actionLabel} $${finalTotal.toLocaleString()} 올인`, 'allin');
    log(`${p.name} ${actionLabel} 올인 $${finalTotal.toLocaleString()}`, true);
    sfxAllIn();
    flashScreen('allin');
  } else {
    setLastAction(p, `${actionLabel} $${finalTotal.toLocaleString()}`, 'raise');
    log(`${p.name} ${actionLabel} $${finalTotal.toLocaleString()}`);
    sfxRaise();
    flashScreen('raise');
  }
  if (p.isHuman) {
    updateChallengeProgress('raise');
    if (p.allIn) updateChallengeProgress('allin');
  }
  trackAIMemory(p, 'raise');
  setTimeout(() => animateChipsToPot(state.players.indexOf(p), finalAdd), 50);
  for (const other of state.players) {
    if (other !== p && !other.folded && !other.busted && !other.allIn) other.hasActed = false;
  }
  p.hasActed = true;
  advanceTurn();
}

function actAllIn() {
  const p = state.players[state.currentPlayerIdx];
  const totalBet = p.currentBet + p.stack;
  if (totalBet > state.currentBet) {
    actRaise(totalBet);
  } else {
    const additional = p.stack;
    p.currentBet += additional;
    p.totalBet += additional;
    state.pot += additional;
    p.stack = 0;
    p.allIn = true;
    p.hasActed = true;
    setLastAction(p, `올인 $${p.currentBet.toLocaleString()}`, 'allin');
    log(`${p.name} 올인 $${p.currentBet.toLocaleString()}`, true);
    setTimeout(() => animateChipsToPot(state.players.indexOf(p), additional), 50);
    advanceTurn();
  }
}

function advanceTurn() {
  const stillIn = state.players.filter(p => !p.folded && !p.busted);
  if (stillIn.length === 1) return endHandByFold(stillIn[0]);
  if (isBettingRoundComplete()) return advanceStreet();
  const next = nextToActIdx(state.currentPlayerIdx);
  if (next === -1) return advanceStreet();
  state.currentPlayerIdx = next;
  render();
  scheduleNextAction();
}

function isBettingRoundComplete() {
  const playersWhoCanAct = state.players.filter(p => !p.folded && !p.busted && !p.allIn);
  if (playersWhoCanAct.length === 0) return true;
  for (const p of playersWhoCanAct) {
    if (!p.hasActed) return false;
    if (p.currentBet !== state.currentBet) return false;
  }
  return true;
}

function advanceStreet() {
  for (const p of state.players) {
    p.currentBet = 0;
    p.hasActed = false;
    p.lastAction = null;
  }
  state.currentBet = 0;
  state.lastRaiseSize = state.bb;
  // Reset check-raise tracking for new street
  if (state.handTrack) state.handTrack.playerCheckedThisStreet = false;

  // Mark C-bet opportunity when entering flop (player was last preflop aggressor)
  if (state.handTrack && state.street === 'preflop' &&
      state.handTrack.preflopAggressorIdx === 0 &&
      !state.players[0].folded && !state.players[0].allIn) {
    state.handTrack.playerCbetOpp = true;
  }

  if (state.street === 'preflop') {
    state.deck.pop();
    state.communityCards.push(state.deck.pop(), state.deck.pop(), state.deck.pop());
    state.street = 'flop';
    log('--- 플랍 ---', true);
  } else if (state.street === 'flop') {
    state.deck.pop();
    state.communityCards.push(state.deck.pop());
    state.street = 'turn';
    log('--- 턴 ---', true);
  } else if (state.street === 'turn') {
    state.deck.pop();
    state.communityCards.push(state.deck.pop());
    state.street = 'river';
    log('--- 리버 ---', true);
  } else if (state.street === 'river') {
    return showdown();
  }

  const canAct = state.players.filter(p => !p.folded && !p.busted && !p.allIn);
  if (canAct.length <= 1) {
    state.currentPlayerIdx = -1;
    render();
    setTimeout(advanceStreet, 1100);
    return;
  }
  state.currentPlayerIdx = firstToActIdxPostflop();
  render();
  scheduleNextAction();
}

function endHandByFold(winner) {
  const won = state.pot;
  // Apply winBonus from special ability (e.g., Kenney's Money Master)
  const eff = getActiveEffects();
  const bonus = (winner.isHuman && eff.winBonus) ? Math.round(won * eff.winBonus) : 0;
  winner.stack += won + bonus;
  winner.lastWonAmount = won + bonus;
  if (bonus > 0) log(`💰 머니 마스터 보너스 +$${bonus.toLocaleString()}`, true);
  log(`${winner.name} 핸드 승리! $${won.toLocaleString()} (모두 폴드)`, true);
  state.winners = [{player: winner, amount: won + bonus, hand: null, byFold: true}];
  state.pot = 0;
  state.street = 'handover';

  // === ITEM DROP (winner is human) ===
  if (winner.isHuman) {
    tryHandWinDrop();
  }

  // === ABILITY XP ===
  if (winner.isHuman) {
    gainXP('bluff', 8, '블러프로 폴드 유도');
    gainXP('pressure', 5, '압박 성공');
  } else {
    // Player lost — gain mental XP
    const me = state.players[0];
    if (me && !me.busted && me.folded) {
      gainXP('mental', 3, '손실 후 안정');
      gainXP('patience', 2, '폴드 판단');
    }
  }

  applyTiltEffects();
  finalizeHandStats();
  checkFamousBust();

  // Challenge tracking
  if (winner.isHuman) {
    updateChallengeProgress('win');
    if (won >= state.bb * 50) updateChallengeProgress('big_pot_win');
    updateChallengeProgress('bluff_win');  // fold-win = bluff
  }
  // Boss check
  checkBossClear();

  render();
  showWinnerAnnouncement(state.winners, true);
  if (winner.isHuman) { sfxWin(); duckBGM(2000); }
  else sfxLose();

  // === STREAK + IMPACT MOMENTS ===
  const me0 = state.players[0];
  if (me0 && !me0.busted) {
    const humanWon = winner === me0;
    updateStreak(humanWon);
    // Big pot impact: >= 50BB
    if (humanWon && won >= (state.bb || 10) * 50) {
      triggerBigPotImpact(won, true);
    }
  }

  setTimeout(autoNextHand, 2500);
}

function showdown() {
  state.street = 'showdown';
  while (state.communityCards.length < 5) {
    state.deck.pop();
    state.communityCards.push(state.deck.pop());
  }
  const pots = calculatePots();
  const contenders = state.players.filter(p => !p.folded && !p.busted);
  for (const p of contenders) p.handResult = bestHand([...p.cards, ...state.communityCards]);

  log('--- 쇼다운 ---', true);
  for (const p of contenders) {
    log(`${p.name}: [${cardText(p.cards[0])} ${cardText(p.cards[1])}] → ${HAND_NAMES[p.handResult[0]]}`);
  }

  state.winners = [];
  for (const pot of pots) {
    const eligible = pot.eligiblePlayers.filter(p => !p.folded);
    if (eligible.length === 0) continue;
    if (eligible.length === 1) {
      eligible[0].stack += pot.amount;
      eligible[0].lastWonAmount = (eligible[0].lastWonAmount || 0) + pot.amount;
      state.winners.push({player: eligible[0], amount: pot.amount, hand: eligible[0].handResult});
      log(`${eligible[0].name} 팟 $${pot.amount.toLocaleString()} 획득`, true);
      continue;
    }
    let bestVal = null;
    for (const p of eligible) {
      if (bestVal === null || compareHands(p.handResult, bestVal) < 0) bestVal = p.handResult;
    }
    const winners = eligible.filter(p => compareHands(p.handResult, bestVal) === 0);
    const share = Math.floor(pot.amount / winners.length);
    const remainder = pot.amount - share * winners.length;
    for (let i = 0; i < winners.length; i++) {
      const w = winners[i];
      const amt = share + (i === 0 ? remainder : 0);
      w.stack += amt;
      w.lastWonAmount = (w.lastWonAmount || 0) + amt;
      state.winners.push({player: w, amount: amt, hand: w.handResult});
      log(`${w.name} 팟 $${amt.toLocaleString()} 획득 — ${HAND_NAMES[w.handResult[0]]}`, true);
    }
  }
  state.pot = 0;

  // === ITEM DROP if player wins showdown ===
  const meWonShowdown = state.players[0] && state.winners?.some(w => w.player === state.players[0]);
  if (meWonShowdown) tryHandWinDrop();

  // === ABILITY XP for showdown ===
  const me = state.players[0];
  if (me && !me.busted) {
    if (state.winners.some(w => w.player === me)) {
      gainXP('insight', 5, '쇼다운 승리');
      gainXP('exploit', 3, '밸류 획득');
      // Apply winBonus
      const eff = getActiveEffects();
      if (eff.winBonus) {
        const myWin = state.winners.filter(w => w.player === me).reduce((s,w) => s + w.amount, 0);
        const bonus = Math.round(myWin * eff.winBonus);
        if (bonus > 0) {
          me.stack += bonus;
          log(`💰 머니 마스터 보너스 +$${bonus.toLocaleString()}`, true);
        }
      }
    } else if (!me.folded) {
      gainXP('mental', 4, '쇼다운 패배 후 회복');
    } else {
      gainXP('patience', 3, '약한 핸드 폴드');
    }
  }

  applyTiltEffects();
  finalizeHandStats();
  checkFamousBust();

  // Challenges
  if (me && !me.busted && !me.folded) {
    updateChallengeProgress('showdown');
    if (meWonShowdown) {
      updateChallengeProgress('win');
      const myWin = state.winners.filter(w => w.player === me).reduce((s,w) => s + w.amount, 0);
      if (myWin >= state.bb * 50) updateChallengeProgress('big_pot_win');
      if (me.handResult) {
        if (me.handResult[0] === 5) updateChallengeProgress('made_straight');
        if (me.handResult[0] === 6) updateChallengeProgress('made_flush');
        if (me.handResult[0] >= 7) updateChallengeProgress('made_fullhouse');
      }
    }
  }
  // Boss check
  checkBossClear();

  render();
  showWinnerAnnouncement(state.winners, false);
  if (meWonShowdown) { sfxWin(); duckBGM(2500); }
  else if (me && !me.folded && !me.busted) sfxLose();

  // === STREAK + IMPACT MOMENTS (showdown) ===
  if (me && !me.busted && !me.folded) {
    updateStreak(meWonShowdown);
    const myWinAmt = state.winners.filter(w => w.player === me).reduce((s, w) => s + w.amount, 0);
    // Big pot: >= 50BB
    if (meWonShowdown && myWinAmt >= (state.bb || 10) * 50) {
      triggerBigPotImpact(myWinAmt, true);
    }
    // Full house or better: sparkles
    if (meWonShowdown && me.handResult && me.handResult[0] >= 7) {
      triggerFullHouseImpact();
    }
  }

  setTimeout(autoNextHand, 4000);
}

function calculatePots() {
  const pots = [];
  const contributors = state.players.filter(p => p.totalBet > 0).map(p => ({player: p, contributed: p.totalBet}));
  if (contributors.length === 0) return pots;
  const levels = [...new Set(contributors.map(c => c.contributed))].sort((a,b) => a-b);
  let prev = 0;
  for (const level of levels) {
    const layer = level - prev;
    const inThisLayer = contributors.filter(c => c.contributed >= level);
    const amount = layer * inThisLayer.length;
    if (amount > 0) pots.push({amount, eligiblePlayers: inThisLayer.map(c => c.player)});
    prev = level;
  }
  return pots;
}

// ===================== Tilt System =====================
function applyTiltEffects() {
  for (const p of state.players) {
    if (p.busted || p.isHuman) continue;
    const personality = PERSONALITIES[p.personalityType];
    const lostThisHand = p.totalBet - (p.lastWonAmount || 0);
    const wonThisHand = (p.lastWonAmount || 0) - p.totalBet;
    if (lostThisHand > 30 * state.bb) {
      // big loss → tilt
      p.tilt = Math.min(1, p.tilt + 0.25 * personality.tiltSus);
    } else if (lostThisHand > 10 * state.bb) {
      p.tilt = Math.min(1, p.tilt + 0.1 * personality.tiltSus);
    }
    if (wonThisHand > 50 * state.bb) {
      p.tilt = Math.max(0, p.tilt - 0.15);
    }
    p.lastWonAmount = 0;
  }
  // Mark busted AI
  for (const p of state.players) {
    if (p.stack === 0 && !p.allIn) p.busted = true;
  }
}

function autoNextHand() {
  // Avoid auto-progressing during modal
  if (document.getElementById('modal-container').innerHTML !== '') return;
  newHand();
}

// ===================== AI Decision =====================
function aiDecide(p) {
  const personality = PERSONALITIES[p.personalityType];
  const tilt = p.tilt;

  // Beginner's luck: weaken AI slightly during first 30 hands
  const luck = getBeginnerLuck();
  const skill = Math.max(0.1, p.skill - luck.aiSkillPenalty);

  let strength;
  if (state.street === 'preflop') {
    strength = preflopStrength(p.cards);
    // Position adjustment
    const posFactor = getPositionFactor(p);
    strength = strength * posFactor;
  } else {
    strength = postflopStrength(p.cards, state.communityCards);
  }

  // Tilt: overvalue hands, loosen up
  const tiltedStrength = strength + (tilt * 25);

  // Skill: less skilled = more noise (mistakes)
  const noiseRange = (1 - skill) * 35;
  const noise = (Math.random() - 0.5) * noiseRange * 2;
  let effStrength = tiltedStrength + noise;

  // Even pros sometimes have moments
  if (skill > 0.85 && Math.random() < 0.05) effStrength += (Math.random() - 0.5) * 20;

  // Thresholds adjusted by tilt
  const callThr = personality.callThr - (tilt * 12);
  const raiseThr = personality.raiseThr - (tilt * 18);

  const toCall = state.currentBet - p.currentBet;
  const potOdds = toCall > 0 ? toCall / (state.pot + toCall) : 0;
  const goodPotOdds = potOdds > 0 && potOdds < 0.22;

  // Bluff? (reduced during beginner period to make play more predictable)
  const bluffFreq = personality.bluffFreq * (1 - luck.aiBluffPenalty);
  const bluffMaybe = Math.random() < (bluffFreq + tilt * 0.25);
  const isBluff = bluffMaybe && effStrength < 35 && state.street !== 'preflop';

  // Decision branches
  if (effStrength > raiseThr || (isBluff && p.stack > 0)) {
    const target = aiBetSize(p, personality, effStrength, isBluff);
    if (target > p.currentBet + p.stack) {
      // Use all-in
      return doAllIn(p);
    }
    if (target <= state.currentBet) {
      // Just call
      return doCheckCall(p);
    }
    // Make sure target meets min raise
    const minRaiseTotal = state.currentBet + state.lastRaiseSize;
    const finalTarget = Math.max(target, Math.min(minRaiseTotal, p.currentBet + p.stack));
    return doRaise(p, finalTarget);
  } else if (effStrength > callThr || toCall === 0 || (goodPotOdds && effStrength > callThr - 18)) {
    return doCheckCall(p);
  } else {
    if (toCall === 0) return doCheckCall(p);
    return doFold(p);
  }
}

function getPositionFactor(p) {
  const idx = state.players.indexOf(p);
  const dealerIdx = state.dealerIdx;
  const totalPlayers = state.players.filter(x => !x.busted).length;
  // Distance from dealer (0 = dealer, higher = earlier position)
  let dist = (idx - dealerIdx + state.players.length) % state.players.length;
  if (dist > totalPlayers / 2) dist = totalPlayers - dist;
  // Late position (close to dealer) gets boost
  if (dist <= 1) return 1.15;
  if (dist <= 2) return 1.05;
  if (dist >= totalPlayers - 2) return 0.9;
  return 1.0;
}

function aiBetSize(p, personality, strength, isBluff) {
  const potNow = state.pot + (state.currentBet - p.currentBet);
  const lowSkill = p.skill < 0.5;  // pub/early-seoul level

  if (state.street === 'preflop') {
    let mult;
    if (state.currentBet === state.bb) {
      // Open raise size — beginners raise smaller (2-2.5x)
      if (lowSkill) {
        mult = personality.aggression < 0.4 ? 2 : 2.5;  // mostly limp-friendly
      } else {
        mult = personality.aggression < 0.3 ? 2.5 :
               personality.aggression < 0.7 ? 3.0 : 3.5;
      }
      // Rare MANIAC big raise — now much less extreme and rarer
      if (p.personalityType === 'MANIAC' && Math.random() < 0.1) {
        mult = 4 + Math.random() * 3;  // 4-7x BB (was 8-18x)
      }
      return Math.min(state.bb * mult, p.currentBet + p.stack);
    } else {
      // 3-bet — beginners barely 3-bet
      mult = lowSkill ? 2.5 : (personality.aggression < 0.5 ? 2.8 : 3.3);
      return Math.min(state.currentBet * mult, p.currentBet + p.stack);
    }
  }
  // Postflop
  let frac;
  if (isBluff) frac = 0.4 + Math.random() * 0.2;
  else if (strength > 90) frac = 0.7 + Math.random() * 0.2;
  else if (strength > 75) frac = 0.55 + Math.random() * 0.15;
  else if (strength > 60) frac = 0.45;
  else frac = 0.33;
  frac *= (0.85 + personality.aggression * 0.3);

  // Low-skill cash game caution — beginners mini-bet a lot, rarely overbet
  if (lowSkill) {
    frac = Math.min(frac, 0.55);
    // Beginners also sometimes "donk" a small min-bet
    if (Math.random() < 0.15) frac = 0.25 + Math.random() * 0.15;
  }

  const betAmount = Math.max(state.bb, Math.floor(potNow * frac));
  return p.currentBet + betAmount;
}

function doFold(p) { state.currentPlayerIdx = state.players.indexOf(p); actFold(); }
function doCheckCall(p) { state.currentPlayerIdx = state.players.indexOf(p); actCheckCall(); }
function doRaise(p, target) { state.currentPlayerIdx = state.players.indexOf(p); actRaise(target); }
function doAllIn(p) { state.currentPlayerIdx = state.players.indexOf(p); actAllIn(); }

// ===================== Action Scheduler =====================
let aiThinkingTimer = null;
function scheduleNextAction() {
  if (aiThinkingTimer) { clearTimeout(aiThinkingTimer); aiThinkingTimer = null; }
  if (state.currentPlayerIdx < 0) return;
  const p = state.players[state.currentPlayerIdx];
  if (p.isHuman) return;
  const personality = PERSONALITIES[p.personalityType];
  // Faster thinking: 300-1000ms (was 600-2600ms)
  const baseTime = 300 + (1 - personality.aggression) * 500;
  const thinkTime = baseTime + Math.random() * 300;
  aiThinkingTimer = setTimeout(() => { aiDecide(p); }, thinkTime);
}

// ===================== Rendering =====================
function cardHTML(card, hidden = false, isPlayerCard = false) {
  if (!card) return '<div class="card placeholder"></div>';
  if (hidden) {
    // Custom card back for player's hand
    if (isPlayerCard && career.cardBack && CARD_BACKS[career.cardBack]) {
      return `<div class="card back" style="${cardBackPreview(career.cardBack)};color:transparent;"></div>`;
    }
    return '<div class="card back"></div>';
  }
  const colorClass = card.color === 'red' ? 'red' : '';
  return `<div class="card ${colorClass}">
    <div class="corner-tl">${card.rank}<br>${card.suit}</div>
    <div class="center-suit">${card.suit}</div>
    <div class="corner-br">${card.rank}<br>${card.suit}</div>
  </div>`;
}
function cardText(card) { return card.rank + card.suit; }

// Full position name table based on active player count
const POSITIONS_BY_COUNT = {
  9: ['BTN','SB','BB','UTG','UTG+1','UTG+2','LJ','HJ','CO'],
  8: ['BTN','SB','BB','UTG','UTG+1','LJ','HJ','CO'],
  7: ['BTN','SB','BB','UTG','LJ','HJ','CO'],
  6: ['BTN','SB','BB','UTG','HJ','CO'],
  5: ['BTN','SB','BB','UTG','CO'],
  4: ['BTN','SB','BB','UTG'],
  3: ['BTN','SB','BB'],
  2: ['BTN/SB','BB']
};

function getPositionName(seatIdx) {
  if (!state || state.dealerIdx === undefined) return '';
  // Build active seat order starting from BTN going clockwise
  let order = [];
  let curr = state.dealerIdx;
  for (let i = 0; i < state.players.length; i++) {
    if (!state.players[curr].busted) order.push(curr);
    curr = (curr + 1) % state.players.length;
  }
  const myDist = order.indexOf(seatIdx);
  if (myDist === -1) return '';
  const positions = POSITIONS_BY_COUNT[order.length] || POSITIONS_BY_COUNT[6];
  return positions[myDist] || '';
}

function getPositionTag(idx) {
  const pos = getPositionName(idx);
  if (!pos) return '';
  let cls = 'pos-default';
  if (pos === 'BTN' || pos === 'BTN/SB') cls = 'pos-btn';
  else if (pos === 'SB' || pos === 'BB') cls = 'pos-blind';
  else if (pos === 'CO' || pos === 'HJ') cls = 'pos-late';
  else if (pos === 'LJ' || pos.startsWith('UTG+')) cls = 'pos-middle';
  else if (pos === 'UTG') cls = 'pos-early';
  return `<span class="position-tag ${cls}">${pos}</span>`;
}

function getStatusTag(p, idx) {
  if (p.busted) return '<span class="status-tag" style="background:#7f8c8d;color:#fff;">탈락</span>';
  if (state.winners && state.winners.some(w => w.player === p))
    return '<span class="status-tag status-winner">WIN</span>';
  if (p.folded) return '<span class="status-tag status-fold">폴드</span>';
  if (p.allIn) return '<span class="status-tag status-allin">올인</span>';
  if (idx === state.currentPlayerIdx && state.street !== 'showdown' && state.street !== 'handover') {
    if (!p.isHuman) return '<span class="status-tag status-thinking">...</span>';
    return '<span class="status-tag status-active">차례</span>';
  }
  return '';
}

function getTiltDisplay(p) {
  if (p.isHuman || p.tilt < 0.15) return '';
  if (p.tilt < 0.35) return '<span class="tilt-meter">😤</span>';
  if (p.tilt < 0.65) return '<span class="tilt-meter">😡</span>';
  return '<span class="tilt-meter">🤬 틸트</span>';
}

function describeHand(handResult) {
  if (!handResult) return '';
  const rank = handResult[0];
  const RN = {14:'A',13:'K',12:'Q',11:'J',10:'10',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};
  const v = (val) => RN[val] || val;
  switch (rank) {
    case 9:
      if (handResult[1] === 14) return '로얄 플러시';
      return `스트레이트 플러시 ${v(handResult[1])}-high`;
    case 8: return `포카드 ${v(handResult[1])}`;
    case 7: return `풀하우스 ${v(handResult[1])} over ${v(handResult[2])}`;
    case 6: return `플러시 ${v(handResult[1])}-high`;
    case 5: return `스트레이트 ${v(handResult[1])}-high`;
    case 4: return `트리플 ${v(handResult[1])}`;
    case 3: return `투페어 ${v(handResult[1])}-${v(handResult[2])}`;
    case 2: return `원페어 ${v(handResult[1])}`;
    case 1: return `${v(handResult[1])} 하이`;
  }
  return HAND_NAMES[rank] || '';
}

function getHandTier(handResult) {
  if (!handResult) return '';
  const rank = handResult[0];
  if (rank >= 7) return 'tier-elite';      // Full house+ : platinum
  if (rank >= 4) return 'tier-strong';     // Trips+ : strong
  return '';
}

function renderPlayerCard(p, i) {
  const isCurrent = i === state.currentPlayerIdx && state.street !== 'showdown' && state.street !== 'handover';
  const showCards = state.street === 'showdown' && !p.folded && !p.busted && p.cards.length > 0;
  const isShowdownWinner = (state.street === 'showdown' || state.street === 'handover') &&
                          state.winners && state.winners.some(w => w.player === p);
  let cardsHTML = '';
  if (showCards || p.isHuman) {
    if (p.cards.length > 0 && !p.folded) {
      // Strong hand glow for player only
      let strongClass = '';
      if (p.isHuman && state.street && state.street !== 'preHand') {
        let myS = 0;
        if (state.street === 'preflop') myS = preflopStrength(p.cards);
        else if (state.communityCards.length >= 3) myS = postflopStrength(p.cards, state.communityCards);
        if (myS >= 75) strongClass = ' strong-hand';
      }
      cardsHTML = `<div class="seat-cards${strongClass}" style="display:flex;gap:4px;margin-top:6px;">
        ${cardHTML(p.cards[0])}${cardHTML(p.cards[1])}</div>`;
    }
  } else if (!p.busted && p.cards.length > 0 && !p.folded) {
    cardsHTML = `<div style="display:flex;gap:4px;margin-top:6px;">
      <div class="card-mini"></div><div class="card-mini"></div></div>`;
  }
  const handLabel = (showCards && p.handResult)
    ? `<div class="hand-badge ${getHandTier(p.handResult)}">${describeHand(p.handResult)}</div>` : '';
  const personalityLabel = !p.isHuman ?
    (p.isFamous && p.famousData
      ? `<div class="personality-tag" style="color:var(--gold-bright);background:rgba(245,200,73,0.15);">${p.famousData.country} ${p.famousData.flair}</div>`
      : `<div class="personality-tag">${PERSONALITIES[p.personalityType].emoji} ${PERSONALITIES[p.personalityType].label}</div>`) : '';

  // Insight read bubble — only show during active hand, not for self/folded/busted/showdown
  let readBubble = '';
  if (!p.isHuman && !p.folded && !p.busted && p.cards && p.cards.length > 0 &&
      state.street !== 'showdown' && state.street !== 'handover' && state.street !== 'preHand') {
    const read = computeRead(p);
    if (read) {
      const eyeIcon = read.confidence === 'very_high' ? '🎯' : '🔍';
      readBubble = `<div class="read-bubble read-${read.confidence}" title="통찰력 ${getEffectiveAbility('insight')} vs 포커페이스 ${getAIAbility(p,'pokerFace')} (Δ${read.gap})">
        <span class="read-eye-prefix">${eyeIcon}</span>${read.text}
      </div>`;
    }
  }

  // Player avatar — human uses protagonist image, AI uses personality emoji only
  let nameDisplay = p.name;
  let avatarHTML = '';
  if (p.isHuman) {
    avatarHTML = getProtagonistAvatarHTML(32, true);
  }

  const timerBar = isCurrent ? '<div class="timer-bar" style="animation-delay:0s;"></div>' : '';

  return `<div class="player-card ${isCurrent?'current':''} ${p.folded&&!p.busted?'folded':''} ${p.busted?'busted':''} ${p.isHuman?'you':''} ${p.isFamous?'famous':''} ${isShowdownWinner?'showdown-winner':''}" style="position:relative;">
    ${timerBar}
    <div class="player-name" style="${p.isHuman ? 'display:flex;align-items:center;gap:8px;' : ''}">
      ${avatarHTML}
      <span>${nameDisplay}${getPositionTag(i)}</span>
      ${getStatusTag(p, i)}
    </div>
    ${p.lastAction ? `<div class="action-bubble action-${p.lastAction.type}">${p.lastAction.text}</div>` : ''}
    <div class="player-info">$${p.stack.toLocaleString()}</div>
    ${p.currentBet > 0 ? `<div class="player-bet">$${p.currentBet.toLocaleString()}</div>` : ''}
    ${personalityLabel}${getTiltDisplay(p)}
    ${readBubble}
    ${cardsHTML}${handLabel}
  </div>`;
}

function render() {

  // Day badge + mini progress

  const dayMini = document.getElementById('day-mini-progress');
  if (dayBadge) {
    const prog = getDayProgress();
    dayBadge.textContent = `DAY ${prog.day}`;
    if (dayMini) dayMini.textContent = `${prog.handInDay}/${prog.totalInDay > 99999 ? '∞' : prog.totalInDay} (${Math.round(prog.pct)}%)`;
  }
  document.getElementById('pot-amount').textContent = state.pot.toLocaleString();
  document.getElementById('bankroll-game').textContent = career.bankroll.toLocaleString();

  const streetMap = {preflop:'프리플랍', flop:'플랍', turn:'턴', river:'리버', showdown:'쇼다운', handover:'핸드 종료', preHand:'준비 중'};
  document.getElementById('street-display').textContent = streetMap[state.street] || '';

  let ccHTML = '';
  for (let i = 0; i < 5; i++) ccHTML += cardHTML(state.communityCards[i]);
  document.getElementById('community-cards').innerHTML = ccHTML;

  let handStatus = '';
  if (state.street === 'showdown' || state.street === 'handover') {

      handStatus = '🏆 ' + state.winners.map(w =>
        `${w.player.name} +$${w.amount.toLocaleString()}` + (w.hand ? ` (${HAND_NAMES[w.hand[0]]})` : '')
      ).join(' / ');
    }
  } else if (state.currentPlayerIdx >= 0) {

    `<div class="log-entry ${l.highlight?'highlight':''} ${l.system?'system':''}">${l.text}</div>`

function renderActionPanel() {
  const panel = document.getElementById('action-panel');
  if (state.street === 'showdown' || state.street === 'handover') {
    panel.innerHTML = `<div class="action-message">
      <strong>핸드 종료</strong>
      잠시 후 다음 핸드 시작...
    </div>
    <button class="btn-primary" onclick="showHandReview(0)" style="padding:8px 14px;">📖 리뷰</button>
    <button class="btn-success" onclick="renderStatsDashboard()" style="padding:8px 14px;">📊 통계</button>`;
    return;
  }
  if (state.currentPlayerIdx < 0) {
    panel.innerHTML = `<div class="action-message"><strong>🎲 카드 진행 중</strong>올인 상황 — 보드 자동 오픈</div>`;
    return;
  }
  const p = state.players[state.currentPlayerIdx];
  if (!p.isHuman) {
    panel.innerHTML = `<div class="action-message">
      <strong>▶ ${p.name} 생각 중...</strong>
      ${PERSONALITIES[p.personalityType].emoji} ${PERSONALITIES[p.personalityType].desc}
    </div>`;
    return;
  }

  const toCall = state.currentBet - p.currentBet;
  const minRaiseTotal = state.currentBet + state.lastRaiseSize;
  const allInTotal = p.currentBet + p.stack;
  const defaultRaise = Math.min(minRaiseTotal, allInTotal);

  // Compute hand strength for glow
  let myStrength = 0;
  if (p.cards.length === 2) {
    if (state.street === 'preflop') myStrength = preflopStrength(p.cards);
    else if (state.communityCards.length >= 3) myStrength = postflopStrength(p.cards, state.communityCards);
  }
  const isStrong = myStrength >= 75;

  let html = `<button class="action-btn action-btn-fold" onclick="actFold()">
    폴드<span class="shortcut">F</span>
  </button>
  <button class="action-btn action-btn-call" onclick="actCheckCall()">
    ${toCall <= 0 ? '체크' : '콜 $' + Math.min(toCall, p.stack).toLocaleString()}<span class="shortcut">C</span>
  </button>`;

  if (p.stack > toCall) {
    html += `<button class="action-btn action-btn-raise" onclick="actRaise(parseInt(document.getElementById('raise-amount').value))">
      ${state.currentBet === 0 ? '베팅' : '레이즈'} $<span id="raise-display">${defaultRaise.toLocaleString()}</span><span class="shortcut">R</span>
    </button>`;
  }

  html += `<button class="action-btn action-btn-allin" onclick="actAllIn()">
    올인 $${allInTotal.toLocaleString()}<span class="shortcut">A</span>
  </button>`;

  if (p.stack > toCall) {
    html += `<div class="raise-controls">
      <button class="raise-btn-step" onclick="stepRaise(-state.bb)">−</button>
      <input type="number" id="raise-amount" value="${defaultRaise}" min="${Math.min(minRaiseTotal, allInTotal)}" max="${allInTotal}" step="${state.bb}" oninput="document.getElementById('raise-display').textContent=parseInt(this.value).toLocaleString()" style="width:90px;text-align:center;">
      <button class="raise-btn-step" onclick="stepRaise(state.bb)">+</button>
    </div>`;

    const halfPot = Math.max(minRaiseTotal, p.currentBet + Math.floor((state.pot + toCall) / 2));
    const fullPot = Math.max(minRaiseTotal, p.currentBet + state.pot + toCall);
    const twoXBB = Math.max(minRaiseTotal, state.bb * 2);
    const threeXBB = Math.max(minRaiseTotal, state.bb * 3);
    html += `<div class="quick-bets">
      ${state.street==='preflop' && state.currentBet===state.bb ?
        `<button onclick="setRaise(${Math.min(twoXBB, allInTotal)})">2x</button>
         <button onclick="setRaise(${Math.min(threeXBB, allInTotal)})">3x</button>` : ''}
      <button onclick="setRaise(${Math.min(halfPot, allInTotal)})">½팟</button>
      <button onclick="setRaise(${Math.min(fullPot, allInTotal)})">팟</button>
    </div>`;
  }
  panel.innerHTML = html;
}

function stepRaise(delta) {
  const input = document.getElementById('raise-amount');
  if (!input) return;
  const cur = parseInt(input.value) || 0;
  const min = parseInt(input.min) || 0;
  const max = parseInt(input.max) || 999999999;
  const nv = Math.max(min, Math.min(max, cur + delta));
  input.value = nv;
  const disp = document.getElementById('raise-display');
  if (disp) disp.textContent = nv.toLocaleString();
}

function setRaise(amt) {
  const input = document.getElementById('raise-amount');
  if (input) {
    input.value = amt;
    const disp = document.getElementById('raise-display');
    if (disp) disp.textContent = parseInt(amt).toLocaleString();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!state || !state.players || state.currentPlayerIdx < 0) return;
  const p = state.players[state.currentPlayerIdx];
  if (!p || !p.isHuman) return;
  // Skip if user is typing in an input
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  const key = e.key.toLowerCase();
  if (key === 'f') { e.preventDefault(); actFold(); }
  else if (key === 'c') { e.preventDefault(); actCheckCall(); }
  else if (key === 'r') {
    e.preventDefault();
    const input = document.getElementById('raise-amount');
    if (input) actRaise(parseInt(input.value));
  }
  else if (key === 'a') { e.preventDefault(); actAllIn(); }
});

// ===================== Stats Tracking =====================
function trackOpportunities(p) {
  // Called right before a player acts. Track opportunities they had.
  if (!p.isHuman || !state.handTrack) return;
  if (state.street === 'preflop') {
    // 3-bet opportunity: facing first raise, hasn't acted yet
    if (state.handTrack.preflopRaises === 1 && !state.handTrack.player3BetOpp) {
      state.handTrack.player3BetOpp = true;
    }
    // 4-bet opportunity: facing 3-bet
    if (state.handTrack.preflopRaises === 2 && !state.handTrack.player4BetOpp) {
      state.handTrack.player4BetOpp = true;
    }
  }
}

function recordDecision(p, action, amount) {
  if (!p.isHuman || !state.handTrack) return;
  const strength = state.street === 'preflop'
    ? preflopStrength(p.cards)
    : postflopStrength(p.cards, state.communityCards);
  const toCall = state.currentBet - p.currentBet;
  const potOdds = toCall > 0 ? toCall / (state.pot + toCall) : 0;
  const recommendation = getRecommendation(p, strength, toCall, potOdds);
  const decision = {
    street: state.street,
    action, amount,
    strength: Math.round(strength),
    toCall, potOdds,
    pot: state.pot,
    community: [...state.communityCards],
    recommendation,
    judgment: judgeDecision(action, recommendation, strength, toCall, potOdds)
  };
  state.handTrack.decisions.push(decision);
  recordDecisionForHistory(decision);
}

function getRecommendation(p, strength, toCall, potOdds) {
  if (state.street === 'preflop') {
    const raises = state.handTrack.preflopRaises;
    if (raises === 0) {
      // No raises yet (limped pot or you're first)
      if (strength >= 65) return {action: '오픈 레이즈', reason: `강한 핸드 (강도 ${Math.round(strength)})`};
      if (strength >= 45) return {action: '오픈/체크', reason: '평균 핸드, 포지션 고려'};
      return {action: '폴드/체크', reason: '약한 핸드'};
    } else if (raises === 1) {
      // Facing open raise
      if (strength >= 80) return {action: '쓰리벳', reason: `프리미엄 핸드 (강도 ${Math.round(strength)})`};
      if (strength >= 60) return {action: '콜', reason: '플레이어블 핸드'};
      return {action: '폴드', reason: '레이즈에 약함'};
    } else if (raises === 2) {
      // Facing 3-bet
      if (strength >= 88) return {action: '포벳/올인', reason: `프리미엄 (강도 ${Math.round(strength)})`};
      if (strength >= 75) return {action: '콜', reason: '3-bet에 콜할 수 있는 핸드'};
      return {action: '폴드', reason: '3-bet에 폴드 권장'};
    } else {
      if (strength >= 92) return {action: '콜/올인', reason: '4-bet에도 강한 핸드'};
      return {action: '폴드', reason: '4-bet+ 액션은 너트만'};
    }
  }
  // Postflop
  if (toCall === 0) {
    if (strength >= 75) return {action: '베팅 (밸류)', reason: `강한 핸드 (강도 ${Math.round(strength)})`};
    if (strength >= 55) return {action: '베팅 (밸류/프로텍션)', reason: '미디엄 강도, 보호 필요'};
    if (strength >= 35) return {action: '체크', reason: '약한 핸드, 컨트롤'};
    return {action: '체크/폴드', reason: '드로우 없는 약한 핸드'};
  } else {
    if (strength >= 85) return {action: '레이즈', reason: `너트급 (강도 ${Math.round(strength)})`};
    if (strength >= 60) return {action: '콜', reason: '강한 핸드, 콜링'};
    if (strength >= 40 && potOdds < 0.3) return {action: '콜', reason: `좋은 팟 오즈 (${(potOdds*100).toFixed(0)}%)`};
    if (potOdds < 0.15 && strength >= 25) return {action: '콜', reason: '아주 좋은 팟 오즈'};
    return {action: '폴드', reason: `핸드 약함, 팟 오즈 ${(potOdds*100).toFixed(0)}%`};
  }
}

function judgeDecision(action, rec, strength, toCall, potOdds) {
  // Returns 'good', 'ok', 'bad'
  const recAction = rec.action.toLowerCase();
  const myAction = action.toLowerCase();
  // Match types
  const isAggressive = ['오픈 레이즈','쓰리벳','포벳','파이브벳','레이즈','베팅','C-벳','동크 베팅','체크레이즈','스퀴즈 (3-bet)'].some(a => action.includes(a.toLowerCase()) || a.toLowerCase().includes(myAction));
  const isPassive = action === 'check' || action === 'call' || action === '체크' || action === '콜';
  const isFold = action === 'fold' || action === '폴드';
  const recAggr = ['레이즈','베팅','벳','쓰리벳','포벳','오픈','3-bet','4-bet'].some(a => recAction.includes(a));
  const recPassive = ['콜','체크'].some(a => recAction.includes(a)) && !recAggr;
  const recFold = recAction.includes('폴드');

  if (isFold && recFold) return 'good';
  if (isFold && recPassive && strength < 50) return 'ok';
  if (isFold && recAggr) return 'bad';
  if (isPassive && recPassive) return 'good';
  if (isPassive && recFold) return strength > 30 ? 'ok' : 'bad';
  if (isPassive && recAggr) return strength > 60 ? 'ok' : 'good';
  if (isAggressive && recAggr) return 'good';
  if (isAggressive && recPassive) return 'ok';
  if (isAggressive && recFold) return strength < 25 ? 'good' : 'bad';
  return 'ok';
}

function finalizeHandStats() {
  if (!state.handTrack) return;
  const me = state.players[0];
  const ht = state.handTrack;
  const stats = career.stats;

  stats.totalTrackedHands++;
  if (ht.playerVolPreflop) stats.vpipHands++;
  if (ht.playerRaisedPreflop) stats.pfrHands++;
  if (ht.player3BetOpp) stats.threeBetOpps++;
  if (ht.player3Bet) stats.threeBets++;
  if (ht.player4BetOpp) stats.fourBetOpps++;
  if (ht.player4Bet) stats.fourBets++;
  if (ht.playerCbetOpp) stats.cbetOpps++;
  if (ht.playerCbet) stats.cbets++;

  // WTSD / W$SD
  if (state.street === 'showdown' && !me.folded && !me.busted) {
    stats.wtsdHands++;
    if (state.winners && state.winners.some(w => w.player === me)) stats.wsdHands++;
  }

  // BB delta
  const stackChange = me.stack - ht.playerStartStack;
  stats.totalBBWon += stackChange / state.bb;
  if (stackChange > 0) {
    stats.handsWon++;
    if (stackChange > stats.biggestPotWon) stats.biggestPotWon = stackChange;
  } else if (stackChange < 0) {
    stats.handsLost++;
    if (-stackChange > stats.biggestPotLost) stats.biggestPotLost = -stackChange;
  }

  // Venue history
  const vId = state.venue.id;
  if (!stats.venueHistory[vId]) stats.venueHistory[vId] = {hands: 0, pnl: 0};
  stats.venueHistory[vId].hands++;
  stats.venueHistory[vId].pnl += stackChange;

  // Save hand for review (last 30)
  career.recentHands.unshift({
    handNumber: state.handNumber,
    venueName: state.venue.name,
    venueId: state.venue.id,
    bb: state.bb,
    cards: me.cards.length === 2 ? [{rank: me.cards[0].rank, suit: me.cards[0].suit, color: me.cards[0].color}, {rank: me.cards[1].rank, suit: me.cards[1].suit, color: me.cards[1].color}] : null,
    community: state.communityCards.map(c => ({rank: c.rank, suit: c.suit, color: c.color})),
    decisions: ht.decisions,
    result: stackChange,
    finalHand: me.handResult ? HAND_NAMES[me.handResult[0]] : null,
    folded: me.folded,
    timestamp: Date.now()
  });
  if (career.recentHands.length > 30) career.recentHands.length = 30;
  saveCareer();
}

    html += `<div style="display:flex;gap:8px;justify-content:center;margin:12px 0;">

    html += `<div style="text-align:center;color:#ccc;font-size:13px;">홀카드 (강도: ${preflopStrength(h.cards.map(c => ({...c, value: RANK_VALUES[c.rank]})))}/100)</div>`;
  }

  if (h.community.length > 0) {

  } else {
    const streetMap = {preflop:'프리플랍', flop:'플랍', turn:'턴', river:'리버'};

    for (const d of h.decisions) {

      }

  html += `<div style="margin-top:16px;padding:12px;background:rgba(0,0,0,0.4);border-radius:8px;text-align:center;">

    <div style="font-size:22px;font-weight:700;color:${resultColor};">

// ===================== WINNER ANNOUNCEMENT =====================
function showWinnerAnnouncement(winners, byFold) {
  if (!winners || winners.length === 0) return;
  const overlay = document.createElement('div');
  overlay.className = 'winner-overlay';
  const inner = document.createElement('div');
  inner.className = 'winner-stack';

  // Aggregate by player (in case of multiple pots to same winner)
  const byPlayer = new Map();
  for (const w of winners) {
    const key = w.player;
    if (byPlayer.has(key)) {
      byPlayer.get(key).amount += w.amount;
    } else {
      byPlayer.set(key, { player: w.player, amount: w.amount, hand: w.hand });
    }
  }

  for (const w of byPlayer.values()) {
    const cards = w.player.cards || [];
    const handName = w.hand ? describeHand(w.hand) : null;
    const isFamous = w.player.isFamous;
    const countryFlag = isFamous && w.player.famousData ? w.player.famousData.country : '';
    const famousIcon = isFamous && w.player.famousData ? w.player.famousData.emoji : '';

    let cardsHtml = '';
    if (cards.length === 2) {
      cardsHtml = `<div class="winner-cards-row">${cardHTML(cards[0])}${cardHTML(cards[1])}</div>`;
    }

    const card = document.createElement('div');
    card.className = 'winner-card-big';
    card.innerHTML = `
      <div class="winner-title">🏆 WINNER 🏆</div>
      <div class="winner-name-big">
        ${famousIcon} ${w.player.name} ${countryFlag ? `<span class="country-flag">${countryFlag}</span>` : ''}
      </div>
      ${cardsHtml}
      ${handName ? `<div class="winner-hand-name">${handName}</div>` : ''}
      ${byFold ? `<div class="winner-foldnote">상대 전원 폴드</div>` : ''}
      <div class="winner-amount-big">+$${w.amount.toLocaleString()}</div>
    `;
    inner.appendChild(card);
  }

  // Showdown: also show non-winning hands compactly
  if (!byFold && state) {
    const showdownContenders = state.players.filter(p =>
      !p.folded && !p.busted && p.cards && p.cards.length === 2 && p.handResult
    );
    const winnerSet = new Set(Array.from(byPlayer.values()).map(w => w.player));
    if (showdownContenders.length > byPlayer.size) {
      const handsRow = document.createElement('div');
      handsRow.className = 'showdown-hands';
      // Sort by hand strength
      const sorted = [...showdownContenders].sort((a, b) => compareHands(a.handResult, b.handResult));
      for (const p of sorted) {
        const isWinner = winnerSet.has(p);
        const handName = describeHand(p.handResult);
        const cardA = cardHTML(p.cards[0]);
        const cardB = cardHTML(p.cards[1]);
        const mini = document.createElement('div');
        mini.className = 'showdown-hand-mini' + (isWinner ? ' winner-mini' : '');
        mini.innerHTML = `
          <div class="mini-name">${p.name}</div>
          <div class="mini-cards">${cardA}${cardB}</div>
          <div class="mini-handname">${handName}</div>
        `;
        handsRow.appendChild(mini);
      }
      inner.appendChild(handsRow);
    }
  }

  overlay.appendChild(inner);
  document.body.appendChild(overlay);

  // Animate chips from pot to winner(s)
  for (const w of byPlayer.values()) {
    const seatIdx = state.players.indexOf(w.player);
    animatePotToWinner(seatIdx, w.amount);
  }

  // Play winner sound
  sfxFanfare();

  // Auto-remove (synced with autoNextHand timing — slightly shorter than next-hand timeout)
  const duration = byFold ? 2100 : 3500;
  setTimeout(() => {
    overlay.style.transition = 'opacity 0.4s';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 400);
  }, duration);
}

function animatePotToWinner(toSeatIdx, amount) {
  const seat = document.getElementById('seat-' + toSeatIdx);
  const pot = document.querySelector('.header-pot');
  if (!seat || !pot) return;
  const seatRect = seat.getBoundingClientRect();
  const potRect = pot.getBoundingClientRect();
  const chipCount = Math.min(8, Math.max(3, Math.floor(Math.log10(Math.max(amount, 100)))));
  for (let i = 0; i < chipCount; i++) {
    setTimeout(() => createWinnerChip(potRect, seatRect), 200 + i * 70);
  }
}

function createWinnerChip(fromRect, toRect) {
  const chip = document.createElement('div');
  chip.className = 'flying-chip winning';
  chip.textContent = '◉';
  const startX = fromRect.left + fromRect.width / 2 + (Math.random() - 0.5) * 30;
  const startY = fromRect.top + fromRect.height / 2;
  const endX = toRect.left + toRect.width / 2 + (Math.random() - 0.5) * 20;
  const endY = toRect.top + toRect.height / 2;
  chip.style.left = startX + 'px';
  chip.style.top = startY + 'px';
  document.body.appendChild(chip);
  chip.offsetHeight;
  const dx = endX - startX;
  const dy = endY - startY;
  requestAnimationFrame(() => {
    chip.style.transition = 'transform 0.75s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.75s ease-in';
    chip.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px) scale(1.4)`;
    chip.style.opacity = '0';
  });
  setTimeout(() => chip.remove(), 800);
}

let volBGM = 0.35;
let volSFX = 0.4;
try {
  const vb = localStorage.getItem('holdem-vol-bgm');
  if (vb !== null) volBGM = parseFloat(vb);
  const vs = localStorage.getItem('holdem-vol-sfx');
  if (vs !== null) volSFX = parseFloat(vs);
} catch (e) {}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = volBGM;
    bgmGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();
    sfxGain.gain.value = volSFX;
    sfxGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function setVolume(channel, value) {
  if (channel === 'bgm') {
    volBGM = value;
    if (bgmGain) bgmGain.gain.value = value;
    try { localStorage.setItem('holdem-vol-bgm', value); } catch (e) {}
  } else if (channel === 'sfx') {
    volSFX = value;
    if (sfxGain) sfxGain.gain.value = value;
    try { localStorage.setItem('holdem-vol-sfx', value); } catch (e) {}
  }
}

// Auto-start BGM on first user interaction (browser autoplay policy)
function initAudioOnFirstClick() {
  if (audioInitDone) return;
  audioInitDone = true;
  ensureAudio();
  if (bgmEnabled) scheduleBGMChord();
  updateBgmIcon();
}
document.addEventListener('click', initAudioOnFirstClick);
document.addEventListener('keydown', initAudioOnFirstClick);

function updateBgmIcon() {
  document.querySelectorAll('.chat-icon').forEach(btn => {
    if (btn.title && btn.title.includes('BGM')) {
      btn.textContent = bgmEnabled ? '🔊' : '🔇';
      btn.classList.toggle('playing', bgmEnabled);
    }
  });
}

function toggleBGM() {
  ensureAudio();
  if (bgmEnabled) {
    bgmEnabled = false;
    if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
    if (window.Tone && Tone.Transport) Tone.Transport.pause();
    if (state) log('🔇 BGM OFF', false, true);
  } else {
    bgmEnabled = true;
    if (window.Tone && Tone.Transport && toneSetupDone) {
      Tone.Transport.start();
    } else {
      scheduleBGMChord();
    }
    if (state) log('🔊 BGM ON · 펑키 카지노 라운지 🎷', false, true);
  }
  try { localStorage.setItem('holdem-bgm', bgmEnabled ? '1' : '0'); } catch (e) {}
  updateBgmIcon();
  if (state) render();
}
