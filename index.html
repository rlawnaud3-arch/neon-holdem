  { id: 'pub',     icon: '🍺', name: '홀덤펍 어쿠스틱', desc: '동네 펍 무드 — 어쿠스틱 기타 + 부드러운 베이스 + 브러시' },
  { id: 'vegas',   icon: '🎰', name: '라스베가스 디스코', desc: '70s 펑크 디스코 — 4-on-floor + 신스 스탭 + 슬롯 벨' },
  { id: 'lofi',    icon: '🌙', name: 'Lo-Fi Jazz',     desc: '비닐 크래클 + 워킹베이스 + 브러시 드럼' },
  { id: 'minimal', icon: '🎹', name: '미니멀 피아노',  desc: '집중 모드 — 부드러운 코드만 천천히' }
];
let currentTrack = 'funky';
try {
  const stored = localStorage.getItem('holdem-bgm-track');
  if (stored && BGM_TRACK_LIST.find(t => t.id === stored)) currentTrack = stored;
} catch (e) {}

// === Casino Jazz BGM via Tone.js ===
let toneLoaded = false, toneSetupDone = false;
let tonePiano = null, toneBass = null, toneDrum = null, toneSparkle = null;
let toneChordIdx = 0, toneBeatIdx = 0;
let bgmSynths = [];  // track all synths/effects for disposal

function disposeBGM() {
  try {
    if (window.Tone && Tone.Transport) {
      Tone.Transport.stop();
      Tone.Transport.cancel();
      Tone.Transport.position = 0;
    }
    bgmSynths.forEach(s => { try { s.dispose && s.dispose(); } catch (e) {} });
    bgmSynths = [];
    toneSetupDone = false;
    toneChordIdx = 0;
    toneBeatIdx = 0;
  } catch (e) {}
}

async function changeBGMTrack(trackId) {
  currentTrack = trackId;
  try { localStorage.setItem('holdem-bgm-track', trackId); } catch (e) {}
  if (!bgmEnabled) {
    bgmEnabled = true;
    try { localStorage.setItem('holdem-bgm', '1'); } catch (e) {}
    updateBgmIcon();
  }
  disposeBGM();
  await setupToneBGM();
  if (state) {
    const track = BGM_TRACK_LIST.find(t => t.id === trackId);
    log(`🎵 ${track.icon} ${track.name}`, false, true);
  }
}

function openBGMSettings() {
  const html = `<h3>🎵 BGM 설정</h3>
  <div style="margin:14px 0;padding:14px;background:var(--bg-card-2);border-radius:8px;border:1px solid var(--border);">
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <input type="checkbox" id="bgm-onoff" ${bgmEnabled ? 'checked' : ''} onchange="toggleBGMFromModal(this.checked)">
      <span style="font-weight:700;font-size:15px;">BGM 재생 <span style="color:${bgmEnabled ? 'var(--green)' : 'var(--text-dim)'};font-size:13px;">(${bgmEnabled ? 'ON' : 'OFF'})</span></span>
    </label>
  </div>
  <div style="margin-bottom:8px;font-weight:700;font-size:14px;">트랙 선택</div>
  ${BGM_TRACK_LIST.map(t => `
    <div onclick="changeBGMTrack('${t.id}').then(() => openBGMSettings())"
         style="display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;border:2px solid ${currentTrack === t.id ? 'var(--gold-bright)' : 'var(--border)'};margin:8px 0;border-radius:8px;background:${currentTrack === t.id ? 'rgba(255,217,61,0.08)' : 'transparent'};transition:all 0.15s;">
      <div style="font-size:28px;">${t.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;color:${currentTrack === t.id ? 'var(--gold-bright)' : 'var(--text)'};">${t.name} ${currentTrack === t.id ? '✓' : ''}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${t.desc}</div>
      </div>
    </div>
  `).join('')}
  <div style="text-align:center;margin-top:14px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

function toggleBGMFromModal(checked) {
  if (checked !== bgmEnabled) toggleBGM();
  setTimeout(openBGMSettings, 50); // re-render modal
}

function loadToneJS() {
  if (window.Tone) { toneLoaded = true; return Promise.resolve(); }
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/tone@14.8.49/build/Tone.js';
    s.onload = () => { toneLoaded = true; resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function setupToneBGM() {
  if (toneSetupDone) return;
  await loadToneJS();
  await Tone.start();
  if (currentTrack === 'lofi') setupLofiTrack();
  else if (currentTrack === 'minimal') setupMinimalTrack();
  else if (currentTrack === 'pub') setupPubTrack();
  else if (currentTrack === 'vegas') setupVegasTrack();
  else setupFunkyTrack();
  Tone.Transport.start();
  toneSetupDone = true;
}

function setupFunkyTrack() {
  // === FUNKY CASINO LOUNGE ===
  // Master chain: highpass to keep low end tight, no master lowpass (open & bright)
  const masterHP = new Tone.Filter({ frequency: 55, type: 'highpass', rolloff: -12 }).toDestination();
  const lightVerb = new Tone.Reverb({ decay: 1.4, wet: 0.16 }).connect(masterHP);
  bgmSynths.push(masterHP, lightVerb);

  // === FUNKY BASS === (synth bass, tight pluck)
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.001, decay: 0.18, sustain: 0.25, release: 0.12 },
    filter: { Q: 3, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.001, decay: 0.12, sustain: 0.25, release: 0.2, baseFrequency: 180, octaves: 2.5 }
  }).connect(masterHP);
  toneBass.volume.value = -7;

  // === RHODES ELECTRIC PIANO === (warm FM bell tone)
  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 3.5,
    modulationIndex: 7,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.003, decay: 0.6, sustain: 0.1, release: 0.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.02, decay: 0.4, sustain: 0, release: 0.3 }
  }).connect(lightVerb);
  tonePiano.volume.value = -13;

  // === KICK === (tight, punchy)
  const toneKick = new Tone.MembraneSynth({
    pitchDecay: 0.04,
    octaves: 5,
    envelope: { attack: 0.001, decay: 0.18, sustain: 0, release: 0.25 }
  }).connect(masterHP);
  toneKick.volume.value = -5;

  // === SNARE === (sharp, on 2 & 4)
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.11, sustain: 0 }
  });
  const snareHP = new Tone.Filter({ frequency: 1400, type: 'highpass' });
  toneDrum.chain(snareHP, masterHP);
  toneDrum.volume.value = -14;

  // === HI-HAT === (tight 8th notes)
  const toneHat = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.022, sustain: 0 }
  });
  const hatHP = new Tone.Filter({ frequency: 7000, type: 'highpass' });
  toneHat.chain(hatHP, masterHP);
  toneHat.volume.value = -24;

  // === VIBRAPHONE === (bright bell for melody)
  toneSparkle = new Tone.FMSynth({
    harmonicity: 2,
    modulationIndex: 9,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.003, decay: 0.9, sustain: 0.05, release: 1.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.01, decay: 0.6, sustain: 0, release: 0.7 }
  }).connect(lightVerb);
  toneSparkle.volume.value = -17;

  // Tempo: medium funk groove (Ocean's Eleven feel)
  Tone.Transport.bpm.value = 110;

  // === 4-bar progression: Am7 → Dm7 → G7 → Cmaj7 ===
  const PROG = [
    { bass: ['A1','A1','E2','A1','C2','A1','G2','A1'], chord: ['C4','E4','G4'] },     // Am7
    { bass: ['D2','D2','A2','D2','F2','D2','C3','D2'], chord: ['F4','A4','C5'] },     // Dm7
    { bass: ['G1','G1','D2','G1','B1','G1','F2','G1'], chord: ['B3','D4','F4'] },     // G7
    { bass: ['C2','C2','G2','C2','E2','C2','A2','C2'], chord: ['E4','G4','B4'] }      // Cmaj7
  ];

  let funkBar = 0;
  let funk8th = 0;
  let kick16 = 0;

  // FUNKY BASS — every 8th note
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    toneBass.triggerAttackRelease(bar.bass[funk8th % 8], '16n', time, 0.75);
    funk8th++;
    if (funk8th % 8 === 0) funkBar++;
  }, '8n');

  // KICK — beat 1, "and of 2", beat 3 (syncopated funk pattern)
  // 16th positions: 0, 6, 10
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const pos = kick16 % 16;
    if (pos === 0 || pos === 6 || pos === 10) {
      toneKick.triggerAttackRelease('C1', '8n', time, 0.95);
    }
    kick16++;
  }, '16n');

  // SNARE — beats 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    toneDrum.triggerAttackRelease('16n', time, 0.75);
  }, '2n', '4n');

  // HI-HAT — every 8th note (with slight accent on downbeats)
  let hatIdx = 0;
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const vel = (hatIdx % 2 === 0) ? 0.7 : 0.45;
    toneHat.triggerAttackRelease('32n', time, vel);
    hatIdx++;
  }, '8n');

  // RHODES CHORD STAB — beat 1 of each bar
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '8n', time, 0.55);
  }, '1m');

  // RHODES STAB — "and of 2" (typical funk syncopation)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time, 0.4);
  }, '1m', '4n.');

  // VIBRAPHONE — sparse melody (30% chance per half-note)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || Math.random() > 0.32) return;
    // A minor pentatonic + jazz colors
    const notes = ['A4','C5','D5','E5','G5','A5','C6','E5','B4','D5'];
    toneSparkle.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '8n', time, 0.55);
  }, '2n');

  // Track synths for disposal
  bgmSynths.push(toneBass, tonePiano, toneKick, toneDrum, toneHat, toneSparkle);
}

function setupLofiTrack() {
  // === LO-FI LATE NIGHT JAZZ ===
  // Lo-fi character: subtle vinyl crackle + tape wow + muffled highs
  const masterHP = new Tone.Filter({ frequency: 75, type: 'highpass' }).toDestination();
  const masterLP = new Tone.Filter({ frequency: 4000, type: 'lowpass', Q: 0.5 }).connect(masterHP);
  const lofiVerb = new Tone.Reverb({ decay: 3, wet: 0.3 }).connect(masterLP);
  bgmSynths.push(masterHP, masterLP, lofiVerb);

  // Upright bass — woody, mellow walking line
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.03, decay: 0.4, sustain: 0.4, release: 0.5 },
    filter: { Q: 1.5, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.03, decay: 0.4, sustain: 0.35, release: 0.5, baseFrequency: 130, octaves: 2.5 }
  }).connect(masterHP);
  toneBass.volume.value = -10;
  bgmSynths.push(toneBass);

  // Soft FM piano — slightly muffled
  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 1.4,
    modulationIndex: 2.5,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.025, decay: 1.3, sustain: 0.15, release: 2 },
    modulation: { type: 'triangle' },
    modulationEnvelope: { attack: 0.03, decay: 0.7, sustain: 0, release: 0.5 }
  }).connect(lofiVerb);
  tonePiano.volume.value = -13;
  bgmSynths.push(tonePiano);

  // Brushed snare
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.003, decay: 0.1, sustain: 0 }
  });
  const brushHP = new Tone.Filter({ frequency: 4500, type: 'highpass' });
  toneDrum.chain(brushHP, masterLP);
  toneDrum.volume.value = -22;
  bgmSynths.push(toneDrum, brushHP);

  // Vinyl noise bed
  const vinylNoise = new Tone.Noise({ type: 'pink' }).start();
  const vinylHP = new Tone.Filter({ frequency: 1500, type: 'highpass' });
  const vinylGain = new Tone.Gain(0.015);
  vinylNoise.chain(vinylHP, vinylGain, Tone.Destination);
  bgmSynths.push(vinylNoise, vinylHP, vinylGain);

  // Random vinyl pops
  const vinylPop = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.007, sustain: 0 }
  });
  const popFilter = new Tone.Filter({ frequency: 2500, type: 'bandpass', Q: 2 });
  vinylPop.chain(popFilter, Tone.Destination);
  vinylPop.volume.value = -34;
  const popInterval = setInterval(() => {
    if (bgmEnabled && currentTrack === 'lofi' && Math.random() < 0.4) {
      try { vinylPop.triggerAttackRelease('64n'); } catch (e) {}
    }
  }, 700);
  bgmSynths.push(vinylPop, popFilter, { dispose: () => clearInterval(popInterval) });

  Tone.Transport.bpm.value = 72;

  // Progression: Am9 → Dm11 → G13 → Cmaj9
  const PROG = [
    { bass: ['A1','E2','C2','G2'], chord: ['C3','E3','G3','B3'] },
    { bass: ['D2','A2','F2','C3'], chord: ['F3','A3','C4','E4'] },
    { bass: ['G1','D2','B1','F2'], chord: ['F3','A3','B3','E4'] },
    { bass: ['C2','G2','E2','B2'], chord: ['E3','G3','B3','D4'] }
  ];

  // Piano chord on beat 1
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    const ch = PROG[toneChordIdx % PROG.length];
    tonePiano.triggerAttackRelease(ch.chord, '2n.', time, 0.55);
  }, '1m');

  // Walking bass on quarter notes
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    const ch = PROG[toneChordIdx % PROG.length];
    toneBass.triggerAttackRelease(ch.bass[toneBeatIdx % 4], '4n', time, 0.6);
    toneBeatIdx++;
    if (toneBeatIdx % 4 === 0) toneChordIdx++;
  }, '4n');

  // Brush swish on 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    toneDrum.triggerAttackRelease('16n', time, 0.6);
  }, '2n', '4n');
}

function setupMinimalTrack() {
  // === MINIMAL PIANO — focus mode ===
  const highPass = new Tone.Filter({ frequency: 120, type: 'highpass' }).toDestination();
  const lightVerb = new Tone.Reverb({ decay: 2.5, wet: 0.22 }).connect(highPass);
  bgmSynths.push(highPass, lightVerb);

  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 2,
    modulationIndex: 3,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.04, decay: 1.6, sustain: 0.1, release: 2.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.05, decay: 0.5, sustain: 0, release: 0.3 }
  }).connect(lightVerb);
  tonePiano.volume.value = -14;
  bgmSynths.push(tonePiano);

  Tone.Transport.bpm.value = 60;

  // Spacious progression
  const PROG = [
    ['C3','E3','G3','B3'],
    ['A2','C3','E3','G3'],
    ['F2','A2','C3','E3'],
    ['G2','B2','D3','F3']
  ];
  let pIdx = 0;

  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'minimal') return;
    tonePiano.triggerAttackRelease(PROG[pIdx % PROG.length], '1n', time, 0.42);
    pIdx++;
  }, '2m');
}

// ===================== 🍺 HOLDEM PUB ACOUSTIC =====================
function setupPubTrack() {
  // Warm intimate pub feel — acoustic guitar arpeggios, woody bass, brushed drums
  const masterHP = new Tone.Filter({ frequency: 80, type: 'highpass' }).toDestination();
  const masterLP = new Tone.Filter({ frequency: 7000, type: 'lowpass', Q: 0.4 }).connect(masterHP);
  const pubVerb = new Tone.Reverb({ decay: 2.2, wet: 0.22 }).connect(masterLP);
  bgmSynths.push(masterHP, masterLP, pubVerb);

  // ACOUSTIC GUITAR (PluckSynth — sounds remarkably guitar-like)
  tonePiano = new Tone.PolySynth(Tone.PluckSynth, {
    attackNoise: 0.6,
    dampening: 4200,
    resonance: 0.85
  }).connect(pubVerb);
  tonePiano.volume.value = -8;
  bgmSynths.push(tonePiano);

  // WOODY UPRIGHT BASS
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.02, decay: 0.5, sustain: 0.4, release: 0.6 },
    filter: { Q: 1.2, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.02, decay: 0.5, sustain: 0.3, release: 0.5, baseFrequency: 150, octaves: 2 }
  }).connect(masterHP);
  toneBass.volume.value = -8;
  bgmSynths.push(toneBass);

  // BRUSH SNARE (pink noise — softer than white)
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.005, decay: 0.14, sustain: 0 }
  });
  const brushBP = new Tone.Filter({ frequency: 3500, type: 'bandpass', Q: 1.2 });
  toneDrum.chain(brushBP, masterLP);
  toneDrum.volume.value = -20;
  bgmSynths.push(toneDrum, brushBP);

  // SOFT VIBE — light melody sparkle
  toneSparkle = new Tone.FMSynth({
    harmonicity: 2.5,
    modulationIndex: 4,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.01, decay: 0.7, sustain: 0.1, release: 1.2 }
  }).connect(pubVerb);
  toneSparkle.volume.value = -22;
  bgmSynths.push(toneSparkle);

  Tone.Transport.bpm.value = 92;

  // Warm folk progression: C → Am → F → G (vi-IV-V in C major loops well in pub mood)
  const PROG = [
    { root: 'C', bass: ['C2','G2','E2','G2'], chord: ['E3','G3','C4','E4'], top: 'C5' },
    { root: 'Am', bass: ['A1','E2','C2','E2'], chord: ['C3','E3','A3','C4'], top: 'A4' },
    { root: 'F', bass: ['F1','C2','A1','C2'], chord: ['F3','A3','C4','F4'], top: 'F5' },
    { root: 'G', bass: ['G1','D2','B1','D2'], chord: ['G3','B3','D4','G4'], top: 'G5' }
  ];

  let pubBar = 0;
  let pubBeat = 0;

  // GUITAR ARPEGGIO — pluck each chord tone in sequence (1-3-5-3 pattern, 8th notes)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    const ch = PROG[pubBar % PROG.length].chord;
    const pluckIdx = pubBeat % 8;
    const pattern = [0, 2, 1, 3, 2, 1, 3, 2];
    tonePiano.triggerAttackRelease(ch[pattern[pluckIdx] % ch.length], '8n', time, 0.55);
    pubBeat++;
    if (pubBeat % 8 === 0) pubBar++;
  }, '8n');

  // WALKING BASS — quarter notes (root, 5th, 3rd, 5th)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    const ch = PROG[pubBar % PROG.length].bass;
    toneBass.triggerAttackRelease(ch[Math.floor(pubBeat / 2) % 4], '4n', time, 0.7);
  }, '4n');

  // BRUSH on 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    toneDrum.triggerAttackRelease('16n', time, 0.5);
  }, '2n', '4n');

  // OCCASIONAL VIBE NOTE (sparse melody, 25%)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub' || Math.random() > 0.25) return;
    const notes = ['C5','E5','G5','A5','E5','G4','D5'];
    toneSparkle.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '4n', time, 0.5);
  }, '2n');
}

// ===================== 🎰 LAS VEGAS DISCO =====================
function setupVegasTrack() {
  // 70s disco funk — four-on-floor kick, syncopated bass, brassy stabs, slot bell
  const masterHP = new Tone.Filter({ frequency: 65, type: 'highpass' }).toDestination();
  const discoVerb = new Tone.Reverb({ decay: 1.0, wet: 0.13 }).connect(masterHP);
  bgmSynths.push(masterHP, discoVerb);

  // DISCO BASS — punchy sawtooth with envelope
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.001, decay: 0.12, sustain: 0.3, release: 0.1 },
    filter: { Q: 4, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.001, decay: 0.1, sustain: 0.3, release: 0.15, baseFrequency: 220, octaves: 3 }
  }).connect(masterHP);
  toneBass.volume.value = -6;
  bgmSynths.push(toneBass);

  // BRASSY STAB SYNTH (disco horn) — for the chord stabs
  tonePiano = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity: 1.8,
    oscillator: { type: 'sawtooth' },
    modulation: { type: 'square' },
    envelope: { attack: 0.01, decay: 0.18, sustain: 0.2, release: 0.25 },
    modulationEnvelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.3 }
  }).connect(discoVerb);
  tonePiano.volume.value = -14;
  bgmSynths.push(tonePiano);

  // PUNCHY DISCO KICK
  const discoKick = new Tone.MembraneSynth({
    pitchDecay: 0.05,
    octaves: 6,
    envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.3 }
  }).connect(masterHP);
  discoKick.volume.value = -4;
  bgmSynths.push(discoKick);

  // OPEN HI-HAT (8th notes for disco)
  const discoHat = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.08, sustain: 0 }
  });
  const hatHP = new Tone.Filter({ frequency: 8000, type: 'highpass' });
  discoHat.chain(hatHP, masterHP);
  discoHat.volume.value = -20;
  bgmSynths.push(discoHat, hatHP);

  // SNARE — claps on 2 & 4
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.12, sustain: 0 }
  });
  const snareBP = new Tone.Filter({ frequency: 2000, type: 'bandpass', Q: 1.5 });
  toneDrum.chain(snareBP, masterHP);
  toneDrum.volume.value = -12;
  bgmSynths.push(toneDrum, snareBP);

  // SLOT MACHINE BELL — for rare jackpot sparkle
  toneSparkle = new Tone.FMSynth({
    harmonicity: 8,
    modulationIndex: 12,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.4 }
  }).connect(discoVerb);
  toneSparkle.volume.value = -22;
  bgmSynths.push(toneSparkle);

  Tone.Transport.bpm.value = 122;

  // Disco progression: i-VI-III-VII in A minor (Am - F - C - G) — classic 70s disco
  const PROG = [
    { bass: ['A1','A1','E2','A1','A1','C2','E2','A1'], chord: ['A3','C4','E4'] },
    { bass: ['F1','F1','C2','F1','F1','A1','C2','F1'], chord: ['F3','A3','C4'] },
    { bass: ['C2','C2','G2','C2','C2','E2','G2','C2'], chord: ['C4','E4','G4'] },
    { bass: ['G1','G1','D2','G1','G1','B1','D2','G1'], chord: ['G3','B3','D4'] }
  ];

  let vegasBar = 0;
  let vegas8th = 0;
  let vegas16 = 0;

  // KICK — four-on-floor (every beat)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    discoKick.triggerAttackRelease('C1', '8n', time, 0.95);
  }, '4n');

  // SNARE/CLAP — on 2 & 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    toneDrum.triggerAttackRelease('16n', time, 0.6);
  }, '2n', '4n');

  // HI-HAT — open on offbeats (8th note offbeats)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    discoHat.triggerAttackRelease('16n', time, 0.55);
  }, '4n', '8n');

  // BASS — syncopated octave pattern
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    toneBass.triggerAttackRelease(bar.bass[vegas8th % 8], '16n', time, 0.8);
    vegas8th++;
    if (vegas8th % 8 === 0) vegasBar++;
  }, '8n');

  // BRASSY STAB — on the "and" of beats 1 and 3 (disco syncopation)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time, 0.65);
  }, '2n', '8n');

  // BRASSY STAB — on beat 3
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time + 0.05, 0.45);
  }, '1m', '2n');

  // SLOT MACHINE BELL — random rare jackpot sparkle (~5% per bar)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas' || Math.random() > 0.18) return;
    // Quick bell roll
    const bellNotes = ['C6','E6','G6','C7'];
    bellNotes.forEach((n, i) => {
      try { toneSparkle.triggerAttackRelease(n, '32n', time + i * 0.06, 0.4); } catch (e) {}
    });
  }, '2m');
}

function fallbackBGM() {

  if (!audioCtx || !bgmEnabled) return;
  const chords = [

    osc.type = 'sine';

  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 5;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 8;
  lfo.connect(lfoGain); lfoGain.connect(drone.frequency);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.18, now + 0.4);
  g.gain.linearRampToValueAtTime(0.18, now + 1.2);
  g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
  drone.connect(g); g.connect(sfxGain);
  drone.start(now); drone.stop(now + 1.8);
  lfo.start(now); lfo.stop(now + 1.8);
}

// 리버 카드 오픈 — 스타카토 임팩트
function sfxRiverReveal() {
  ensureAudio(); if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const stab = audioCtx.createOscillator();
  stab.type = 'square';
  stab.frequency.setValueAtTime(880, now);
  stab.frequency.exponentialRampToValueAtTime(440, now + 0.1);
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(0.18, now);
  sg.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  stab.connect(sg); sg.connect(sfxGain);
  stab.start(now); stab.stop(now + 0.2);
  const thud = audioCtx.createOscillator();
  thud.type = 'sine';
  thud.frequency.setValueAtTime(100, now);
  thud.frequency.exponentialRampToValueAtTime(60, now + 0.15);
  const tg = audioCtx.createGain();
  tg.gain.setValueAtTime(0.2, now);
  tg.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  thud.connect(tg); tg.connect(sfxGain);
  thud.start(now); thud.stop(now + 0.2);
}

// 트로피 시상식 차임
function sfxTrophy() {
  ensureAudio(); if (!audioCtx) return;
  [523.25, 1046.50, 1568, 2093].forEach((freq, i) => {
    setTimeout(() => {
      if (!audioCtx) return;
      const n = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.18 - i * 0.04, n);
      g.gain.exponentialRampToValueAtTime(0.001, n + 2);
      o.connect(g); g.connect(sfxGain);
      o.start(n); o.stop(n + 2);
    }, i * 100);
  });
}

// v42-E: 숫자 카운트업 애니메이션
function animateNumber(el, target, duration = 600) {
  if (!el) return;
  const current = parseInt((el.textContent || '0').replace(/[^0-9-]/g, '')) || 0;
  if (current === target) return;
  if (Math.abs(target - current) < 5) {
    // 작은 차이는 즉시
    el.textContent = target.toLocaleString();
    return;
  }
  // 큰 변화는 카운트업/다운
  const start = performance.now();
  const delta = target - current;
  // 변화 강조 (flash)
  el.classList.add('changing');
  if (delta > 0) el.classList.add('gain');
  else el.classList.add('loss');
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
    const value = Math.round(current + delta * eased);
    el.textContent = value.toLocaleString();
    if (t < 1) requestAnimationFrame(tick);
    else {
      el.textContent = target.toLocaleString();
      setTimeout(() => el.classList.remove('changing', 'gain', 'loss'), 600);
    }
  }
  requestAnimationFrame(tick);
}

function animateChipsToPot(fromSeatIdx, amount) {
  const seat = document.getElementById('seat-' + fromSeatIdx);
  const pot = document.querySelector('.header-pot');
  if (!seat || !pot) return;
  const seatRect = seat.getBoundingClientRect();
  const potRect = pot.getBoundingClientRect();
  // v42-B: 베팅 크기에 비례하는 칩 개수 (1~12)
  const chipCount = Math.min(12, Math.max(2, Math.ceil(Math.log10(Math.max(amount, 10)) * 2.5)));
  for (let i = 0; i < chipCount; i++) {
    setTimeout(() => createFlyingChip(seatRect, potRect, i, chipCount), i * 45);
  }
  sfxChip();
}

function createFlyingChip(seatRect, potRect, idx = 0, total = 1) {
  const chip = document.createElement('div');
  chip.className = 'flying-chip';
  // v42-B: 칩 색상 — 베팅 크기에 따라 다른 가치의 칩
  const chipColors = ['#ffffff', '#ff5b5b', '#3ee8ff', '#a8ff7a', '#ffd93d', '#b14eff'];
  const color = chipColors[idx % chipColors.length];
  chip.textContent = '⬤';
  chip.style.color = color;
  chip.style.textShadow = `0 0 8px ${color}, 0 0 3px white`;
  // 약간 다른 시작 위치 (스택에서 튀어나오는 느낌)
  const startX = seatRect.left + seatRect.width / 2 + (Math.random() - 0.5) * 28;
  const startY = seatRect.top + seatRect.height / 2 + (Math.random() - 0.5) * 8;
  const endX = potRect.left + potRect.width / 2 + (Math.random() - 0.5) * 16;
  const endY = potRect.top + potRect.height / 2 + (Math.random() - 0.5) * 8;
  chip.style.left = startX + 'px';
  chip.style.top = startY + 'px';
  document.body.appendChild(chip);
  chip.offsetHeight;
  const dx = endX - startX;
  const dy = endY - startY;
  // 곡선 경로 (위로 튀어오르듯)
  const midY = -Math.abs(dy) * 0.3 - 20;
  requestAnimationFrame(() => {
    chip.style.transition = 'transform 0.65s cubic-bezier(0.4, -0.1, 0.2, 1.1), opacity 0.65s';
    chip.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px) scale(0.5) rotate(${(Math.random()-0.5)*360}deg)`;
    chip.style.opacity = '0';
  });
  setTimeout(() => chip.remove(), 750);
}

// v42-B: 빅팟 승리 시 칩 폭우 (winner에게 떨어짐)
function animateChipsToWinner(toSeatIdx, amount) {
  const seat = document.getElementById('seat-' + toSeatIdx);

  const potRect = pot.getBoundingClientRect();
  const chipCount = Math.min(20, Math.max(5, Math.ceil(Math.log10(Math.max(amount, 100)) * 4)));
  for (let i = 0; i < chipCount; i++) {

  }
}

// AI 빈도 (베뉴별)
const VENUE_DIALOGUE_FREQ = {
  pub:      0.30,  // 동네 펍 — 시끌
  seoul:    0.22,  // 강남
  macau:    0.12,  // 마카오 — 좀 더 침묵
  bellagio: 0.10,  // 베가스
  wsop:     0.08,  // WSOP
  triton:   0.05   // 트라이튼 — 침묵의 무게
};

let _aiDialogueEnabled = true;
try {
  const stored = localStorage.getItem('holdem-ai-dialogue');
  if (stored === '0') _aiDialogueEnabled = false;
} catch (e) {}

function toggleAiDialogue() {
  _aiDialogueEnabled = !_aiDialogueEnabled;
  try { localStorage.setItem('holdem-ai-dialogue', _aiDialogueEnabled ? '1' : '0'); } catch (e) {}
  return _aiDialogueEnabled;
}

function pickAiDialogue(category) {
  const pool = AI_DIALOGUES[category];
  if (!pool || pool.length === 0) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function getAiChampKey(p) {
  if (!p.isFamous || !p.famousData) return null;
  const name = p.famousData.name;
  for (const [key, ab] of Object.entries(SPECIAL_ABILITIES || {})) {
    if (ab.owner === name) return key;
  }
  return null;
}

function shouldAiSpeak(p) {
  if (!_aiDialogueEnabled) return false;
  if (!state || !state.venue) return false;
  if (p.isHuman || p.busted || p.folded) return false;
  const base = VENUE_DIALOGUE_FREQ[state.venue.id] || 0.15;
  // 챔피언은 더 적게 (시그니처 멘트 1~2번만)
  if (p.isFamous) {
    return Math.random() < (base * 0.6);
  }
  // 콜링스테이션은 더 자주
  if (p.personalityType === 'CALL_STATION') {
    return Math.random() < (base * 1.5);
  }
  return Math.random() < base;
}

function triggerAiChat(p, category) {
  if (!shouldAiSpeak(p)) return;
  const champKey = getAiChampKey(p);
  let msg = null;
  // 챔피언이면 시그니처 멘트 우선
  if (champKey) {
    const champCat = 'champ_' + champKey + '_chat';
    msg = pickAiDialogue(champCat);
  }
  // 콜링스테이션이면 전용 멘트
  if (!msg && p.personalityType === 'CALL_STATION') {
    msg = pickAiDialogue('cs_chat');
  }
  // 일반 카테고리
  if (!msg) msg = pickAiDialogue(category);
  if (!msg) msg = pickAiDialogue('generic');
  if (!msg) return;
  const idx = state.players.indexOf(p);
  if (idx >= 0) showChatBubble(idx, msg);
}

    : `<div style="font-size:72px;margin-bottom:16px;">${slide.icon}</div>`;

  const cornerAvatar = !slide.useProtagonist
    ? `<div style="position:absolute;top:10px;left:14px;display:flex;align-items:center;gap:8px;opacity:0.85;">
         ${getProtagonistAvatarHTML(36)}
         <span style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">${getPlayerNameDisplay()}</span>
       </div>`
    : '';

  const html = `<div style="text-align:center;padding:24px 16px;position:relative;">

// ===================== STREAK / COMBO =====================
function ensureStreak() {
  if (!career.streak) career.streak = { current: 0, best: 0 };
}

function updateStreak(won) {
  ensureStreak();
  if (won) {
    career.streak.current++;
    if (career.streak.current > career.streak.best) career.streak.best = career.streak.current;
    const c = career.streak.current;
    if (c === 3) showStreakToast('🔥 3연승!');
    else if (c === 5) { career.bankroll += 500; showStreakToast('✨ 5연승! +$500 보너스'); }
    else if (c === 7) { career.bankroll += 1500; showStreakToast('⚡ 7연승! +$1,500'); }
    else if (c === 10) { career.bankroll += 5000; showStreakToast('🌟 10연승!!! MASTER +$5,000'); }
  } else {
    career.streak.current = 0;
  }
  saveCareer();
}

function showStreakToast(text) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;top:120px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:var(--bg-deep);padding:14px 24px;border-radius:8px;font-weight:800;font-size:16px;box-shadow:0 0 30px rgba(255,217,61,0.7);z-index:2000;animation:announce-slide 3s ease-out forwards;`;
  toast.textContent = text;
  document.body.appendChild(toast);
  sfxLevelUp();
  setTimeout(() => toast.remove(), 3000);
}

function checkHandMilestone() {
  if (!career.lastMilestoneHand) career.lastMilestoneHand = 0;
  const since = career.handsPlayed - career.lastMilestoneHand;
  if (since >= 10) {
    career.lastMilestoneHand = career.handsPlayed;
    const bonus = (state?.venue?.bb || 10) * 3;
    career.bankroll += bonus;
    showStreakToast(`📊 ${career.handsPlayed}핸드 달성! +$${bonus.toLocaleString()}`);
    saveCareer();
  }
}

// Helper: show fullscreen overlay with optional skip
function showCinematic(contentHTML, durationMs = 4000, skippable = true) {
  // Don't stack overlays
  const existing = document.querySelector('.cinematic-overlay');
  if (existing) existing.remove();

  const ov = document.createElement('div');
  ov.className = 'cinematic-overlay';
  ov.innerHTML = contentHTML + (skippable ? '<div class="cinematic-skip" onclick="closeCinematic()">스킵 →</div>' : '');
  document.body.appendChild(ov);
  // Auto-close
  setTimeout(() => {
    closeCinematic();
  }, durationMs);
}

  const ov = document.querySelector('.cinematic-overlay');

  ov.classList.add('closing');
  setTimeout(() => ov.remove(), 500);
}

  const targetEl = () => document.getElementById('big-pot-counter');

  const tick = setInterval(() => {

    if (el) el.textContent = cur.toLocaleString();
    if (cur >= amount) clearInterval(tick);
  }, 50);
}

// 카테고리 → 컨텍스트 선택
function pickMonologue(category) {
  const pool = MONOLOGUES[category];
  if (!pool || pool.length === 0) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

// === 프리플랍 카테고리 자동 분류 ===
function classifyPreflopHand(cards) {
  if (!cards || cards.length < 2) return 'preflop_random';
  const ranks = '23456789TJQKA';
  const r1 = ranks.indexOf(cards[0].rank === '10' ? 'T' : cards[0].rank);
  const r2 = ranks.indexOf(cards[1].rank === '10' ? 'T' : cards[1].rank);
  const hi = Math.max(r1, r2), lo = Math.min(r1, r2);
  const suited = cards[0].suit === cards[1].suit;
  if (r1 === r2) {
    if (r1 === 12) return 'preflop_premium';     // AA
    if (r1 === 11) return 'preflop_kings';       // KK
    if (r1 === 10) return 'preflop_queens';      // QQ
    if (r1 >= 8)   return 'preflop_midpair';     // 99-JJ
    return 'preflop_smallpair';                  // 22-88
  }
  if (hi === 12 && lo === 11) return suited ? 'preflop_aks' : 'preflop_ako'; // AK
  if (hi === 12 && lo >= 8) return 'preflop_aq_at'; // AQ-AT
  if (suited && hi - lo === 1 && lo >= 5) return 'preflop_suited_conn'; // 76s+
  if (hi <= 10 && lo <= 7) return 'preflop_weak';
  return 'preflop_random';
}

// 포지션 카테고리
function classifyPosition() {
  if (!state || state.dealerIdx === undefined) return null;
  const myIdx = 0;
  const active = state.players.filter(p => !p.busted);
  const totalActive = active.length;
  let dist = (myIdx - state.dealerIdx + state.players.length) % state.players.length;
  if (myIdx === state.dealerIdx) return 'position_btn';
  if (myIdx === state.sbIdx) return 'position_sb';
  if (myIdx === state.bbIdx) return 'position_bb';
  // Early position
  if (dist <= totalActive / 3) return 'position_utg';
  return null;
}

// 플랍 카테고리 (board analysis)
function classifyFlop(myCards, board) {
  if (!myCards || !board || board.length < 3) return null;
  // Get card ranks/suits
  const flopSuits = board.slice(0, 3).map(c => c.suit);
  const flopRanks = board.slice(0, 3).map(c => c.rank);
  const monotone = new Set(flopSuits).size === 1;
  const paired = new Set(flopRanks).size < 3;
  // Use postflopStrength if available
  let strength = 0;
  if (typeof postflopStrength === 'function') {
    strength = postflopStrength(myCards, board);
  }
  if (monotone) return 'flop_monotone';
  if (paired) return 'flop_paired';
  if (strength >= 85) return 'flop_set';
  if (strength >= 70) return 'flop_toppair';
  if (strength >= 55) return 'flop_overpair';
  if (strength >= 40) return 'flop_drawing';
  if (strength >= 25) return Math.random() < 0.3 ? 'flop_nutdraw' : 'flop_drawing';
  return 'flop_miss';
}

// 베뉴별
function venueMonologueCategory() {
  if (!state || !state.venue) return null;
  return 'venue_' + state.venue.id;
}

// === Display ===
let _monologueShownThisHand = 0;
const MONOLOGUE_MAX_PER_HAND = 3;
let _monologueEnabled = true;
try {
  const stored = localStorage.getItem('holdem-monologue');
  if (stored === '0') _monologueEnabled = false;
} catch (e) {}

function showMonologue(text, opts = {}) {
  if (!_monologueEnabled) return;
  if (!text) return;
  if (_monologueShownThisHand >= MONOLOGUE_MAX_PER_HAND && !opts.force) return;
  _monologueShownThisHand++;

  // Remove any existing monologue bubble
  const existing = document.querySelector('.monologue-bubble');
  if (existing) existing.remove();

  const bubble = document.createElement('div');
  bubble.className = 'monologue-bubble';
  bubble.innerHTML = text;
  document.body.appendChild(bubble);
  setTimeout(() => {
    bubble.classList.add('fade-out');
    setTimeout(() => bubble.remove(), 600);
  }, opts.duration || 3500);
}

function resetMonologueCount() { _monologueShownThisHand = 0; }

function toggleMonologue() {
  _monologueEnabled = !_monologueEnabled;
  try { localStorage.setItem('holdem-monologue', _monologueEnabled ? '1' : '0'); } catch (e) {}
  return _monologueEnabled;
}

// 카테고리 픽 + 표시 단일 함수
function triggerMonologue(category, opts) {
  const text = pickMonologue(category);
  if (text) showMonologue(text, opts);
}

// ===================== BEGINNER'S LUCK (first 30 hands retention) =====================
const BEGINNER_HANDS = 30;

function getBeginnerLuck() {
  const played = career.handsPlayed || 0;
  if (played >= BEGINNER_HANDS) return { boost: 0, aiSkillPenalty: 0, aiBluffPenalty: 0, tier: 0 };
  if (played < 10) return { boost: 0.38, aiSkillPenalty: 0.15, aiBluffPenalty: 0.55, tier: 1 };
  if (played < 20) return { boost: 0.22, aiSkillPenalty: 0.08, aiBluffPenalty: 0.30, tier: 2 };
  return { boost: 0.10, aiSkillPenalty: 0.04, aiBluffPenalty: 0.15, tier: 3 };
}

function rankValue(r) {
  // RANKS: '2'~'10','J','Q','K','A'
  if (r === 'A') return 14;
  if (r === 'K') return 13;
  if (r === 'Q') return 12;
  if (r === 'J') return 11;
  if (r === '10') return 10;
  return parseInt(r);
}

function isStrongStartHand(c1, c2) {
  if (!c1 || !c2) return false;
  const v1 = rankValue(c1.rank), v2 = rankValue(c2.rank);
  if (v1 === v2 && v1 >= 7) return true; // 77+ pair
  const hi = Math.max(v1, v2), lo = Math.min(v1, v2);
  // Broadway combos: AK, AQ, AJ, AT, KQ, KJ, QJ, JT
  if (hi >= 11 && lo >= 10) return true;
  // Suited Ace
  if (c1.suit === c2.suit && hi === 14) return true;
  // Suited Broadway (KQs, KJs, QJs, JTs, T9s already covered if applicable)
  if (c1.suit === c2.suit && hi >= 12 && lo >= 9) return true;
  // Suited connectors 89+ (gives drawing power)
  if (c1.suit === c2.suit && hi - lo === 1 && lo >= 8) return true;
  return false;
}

function applyBeginnerLuck() {
  const luck = getBeginnerLuck();
  if (luck.boost <= 0) return;
  const me = state?.players?.[0];
  if (!me || me.busted || !me.cards || me.cards.length < 2) return;
  if (isStrongStartHand(me.cards[0], me.cards[1])) return; // already strong — leave alone
  if (Math.random() >= luck.boost) return; // probability gate

  const deck = state.deck;
  if (!deck || deck.length < 2) return;

  // Find a strong combo in the remaining deck
  for (let i = 0; i < deck.length; i++) {
    for (let j = i + 1; j < deck.length; j++) {
      if (isStrongStartHand(deck[i], deck[j])) {
        const orig1 = me.cards[0], orig2 = me.cards[1];
        const newCards = [deck[i], deck[j]];
        // Splice the higher index first so the lower index stays valid
        deck.splice(j, 1);
        deck.splice(i, 1);
        me.cards = newCards;
        // Return originals into the deck at random positions
        deck.splice(Math.floor(Math.random() * (deck.length + 1)), 0, orig1);
        deck.splice(Math.floor(Math.random() * (deck.length + 1)), 0, orig2);
        return;
      }
    }
  }
}

// === 캐릭터 이미지 시스템 (v33 — PNG 통일 + variant 지원) ===
// 파일명 규칙: char-{id}.png 또는 char-{id}-{variant}.png
// 예: char-joonyoung.png (기본 — 맥주잔 들고)
//     char-joonyoung-msg.png (카톡 응원 컷)
//     char-joonyoung-cry.png (감동 컷 - 선택)
// 같은 폴더(index.html 옆)에 저장. 이미지 없으면 자동으로 이모지 fallback.
function getCharImageHTML(charKey, size = 80, withGlow = true, variant = '') {
  const ch = STORY_CHARS[charKey];
  if (!ch) return '';
  const emoji = ch.emoji;
  const fallbackSize = Math.floor(size * 0.7);
  const glow = withGlow ? 'box-shadow:0 0 24px rgba(255,217,61,0.4);' : '';
  const suffix = variant ? `-${variant}` : '';
  // PNG first, then JPG fallback, then emoji
  return `<span class="char-image" style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#0a0817,#221f3d);border:3px solid var(--gold-foil);${glow}vertical-align:middle;flex-shrink:0;">
    <img src="char-${charKey}${suffix}.png" alt="${ch.name}" style="width:100%;height:100%;object-fit:cover;image-rendering:pixelated;" onerror="this.onerror=null;this.src='char-${charKey}${suffix}.jpg';this.addEventListener('error',()=>{this.parentElement.innerHTML='<span style=\\u0022font-size:${fallbackSize}px;\\u0022>${emoji}</span>'});">
  </span>`;
}

function getCharImageBigHTML(charKey, maxHeight = 200, variant = '') {
  const ch = STORY_CHARS[charKey];
  if (!ch) return '';
  const suffix = variant ? `-${variant}` : '';
  return `<div class="char-image-big" style="display:flex;justify-content:center;margin:0 auto 12px;">
    <img src="char-${charKey}${suffix}.png" alt="${ch.name}" style="max-height:${maxHeight}px;max-width:90%;border-radius:12px;border:3px solid var(--gold-foil);box-shadow:0 0 32px rgba(255,217,61,0.45),0 8px 24px rgba(0,0,0,0.6);image-rendering:pixelated;" onerror="this.onerror=null;this.src='char-${charKey}${suffix}.jpg';this.addEventListener('error',()=>{this.parentElement.innerHTML='<div style=\\u0022font-size:90px;text-align:center;\\u0022>${ch.emoji}</div>'});">
  </div>`;
}

function ensureSubEvents() {
  if (!career.subEventsFired) career.subEventsFired = {};
  if (!career.subEventFlags) career.subEventFlags = {};
  if (!career.totalFullhouses) career.totalFullhouses = 0;
  if (!career.totalBigPots) career.totalBigPots = 0;
  if (!career.totalAllinCalls) career.totalAllinCalls = 0;
  if (!career.lossStreak) career.lossStreak = 0;
}

function evaluateTrigger(event) {
  ensureSubEvents();
  ensureCareer();
  if (career.subEventsFired[event.id]) return false; // already fired

  const t = event.trig;
  const venueId = state?.venue?.id;
  const venueStats = career.venueStats?.[venueId];

  switch (t.type) {
    case 'venueHands':
      return venueId === t.venue && (venueStats?.hands || 0) >= t.count;
    case 'streak':
      if (t.maxDay && (career.day || 1) > t.maxDay) return false;
      return (career.streak?.current || 0) >= t.count;
    case 'lossStreak':
      return (career.lossStreak || 0) >= t.count;
    case 'firstFullhouse':
      return (career.totalFullhouses || 0) >= 1;
    case 'firstBigPot':
      return (career.totalBigPots || 0) >= 1;
    case 'firstAllinCall':
      return (career.totalAllinCalls || 0) >= 1;
    case 'firstFoldAfterVenue':
      return venueId === t.venue && (career.subEventFlags?.foldedInVenue?.[t.venue]);
    case 'day':
      return (career.day || 1) >= t.day;
    case 'totalHands':
      return (career.handsPlayed || 0) >= t.count;
    case 'fullhouseCount':
      return (career.totalFullhouses || 0) >= t.count;
    case 'profitMilestone':
      return career.bankroll >= t.amount;
    case 'beatChampion':
      return (career.championsMet || []).includes(t.champion) &&
             (career.specialAbilities?.collected || []).includes(t.champion);
    case 'gameCleared':
      return career.trophies?.triton?.gold === true;
  }
  return false;
}

function checkSubEvents() {
  ensureSubEvents();
  for (const event of SUB_EVENTS) {
    if (career.subEventsFired[event.id]) continue;
    if (evaluateTrigger(event)) {
      career.subEventsFired[event.id] = Date.now();
      saveCareer();
      // Queue the event to fire after a brief delay (so it doesn't overlap with current action)
      setTimeout(() => showSubEvent(event), 1000);
      return; // one event per check (prevents stacking)
    }
  }
}

let _subChoiceCallback = null;
function showSubEvent(event, choiceIdx) {
  // If this is a choice resolution, apply outcome
  if (choiceIdx !== undefined && event.choices) {
    const ch = event.choices[choiceIdx];
    if (ch?.outcome) {
      applySubReward(ch.outcome);
      if (ch.outcome.flag) {
        career.subEventFlags = career.subEventFlags || {};
        career.subEventFlags[ch.outcome.flag] = true;
      }
      saveCareer();
      // Show outcome modal
      const charTag = event.char && STORY_CHARS[event.char]
        ? `<div style="display:inline-flex;align-items:center;gap:6px;background:var(--bg-card-2);border:1px solid var(--border-light);padding:4px 10px;border-radius:14px;margin-bottom:10px;">${getCharImageHTML(event.char, 28, false, event.charVariant || '')}<span style="font-size:11px;color:var(--gold-bright);font-weight:700;">${STORY_CHARS[event.char].name}</span></div>`
        : '';
      const rewardText = formatSubReward(ch.outcome);
      const html = `<div style="text-align:center;padding:18px 14px;">
        <div style="font-size:42px;margin-bottom:8px;">${event.icon}</div>
        <h3 style="color:var(--gold-bright);font-size:15px;letter-spacing:1px;">${event.title}</h3>
        ${charTag}
        <div style="font-size:13px;line-height:1.9;color:var(--text);margin:14px 0;text-align:left;padding:0 8px;">${ch.outcome.text}</div>
        ${rewardText ? `<div style="font-size:11px;color:var(--gold-bright);margin:10px 0;">${rewardText}</div>` : ''}
        <button class="btn-primary" onclick="closeModal()" style="margin-top:10px;padding:10px 24px;">계속 →</button>
      </div>`;
      showModal(html);
      return;
    }
  }

  // Apply non-choice reward immediately
  if (event.reward) applySubReward(event.reward);
  saveCareer();

  const charTag = event.char && STORY_CHARS[event.char]
    ? `<div style="display:inline-flex;align-items:center;gap:6px;background:var(--bg-card-2);border:1px solid var(--border-light);padding:4px 10px;border-radius:14px;margin-bottom:10px;">${getCharImageHTML(event.char, 28, false, event.charVariant || '')}<span style="font-size:11px;color:var(--gold-bright);font-weight:700;">${STORY_CHARS[event.char].name}</span></div>`
    : '';
  const rewardText = formatSubReward(event.reward);

  let choicesHtml = '';
  if (event.choices) {
    choicesHtml = '<div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">';
    event.choices.forEach((c, i) => {
      choicesHtml += `<button onclick="resolveSubChoice('${event.id}', ${i})" style="text-align:left;padding:12px;font-size:12px;line-height:1.5;background:var(--bg-card-2);border:1px solid var(--border-light);">▸ ${c.label}</button>`;
    });
    choicesHtml += '</div>';
  }

  // Big image: when event has bigImage flag OR character has a variant (e.g. kakao msg)
  const useBig = event.bigImage || (event.char && event.charVariant);
  const bigVisual = useBig && event.char ? getCharImageBigHTML(event.char, 160, event.charVariant || '') : '';

  const html = `<div style="text-align:center;padding:18px 14px;">
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:3px;font-family:'Press Start 2P','Galmuri11',monospace;margin-bottom:6px;">SUB EVENT</div>
    ${bigVisual || `<div style="font-size:42px;margin:10px 0 6px;">${event.icon}</div>`}
    <h3 style="color:var(--gold-bright);font-size:15px;letter-spacing:1px;">${event.title}</h3>
    ${charTag}
    <div style="font-size:13px;line-height:1.9;color:var(--text);margin:14px 0;text-align:left;padding:0 8px;">${event.text}</div>
    ${!event.choices && rewardText ? `<div style="font-size:11px;color:var(--gold-bright);margin:10px 0;">${rewardText}</div>` : ''}
    ${choicesHtml}
    ${!event.choices ? `<button class="btn-primary" onclick="closeModal()" style="margin-top:14px;padding:10px 24px;">계속 →</button>` : ''}
  </div>`;
  showModal(html);
}

function resolveSubChoice(eventId, idx) {
  const event = SUB_EVENTS.find(e => e.id === eventId);
  if (!event) return closeModal();
  closeModal();
  setTimeout(() => showSubEvent(event, idx), 200);
}

function applySubReward(r) {
  if (!r) return;
  if (r.cash) career.bankroll = Math.max(0, career.bankroll + r.cash);
  if (r.xp) {
    ensureAbilities();
    for (const [stat, amt] of Object.entries(r.xp)) {
      if (stat === 'all') {
        for (const k of Object.keys(ABILITY_DEFS)) gainXP(k, amt, '서브이벤트');
      } else {
        gainXP(stat, amt, '서브이벤트');
      }
    }
  }
}

function formatSubReward(r) {
  if (!r) return '';
  const parts = [];
  if (r.cash) parts.push(`💰 ${r.cash > 0 ? '+' : ''}$${r.cash.toLocaleString()}`);
  if (r.xp) {
    for (const [s, v] of Object.entries(r.xp)) {
      if (s === 'all') parts.push(`✨ 모든 능력 ${v > 0 ? '+' : ''}${v} XP`);
      else parts.push(`${ABILITY_DEFS[s]?.icon || ''} ${ABILITY_DEFS[s]?.name || s} ${v > 0 ? '+' : ''}${v} XP`);
    }
  }
  return parts.join(' · ');
}

function getCurrentDay() {
  ensureCareer();
  const hands = career.handsPlayed || 0;
  for (const d of DAY_CAMPAIGN) {
    if (hands < d.handsTo) return d.day;
  }
  return 10;
}

function getDayConfig(day) {
  return DAY_CAMPAIGN.find(d => d.day === day);
}

function getDayProgress() {
  const day = getCurrentDay();
  const cfg = getDayConfig(day);
  const prevTo = day > 1 ? getDayConfig(day - 1).handsTo : 0;
  const hands = career.handsPlayed || 0;
  const handInDay = hands - prevTo;
  const totalInDay = cfg.handsTo - prevTo;
  return { day, cfg, handInDay, totalInDay, pct: Math.min(100, (handInDay / totalInDay) * 100) };
}

function ensureCareer() {
  if (!career.day) career.day = 1;
  if (!career.daysCompleted) career.daysCompleted = [];
  if (!career.championsMet) career.championsMet = [];
}

function checkDayProgress() {
  ensureCareer();
  const cur = getCurrentDay();
  if (cur <= career.day) {
    career.day = cur;
    return;
  }
  // Day advanced — trigger ceremony for each new day we just passed
  while (career.day < cur) {
    career.day++;
    triggerDayComplete(career.day - 1, career.day); // completed prev, entering new
  }
  saveCareer();
}

function triggerDayComplete(completedDay, newDay) {
  const completedCfg = getDayConfig(completedDay);
  if (!completedCfg) return;
  career.daysCompleted = career.daysCompleted || [];
  if (!career.daysCompleted.includes(completedDay)) {
    career.daysCompleted.push(completedDay);
    // Cash bonus
    career.bankroll += completedCfg.bonus;
    // Ability boost
    applyDayAbilityBoost(completedCfg.abilityBoost, completedCfg.abilityAmt);
    // Champion unlock
    if (completedCfg.champion && !career.championsMet.includes(completedCfg.champion)) {
      career.championsMet.push(completedCfg.champion);
    }
  }
  saveCareer();
  // Show story cutscene
  setTimeout(() => showDayStory(newDay), 800);
}

function applyDayAbilityBoost(stat, amt) {
  ensureAbilities();
  if (stat === 'all') {
    for (const k of Object.keys(ABILITY_DEFS)) {
      career.pokerAbilities[k].lv += amt;
    }
  } else if (career.pokerAbilities[stat]) {
    career.pokerAbilities[stat].lv += amt;
  }
}

let dayStorySlide = 0;
function showDayStory(day) {
  dayStorySlide = 0;
  const story = DAY_STORIES[day];
  if (!story || story.length === 0) return;
  renderDayStorySlide(day, 0);
}

function renderDayStorySlide(day, idx) {
  const story = DAY_STORIES[day];
  const slide = story[idx];
  const cfg = getDayConfig(day);
  const prevCfg = day > 1 ? getDayConfig(day - 1) : null;
  const isLast = idx === story.length - 1;
  const isFirst = idx === 0;

  // Character name tag at top if slide references one
  let charTag = '';
  let charVisual = '';
  if (slide.char && STORY_CHARS[slide.char]) {
    const ch = STORY_CHARS[slide.char];
    const variant = slide.charVariant || '';
    charTag = `<div style="display:inline-flex;align-items:center;gap:8px;background:var(--bg-card-2);border:1px solid var(--border-light);padding:5px 12px;border-radius:18px;margin-bottom:10px;">

      <span style="font-size:10px;color:var(--text-dim);">· ${ch.role}</span>
    </div>`;
    // Big visual: champion reveal OR explicit slide.bigImage flag
    if (slide.bigImage || slide.champion === slide.char || (slide.champion && SPECIAL_ABILITIES[slide.champion]?.owner === ch.name)) {
      charVisual = getCharImageBigHTML(slide.char, 180, variant);
    }
  }

  // Champion intro card if this slide introduces one
  let championCard = '';
  if (slide.champion && SPECIAL_ABILITIES[slide.champion]) {
    const ab = SPECIAL_ABILITIES[slide.champion];
    const color = getRarityColor(ab.rarity);
    // Use character image if available (matches STORY_CHARS), otherwise emoji
    const hasCharImage = STORY_CHARS[slide.champion];
    const visualHTML = hasCharImage
      ? `<div style="display:flex;justify-content:center;margin-bottom:8px;">${getCharImageHTML(slide.champion, 90, true)}</div>`
      : `<div style="font-size:48px;">${ab.icon}</div>`;

    </div>`;
  }

  const dots = story.map((_, i) =>
    `<span style="width:9px;height:9px;border-radius:50%;background:${i === idx ? 'var(--gold-bright)' : 'var(--border-light)'};display:inline-block;margin:0 3px;"></span>`
  ).join('');

  // Hero visual: large character image > champion image > big emoji
  const heroVisual = charVisual || (slide.champion ? '' : `<div style="font-size:60px;margin:20px 0 10px;">${slide.icon}</div>`);
  const smallIcon = (charVisual || slide.champion) ? `<div style="font-size:30px;margin:6px 0;">${slide.icon}</div>` : '';

  const html = `<div style="text-align:center;padding:20px 14px;">
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:3px;font-family:'Press Start 2P','Galmuri11',monospace;margin-bottom:6px;">DAY ${day}</div>

    ${heroVisual}

    ${charTag}
    <div style="font-size:14px;line-height:1.9;color:var(--text);min-height:80px;text-align:left;padding:0 8px;">${slide.text}</div>
    ${championCard}
    ${isLast ? `<div style="background:linear-gradient(135deg,rgba(255,217,61,0.15),rgba(212,175,55,0.08));border:2px solid var(--gold-foil);border-radius:8px;padding:12px;margin:14px 0;">

      <div style="font-size:13px;color:var(--text);margin-top:8px;line-height:1.6;">
        💰 <b style="color:var(--gold-bright);">+$${(prevCfg?.bonus || 0).toLocaleString()}</b><br>
        ${prevCfg?.abilityBoost === 'all' ? '✨ <b>모든 능력</b> +' + prevCfg.abilityAmt : `${ABILITY_DEFS[prevCfg?.abilityBoost]?.icon || '✨'} <b>${ABILITY_DEFS[prevCfg?.abilityBoost]?.name || ''}</b> +${prevCfg?.abilityAmt || 1}`}

    </div>
  </div>`;
  showModal(html);
}

function ensureTrophies() {
  if (!career.trophies) career.trophies = {};
  if (!career.venueStats) career.venueStats = {};
  for (const vId of Object.keys(VENUE_TROPHIES)) {
    if (!career.trophies[vId]) career.trophies[vId] = { bronze: false, silver: false, gold: false };
    if (!career.venueStats[vId]) {
      career.venueStats[vId] = {
        hands: 0,
        profit: 0,           // net P&L in this venue
        startStack: 0,       // tracked per session for profit calc
        fullhouses: 0,
        bigPots: 0,          // >= 30BB wins
        bosses: 0,           // total bosses beaten here
        beatenChampions: [], // famous players beaten here
        maxWinStreak: 0,
        currentStreak: 0
      };
    }
  }
}

function recordVenueStat(stat, delta = 1, extra) {
  if (!state || !state.venue) return;
  ensureTrophies();
  const vs = career.venueStats[state.venue.id];
  if (!vs) return;
  if (typeof delta === 'number') vs[stat] = (vs[stat] || 0) + delta;
  if (stat === 'beatenChampions' && extra) {
    vs.beatenChampions = vs.beatenChampions || [];
    if (!vs.beatenChampions.includes(extra)) vs.beatenChampions.push(extra);
  }
  saveCareer();
}

function checkTrophyProgress() {
  ensureTrophies();
  if (!state || !state.venue) return;
  const vId = state.venue.id;
  const venue = VENUE_TROPHIES[vId];
  if (!venue) return;
  const stats = career.venueStats[vId];
  const earned = career.trophies[vId];
  const tiers = ['bronze', 'silver', 'gold'];

  for (const tier of tiers) {
    if (earned[tier]) continue;
    const t = venue[tier];
    if (!t || !t.cond) continue;
    if (meetsCondition(t.cond, stats)) {
      earned[tier] = true;
      saveCareer();
      setTimeout(() => grantTrophy(vId, tier), 600);
      break; // one trophy per check (to avoid stacking modals)
    }
  }
}

function meetsCondition(cond, stats) {
  if (cond.hands && stats.hands < cond.hands) return false;
  if (cond.profit && stats.profit < cond.profit) return false;
  if (cond.fullhouses && (stats.fullhouses || 0) < cond.fullhouses) return false;
  if (cond.bigPots && (stats.bigPots || 0) < cond.bigPots) return false;
  if (cond.winStreak && (stats.maxWinStreak || 0) < cond.winStreak) return false;
  if (cond.bosses && (stats.bosses || 0) < cond.bosses) return false;
  if (cond.beatChampion && !(stats.beatenChampions || []).includes(cond.beatChampion)) return false;
  return true;
}

function grantTrophy(venueId, tier) {
  const venue = VENUE_TROPHIES[venueId];
  const t = venue[tier];
  if (!t) return;
  // Apply rewards
  if (t.reward.cash) career.bankroll += t.reward.cash;
  if (t.reward.xp) {
    ensureAbilities();
    for (const [stat, xp] of Object.entries(t.reward.xp)) {
      if (stat === 'all') {
        for (const k of Object.keys(ABILITY_DEFS)) gainXP(k, xp, '트로피 보상');
      } else {
        gainXP(stat, xp, '트로피 보상');
      }
    }
  }
  if (t.reward.item && typeof showItemDrop === 'function') {
    setTimeout(() => showItemDrop(t.reward.item), 2200);
  }
  if (t.reward.cardBack) {
    career.unlockedCardBacks = career.unlockedCardBacks || ['basic'];
    if (!career.unlockedCardBacks.includes(t.reward.cardBack)) {
      career.unlockedCardBacks.push(t.reward.cardBack);
    }
    if (CARD_BACKS && CARD_BACKS[t.reward.cardBack]) CARD_BACKS[t.reward.cardBack].unlocked = true;
  }
  saveCareer();

  // Trophy ceremony modal
  const tierColors = { bronze: '#cd7f32', silver: '#c0c0c0', gold: '#ffd93d' };
  const tierColor = tierColors[tier];
  const xpHtml = Object.entries(t.reward.xp || {}).map(([s, v]) =>
    s === 'all' ? `✨ 모든 능력 +${v} XP` : `${ABILITY_DEFS[s]?.icon || ''} ${ABILITY_DEFS[s]?.name || s} +${v} XP`
  ).join(' / ');
  const itemHtml = t.reward.item && ITEMS[t.reward.item] ? `<br>🎁 아이템: <b>${ITEMS[t.reward.item].icon} ${ITEMS[t.reward.item].name}</b>` : '';
  const cardBackHtml = t.reward.cardBack ? `<br>🃏 카드 뒷면 해금: <b>${t.reward.cardBack}</b>` : '';

  const html = `<div style="text-align:center;padding:24px 16px;">
    <div style="font-size:96px;margin-bottom:8px;text-shadow:0 0 40px ${tierColor};animation:trophy-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);">${t.icon}</div>
    <div style="font-size:11px;letter-spacing:4px;color:${tierColor};font-family:'Press Start 2P','Galmuri11',monospace;">TROPHY EARNED</div>
    <h2 style="color:${tierColor};font-size:20px;margin:10px 0;font-family:'Press Start 2P','Galmuri11',monospace;letter-spacing:2px;text-shadow:0 0 16px ${tierColor};">${t.name}</h2>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:14px;">${venue.venueName} · ${tier.toUpperCase()}</div>
    <div style="background:${tierColor}22;border:2px solid ${tierColor};border-radius:8px;padding:14px;margin:14px 0;">
      <div style="font-size:13px;color:var(--text);line-height:1.9;">
        ✅ ${t.desc}<br><br>
        💰 <b style="color:var(--gold-bright);font-size:18px;">+$${t.reward.cash.toLocaleString()}</b><br>
        ${xpHtml}

    <button class="btn-primary" onclick="closeModal()" style="margin-top:12px;padding:12px 28px;font-size:14px;font-weight:700;">계속 →</button>

// ===================== TROPHY CODEX MENU =====================
function openTrophyCodex() {
  ensureTrophies();
  let totalEarned = 0, total = 0;
  for (const vId of Object.keys(VENUE_TROPHIES)) {
    for (const tier of ['bronze', 'silver', 'gold']) {
      total++;
      if (career.trophies[vId]?.[tier]) totalEarned++;
    }
  }
  let html = `<h3>🏆 트로피 도감</h3>
  <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">각 베뉴에서 도전과제 클리어 시 자동 획득. 보상은 영구.</p>
  <div style="background:linear-gradient(135deg,rgba(255,217,61,0.15),rgba(212,175,55,0.08));border:2px solid var(--gold-foil);border-radius:8px;padding:12px;text-align:center;margin-bottom:14px;">
    <div style="font-size:11px;letter-spacing:3px;color:var(--gold-bright);font-family:'Press Start 2P','Galmuri11',monospace;">총 진행도</div>
    <div style="font-weight:800;font-size:24px;color:var(--gold-bright);margin-top:4px;">${totalEarned} / ${total}</div>
    <div style="background:var(--bg-darker);height:8px;border-radius:4px;overflow:hidden;margin-top:8px;">
      <div style="background:linear-gradient(90deg,var(--gold-foil),var(--gold-bright));height:100%;width:${(totalEarned/total*100)}%;"></div>
    </div>
  </div>`;

  for (const [vId, venue] of Object.entries(VENUE_TROPHIES)) {
    const stats = career.venueStats?.[vId] || {};
    const earned = career.trophies?.[vId] || {};
    const earnedCount = ['bronze','silver','gold'].filter(t => earned[t]).length;
    html += `<div style="background:var(--bg-card-2);border:2px solid ${venue.color};border-radius:8px;padding:12px;margin:10px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-weight:700;font-size:14px;color:${venue.color};">${venue.venueName}</div>
        <div style="font-size:11px;color:var(--text-dim);">${earnedCount}/3 트로피</div>
      </div>`;
    for (const tier of ['bronze', 'silver', 'gold']) {
      const t = venue[tier];
      const got = earned[tier];
      const tierColors = { bronze: '#cd7f32', silver: '#c0c0c0', gold: '#ffd93d' };
      const tcolor = tierColors[tier];
      // Calculate progress %
      const cond = t.cond;
      let progress = '';
      if (!got) {
        const parts = [];
        if (cond.hands) parts.push(`핸드 ${stats.hands || 0}/${cond.hands}`);
        if (cond.profit) parts.push(`수익 $${(stats.profit || 0).toLocaleString()}/$${cond.profit.toLocaleString()}`);
        if (cond.fullhouses) parts.push(`풀하우스 ${stats.fullhouses || 0}/${cond.fullhouses}`);
        if (cond.bigPots) parts.push(`큰 팟 ${stats.bigPots || 0}/${cond.bigPots}`);
        if (cond.winStreak) parts.push(`최대 연승 ${stats.maxWinStreak || 0}/${cond.winStreak}`);
        if (cond.bosses) parts.push(`보스 ${stats.bosses || 0}/${cond.bosses}`);
        if (cond.beatChampion) {
          const ab = SPECIAL_ABILITIES[cond.beatChampion];
          const beaten = (stats.beatenChampions || []).includes(cond.beatChampion);
          parts.push(`${ab?.owner || cond.beatChampion} 격파 ${beaten ? '✓' : '✗'}`);
        }
        progress = parts.join(' · ');
      }
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:6px;margin:4px 0;background:${got ? tcolor+'22' : 'var(--bg-darker)'};${!got ? 'opacity:0.7;' : ''}">
        <div style="font-size:32px;${!got ? 'filter:grayscale(1);opacity:0.5;' : ''}">${t.icon}</div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:12px;color:${got ? tcolor : 'var(--text-dim)'};">${t.name} ${got ? '✓' : ''}</div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.4;">${t.desc}</div>
          ${!got && progress ? `<div style="font-size:10px;color:var(--gold-bright);margin-top:3px;">${progress}</div>` : ''}
        </div>
        <div style="text-align:right;font-size:10px;color:var(--gold-bright);">+$${t.reward.cash.toLocaleString()}</div>
      </div>`;
    }
    html += `</div>`;
  }
  html += `<div style="text-align:center;margin-top:14px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

// 보스전 진행 상태 (career.bossesBeaten 에서 추적)
function ensureBossProgress() {
  if (!career.bossesBeaten) career.bossesBeaten = [];
  if (!career.bossAttempts) career.bossAttempts = {};
}

// 카드 파싱: 'As' → { rank: 'A', suit: '♠', color: 'black' }
function parseCardCode(code) {
  const rankChar = code.slice(0, code.length - 1);
  const rank = rankChar === 'T' ? '10' : rankChar;
  const suitChar = code.slice(-1);
  const suitMap = { s: '♠', h: '♥', d: '♦', c: '♣' };
  const colorMap = { s: 'black', h: 'red', d: 'red', c: 'black' };
  return { rank, suit: suitMap[suitChar], color: colorMap[suitChar] };
}

// 시나리오 핸드 시작 — 정해진 카드로 진행
function startBossChallenge(bossKey) {
  ensureBossProgress();
  const boss = BOSS_HANDS[bossKey];
  if (!boss) return;
  if (career.bankroll < boss.minBuyIn) {
    alert(`자금 부족 — ${boss.name} 도전은 최소 $${boss.minBuyIn.toLocaleString()} 필요.\n현재 자금: $${career.bankroll.toLocaleString()}`);
    return;
  }

  // 시도 카운트
  career.bossAttempts[bossKey] = (career.bossAttempts[bossKey] || 0) + 1;

  // 도전 비용 = 50BB 정도 (베뉴 BB 기준)
  const venue = VENUES.find(v => v.id === boss.venue);
  if (!venue) return;
  const buyIn = Math.min(boss.minBuyIn, career.bankroll);
  career.bankroll -= buyIn;
  saveCareer();

  // 보스 플레이어 생성
  const bossAbility = SPECIAL_ABILITIES[bossKey];
  const bossPlayer = {
    name: boss.name.split(' —')[0],
    isHuman: false, isFamous: true,
    famousData: { name: bossAbility?.owner || boss.name, country: '🌟', emoji: bossAbility?.icon || '⭐', flair: boss.desc },
    personalityType: 'TAG',
    skill: 1.0, tilt: 0,
    stack: buyIn, buyInsTotal: buyIn,
    cards: boss.bossCards.map(parseCardCode),
    folded: false, allIn: false,
    currentBet: 0, totalBet: 0, hasActed: false, busted: false, handResult: null,
    _bossLocked: true  // 카드 고정
  };

  const me = {
    name: career.playerName || '나', isHuman: true,
    personalityType: 'HUMAN', skill: 1, tilt: 0,
    stack: buyIn, buyInsTotal: buyIn,
    cards: boss.playerCards.map(parseCardCode),
    folded: false, allIn: false,
    currentBet: 0, totalBet: 0, hasActed: false, busted: false, handResult: null,
    _bossLocked: true
  };

  // 상태 초기화 (헤즈업 보스전)
  state = {
    venue, players: [me, bossPlayer],
    bb: venue.bb, sb: venue.sb,
    pot: 0, deck: [], communityCards: [],
    street: 'preHand', currentPlayerIdx: -1,
    dealerIdx: 0, sbIdx: 0, bbIdx: 1,
    currentBet: 0, lastRaiseSize: venue.bb,
    handNumber: 1, log: [],
    winners: null, sessionPnL: 0,
    sessionInvested: buyIn,
    _bossMode: true,
    _bossKey: bossKey,
    _bossBoard: boss.board.map(parseCardCode),
    _bossDealCount: 0
  };

  // UI 전환
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('venue-name').textContent = '⚔️ 보스전 — ' + boss.name.split(' —')[0];
  document.getElementById('blinds-display').textContent = `$${venue.sb}/$${venue.bb}`;
  document.getElementById('hand-num').textContent = '1 (보스)';
  // v41-C: 보스전 모드 비주얼
  document.body.setAttribute('data-venue', venue.id);
  document.body.setAttribute('data-boss', 'true');

  // 보스전 인트로 시네마틱
  sfxTension();
  setTimeout(() => {
    showCinematic(`
      <div style="font-size:11px;color:var(--red);letter-spacing:6px;font-family:'Press Start 2P','Galmuri11',monospace;margin-bottom:18px;">★ BOSS CHALLENGE ★</div>
      ${typeof getCharImageBigHTML === 'function' && STORY_CHARS[bossKey] ? getCharImageBigHTML(bossKey, 160) : `<div style="font-size:80px;">${bossAbility?.icon || '⭐'}</div>`}
      <h2 style="color:var(--gold-bright);font-size:18px;letter-spacing:2px;font-family:'Press Start 2P','Galmuri11',monospace;margin:10px 0;">${boss.name}</h2>
      <div style="font-size:13px;color:var(--text);max-width:80%;text-align:center;line-height:1.7;margin:10px 0;">${boss.desc}</div>
      <div style="font-size:12px;color:var(--cyan);margin-top:14px;font-style:italic;">"${boss.sigDialogue}"</div>

// 보스전 전용 newHand — 카드 분배 X, 미리 정해진 카드 사용
function bossNewHand() {
  state.handNumber = 1;
  career.handsPlayed++;
  state.pot = 0;
  state.communityCards = [];
  state.currentBet = state.bb;
  state.lastRaiseSize = state.bb;
  state.winners = null;

  // 블라인드 자동 포스트
  const me = state.players[0], boss = state.players[1];
  me.cards = [...state.players[0].cards];  // already set
  boss.cards = [...state.players[1].cards];
  me.folded = false; me.allIn = false; me.currentBet = 0; me.totalBet = 0; me.hasActed = false;
  boss.folded = false; boss.allIn = false; boss.currentBet = 0; boss.totalBet = 0; boss.hasActed = false;

  // SB = me, BB = boss
  postBlind(0, state.sb);
  postBlind(1, state.bb);
  state.currentPlayerIdx = 0;  // me first (SB acts first preflop in heads-up)
  state.street = 'preflop';

  state.handTrack = {
    preflopRaises: 0, preflopAggressorIdx: -1, preflopCallersBeforePlayer: 0,
    playerVolPreflop: false, playerCbetOpp: false,
    playerCheckedThisStreet: false, playerStartStack: me.stack, handStartPot: state.bb + state.sb,
    decisions: []
  };

  log(`<b>★ 보스전 vs ${boss.name} ★</b>`, true);
  saveCareer();
  render();

  // 첫 모놀로그
  setTimeout(() => triggerMonologue(classifyPreflopHand(me.cards), { force: true }), 800);

  scheduleNextAction();
}

// 보스전에서 advanceStreet 시 미리 정해진 보드 사용
function bossAdvanceBoard(currentStreet) {
  if (!state._bossMode) return false;
  const boss = BOSS_HANDS[state._bossKey];
  if (!boss) return false;
  if (currentStreet === 'preflop') {
    state.communityCards = boss.boardFlop.map(parseCardCode);
    return true;
  } else if (currentStreet === 'flop') {
    state.communityCards.push(parseCardCode(boss.boardTurn));
    return true;
  } else if (currentStreet === 'turn') {
    state.communityCards.push(parseCardCode(boss.boardRiver));
    return true;
  }
  return false;
}

// 보스전 결과 처리
function bossHandComplete(meWonShowdown) {
  const bossKey = state._bossKey;
  const boss = BOSS_HANDS[bossKey];
  if (!boss) return;

  if (meWonShowdown) {
    // 격파 성공
    career.bossesBeaten = career.bossesBeaten || [];
    if (!career.bossesBeaten.includes(bossKey)) career.bossesBeaten.push(bossKey);
    career.bankroll += boss.reward.cash;
    if (boss.reward.xp) {
      ensureAbilities();
      for (const [stat, amt] of Object.entries(boss.reward.xp)) {
        if (stat === 'all') {
          for (const k of Object.keys(ABILITY_DEFS)) gainXP(k, amt, '보스 격파');
        } else gainXP(stat, amt, '보스 격파');
      }
    }
    saveCareer();
    // 격파 시네마틱
    setTimeout(() => {
      triggerChampionKOCinematic(bossKey);
    }, 1500);
    setTimeout(() => {
      showModal(`<div style="text-align:center;padding:20px;">
        <h2 style="color:var(--gold-bright);">⚔️ 보스 격파!</h2>
        <p style="font-size:13px;color:var(--text);line-height:1.7;margin:14px 0;">${boss.successNarrative}</p>

          <div style="font-size:12px;color:var(--text-dim);margin-top:6px;">${Object.entries(boss.reward.xp).map(([k,v]) => k === 'all' ? `모든 능력 +${v}` : `${ABILITY_DEFS[k]?.icon || ''} +${v}`).join(' · ')}</div>

let currentSlot = 1;
try {
  const s = localStorage.getItem('holdem-active-slot');
  if (s && [1,2,3].includes(parseInt(s))) currentSlot = parseInt(s);
} catch (e) {}

function slotKey(idx) { return 'holdem-career-slot-' + idx; }

function getSlotInfo(idx) {
  try {
    const raw = localStorage.getItem(slotKey(idx));
    if (!raw) return null;
    const c = JSON.parse(raw);
    return {
      bankroll: c.bankroll || 0,
      handsPlayed: c.handsPlayed || 0,
      playerName: c.playerName || '',
      maxVenue: getMaxVenueUnlocked(c),
      lastPlayed: c._lastSaved || 0,
      day: c.day || 1
    };
  } catch (e) { return null; }
}

function getMaxVenueUnlocked(c) {
  if (!c || !c.bankroll && c.bankroll !== 0) return 'pub';
  let max = 'pub';
  for (const v of VENUES) {
    if (c.bankroll >= v.unlockBankroll) max = v.id;
  }
  return max;
}

function switchSlot(idx) {
  // Save current first
  saveCareer();
  currentSlot = idx;
  try { localStorage.setItem('holdem-active-slot', idx); } catch (e) {}
  // Load new slot
  career = { bankroll: 500, handsPlayed: 0, biggestWin: 0, biggestLoss: 0, stats: null, recentHands: [] };
  loadCareer();
  ensureInventory();
  ensureAbilities();
  renderLobby();
  closeModal();
}

function deleteSlot(idx) {
  if (!confirm(`슬롯 ${idx}를 정말 삭제하시겠습니까? 복구 불가능합니다.`)) return;
  try { localStorage.removeItem(slotKey(idx)); } catch (e) {}
  if (idx === currentSlot) {
    career = { bankroll: 500, handsPlayed: 0, biggestWin: 0, biggestLoss: 0, stats: null, recentHands: [] };
    saveCareer();
    renderLobby();
  }
  openSlotPicker();
}

function getTodayDate() {
  return new Date().toISOString().split('T')[0];
}

function ensureDailyChallenges() {
  if (!career.challenges) career.challenges = { date: '', daily: [] };
  const today = getTodayDate();
  if (career.challenges.date !== today || !career.challenges.daily.length) {
    // Generate 3 random challenges
    const shuffled = [...CHALLENGE_POOL].sort(() => Math.random() - 0.5);
    career.challenges = {
      date: today,
      daily: shuffled.slice(0, 3).map(c => ({ ...c, progress: 0, completed: false, claimed: false }))
    };
    saveCareer();
  }
}

function updateChallengeProgress(type, amount = 1) {
  ensureDailyChallenges();
  let changed = false;
  for (const ch of career.challenges.daily) {
    if (ch.completed) continue;
    if (ch.type === type) {
      ch.progress = Math.min(ch.target, ch.progress + amount);
      if (ch.progress >= ch.target) {
        ch.completed = true;
        showChallengeCompleteToast(ch);
      }
      changed = true;
    }
  }
  if (changed) saveCareer();
}

function showChallengeCompleteToast(ch) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;top:80px;right:20px;background:linear-gradient(135deg, var(--gold), var(--gold-bright));color:var(--bg-deep);padding:14px 20px;border-radius:10px;font-weight:700;box-shadow:0 0 30px rgba(255,217,61,0.6);z-index:1500;animation:announce-slide 4s ease-out forwards;max-width:280px;`;

}

// ===================== DECISION QUALITY SCORE =====================
function ensureDecisionHistory() {
  if (!career.decisionHistory) career.decisionHistory = [];
}

function recordDecisionForHistory(decision) {
  ensureDecisionHistory();
  career.decisionHistory.push({
    street: decision.street,
    judgment: decision.judgment,
    ts: Date.now()
  });
  // Keep last 200
  if (career.decisionHistory.length > 200) {
    career.decisionHistory = career.decisionHistory.slice(-200);
  }
}

function getDecisionStats() {
  ensureDecisionHistory();
  const all = career.decisionHistory;
  const last100 = all.slice(-100);
  const byStreet = { preflop: [], flop: [], turn: [], river: [] };
  for (const d of last100) {
    if (byStreet[d.street]) byStreet[d.street].push(d.judgment);
  }
  const scoreOf = (arr) => {
    if (arr.length === 0) return null;
    const score = arr.reduce((sum, j) => sum + (j === 'good' ? 100 : j === 'ok' ? 60 : 20), 0) / arr.length;
    return Math.round(score);
  };
  const overall = scoreOf(last100.map(d => d.judgment));
  const streets = {
    preflop: scoreOf(byStreet.preflop),
    flop: scoreOf(byStreet.flop),
    turn: scoreOf(byStreet.turn),
    river: scoreOf(byStreet.river)
  };
  // Find weakest
  let weakest = null;
  let weakestScore = 200;
  for (const [s, sc] of Object.entries(streets)) {
    if (sc !== null && sc < weakestScore) { weakestScore = sc; weakest = s; }
  }
  return { overall, streets, weakest, total: last100.length };
}

// ===================== WEAKNESS ANALYSIS (v37) =====================
function analyzeWeaknesses() {
  ensureDecisionHistory();
  const all = career.decisionHistory || [];
  const last200 = all.slice(-200);
  if (last200.length < 20) return { insufficient: true, total: last200.length };

  // Group by various dimensions
  const byStreet = { preflop: { good: 0, ok: 0, bad: 0, total: 0 }, flop: { good: 0, ok: 0, bad: 0, total: 0 }, turn: { good: 0, ok: 0, bad: 0, total: 0 }, river: { good: 0, ok: 0, bad: 0, total: 0 } };
  const byAction = { fold: { good: 0, bad: 0, total: 0 }, call: { good: 0, bad: 0, total: 0 }, raise: { good: 0, bad: 0, total: 0 }, check: { good: 0, bad: 0, total: 0 } };

  for (const d of last200) {
    if (byStreet[d.street]) {
      byStreet[d.street][d.judgment]++;
      byStreet[d.street].total++;
    }
    if (d.action && byAction[d.action]) {
      if (d.judgment === 'good') byAction[d.action].good++;
      else if (d.judgment === 'bad') byAction[d.action].bad++;
      byAction[d.action].total++;
    }
  }

  // Detect weaknesses
  const weaknesses = [];
  for (const [street, stats] of Object.entries(byStreet)) {
    if (stats.total < 5) continue;
    const badRate = stats.bad / stats.total;
    if (badRate > 0.35) {
      weaknesses.push({
        type: 'street',
        area: street,
        severity: badRate,
        msg: `${street === 'preflop' ? '프리플랍' : street === 'flop' ? '플랍' : street === 'turn' ? '턴' : '리버'}에서 잘못된 결정 ${Math.round(badRate * 100)}% — 평균보다 ${Math.round((badRate - 0.2) * 100)}% 높음`,
        tip: street === 'preflop' ? 'GTO 핸드 매트릭스(메인 메뉴)에서 13×13 차트 복습. 포지션별 오픈 레인지 외우기.' :
             street === 'flop' ? 'C-bet 빈도를 보드 텍스처별로 조정. 드라이 보드 (A72레인보우)는 C-bet ↑, 웻 보드 (T98수티드)는 C-bet ↓.' :
             street === 'turn' ? '턴은 결정적 스트릿. 베럴 컨티뉴 vs 체크 결정 — GTO 퀴즈 "포스트플랍" 카테고리 풀어보기.' :
             '리버 결정 — 밸류 vs 블러프 차이 학습. MDF(Minimum Defense Frequency) 개념 익히기.'
      });
    }
  }

  for (const [action, stats] of Object.entries(byAction)) {
    if (stats.total < 10) continue;
    const badRate = stats.bad / stats.total;
    if (badRate > 0.40) {
      weaknesses.push({
        type: 'action',
        area: action,
        severity: badRate,
        msg: `${action === 'fold' ? '폴드' : action === 'call' ? '콜' : action === 'raise' ? '레이즈' : '체크'} 결정 중 ${Math.round(badRate * 100)}%가 잘못된 판단`,
        tip: action === 'fold' ? '폴드 너무 많이? 약한 페어를 포기하기 전 팟 오즈 계산. EV+ 콜을 폴드하지 않기.' :
             action === 'call' ? '루즈한 콜이 많음. 약한 핸드로 콜은 EV- 일 가능성. "콜만 하기보단 폴드 또는 레이즈" 원칙.' :
             action === 'raise' ? '레이즈 사이즈/타이밍 부적절. 베팅으로 정보 얻을 때 vs 밸류 얻을 때 구분.' :
             '체크 빈도 부적절. 셋 잡고 체크하는 슬로우플레이 — 상대 핸드에 따라 다름.'
      });
    }
  }

  // Sort by severity
  weaknesses.sort((a, b) => b.severity - a.severity);

  // Strengths (good decisions)
  const strengths = [];
  for (const [street, stats] of Object.entries(byStreet)) {
    if (stats.total < 5) continue;
    const goodRate = stats.good / stats.total;
    if (goodRate > 0.65) {
      strengths.push({
        area: street,
        rate: goodRate,
        msg: `${street === 'preflop' ? '프리플랍' : street === 'flop' ? '플랍' : street === 'turn' ? '턴' : '리버'} ${Math.round(goodRate * 100)}% 좋은 결정 — 강점`
      });
    }
  }

  return {
    weaknesses,
    strengths,
    byStreet,
    byAction,
    total: last200.length
  };
}
