  { id: 'pub',     icon: '🍺', name: '홀덤펍 어쿠스틱', desc: '동네 펍 무드 — 어쿠스틱 기타 + 부드러운 베이스 + 브러시' },
  { id: 'vegas',   icon: '🎰', name: '라스베가스 디스코', desc: '70s 펑크 디스코 — 4-on-floor + 신스 스탭 + 슬롯 벨' },
  { id: 'lofi',    icon: '🌙', name: 'Lo-Fi Jazz',     desc: '비닐 크래클 + 워킹베이스 + 브러시 드럼' },
  { id: 'minimal', icon: '🎹', name: '미니멀 피아노',  desc: '집중 모드 — 부드러운 코드만 천천히' }
];
let currentTrack = 'funky';
try {
  const stored = localStorage.getItem('holdem-bgm-track');
  if (stored && BGM_TRACK_LIST.find(t => t.id === stored)) currentTrack = stored;
} catch (e) {}

// === Casino Jazz BGM via Tone.js ===
let toneLoaded = false, toneSetupDone = false;
let tonePiano = null, toneBass = null, toneDrum = null, toneSparkle = null;
let toneChordIdx = 0, toneBeatIdx = 0;
let bgmSynths = [];  // track all synths/effects for disposal

function disposeBGM() {
  try {
    if (window.Tone && Tone.Transport) {
      Tone.Transport.stop();
      Tone.Transport.cancel();
      Tone.Transport.position = 0;
    }
    bgmSynths.forEach(s => { try { s.dispose && s.dispose(); } catch (e) {} });
    bgmSynths = [];
    toneSetupDone = false;
    toneChordIdx = 0;
    toneBeatIdx = 0;
  } catch (e) {}
}

async function changeBGMTrack(trackId) {
  currentTrack = trackId;
  try { localStorage.setItem('holdem-bgm-track', trackId); } catch (e) {}
  if (!bgmEnabled) {
    bgmEnabled = true;
    try { localStorage.setItem('holdem-bgm', '1'); } catch (e) {}
    updateBgmIcon();
  }
  disposeBGM();
  await setupToneBGM();
  if (state) {
    const track = BGM_TRACK_LIST.find(t => t.id === trackId);
    log(`🎵 ${track.icon} ${track.name}`, false, true);
  }
}

function openBGMSettings() {
  const html = `<h3>🎵 BGM 설정</h3>
  <div style="margin:14px 0;padding:14px;background:var(--bg-card-2);border-radius:8px;border:1px solid var(--border);">
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <input type="checkbox" id="bgm-onoff" ${bgmEnabled ? 'checked' : ''} onchange="toggleBGMFromModal(this.checked)">
      <span style="font-weight:700;font-size:15px;">BGM 재생 <span style="color:${bgmEnabled ? 'var(--green)' : 'var(--text-dim)'};font-size:13px;">(${bgmEnabled ? 'ON' : 'OFF'})</span></span>
    </label>
  </div>
  <div style="margin-bottom:8px;font-weight:700;font-size:14px;">트랙 선택</div>
  ${BGM_TRACK_LIST.map(t => `
    <div onclick="changeBGMTrack('${t.id}').then(() => openBGMSettings())"
         style="display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;border:2px solid ${currentTrack === t.id ? 'var(--gold-bright)' : 'var(--border)'};margin:8px 0;border-radius:8px;background:${currentTrack === t.id ? 'rgba(255,217,61,0.08)' : 'transparent'};transition:all 0.15s;">
      <div style="font-size:28px;">${t.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;color:${currentTrack === t.id ? 'var(--gold-bright)' : 'var(--text)'};">${t.name} ${currentTrack === t.id ? '✓' : ''}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${t.desc}</div>
      </div>
    </div>
  `).join('')}
  <div style="text-align:center;margin-top:14px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

function toggleBGMFromModal(checked) {
  if (checked !== bgmEnabled) toggleBGM();
  setTimeout(openBGMSettings, 50); // re-render modal
}

function loadToneJS() {
  if (window.Tone) { toneLoaded = true; return Promise.resolve(); }
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/tone@14.8.49/build/Tone.js';
    s.onload = () => { toneLoaded = true; resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function setupToneBGM() {
  if (toneSetupDone) return;
  await loadToneJS();
  await Tone.start();
  if (currentTrack === 'lofi') setupLofiTrack();
  else if (currentTrack === 'minimal') setupMinimalTrack();
  else if (currentTrack === 'pub') setupPubTrack();
  else if (currentTrack === 'vegas') setupVegasTrack();
  else setupFunkyTrack();
  Tone.Transport.start();
  toneSetupDone = true;
}

function setupFunkyTrack() {
  // === FUNKY CASINO LOUNGE ===
  // Master chain: highpass to keep low end tight, no master lowpass (open & bright)
  const masterHP = new Tone.Filter({ frequency: 55, type: 'highpass', rolloff: -12 }).toDestination();
  const lightVerb = new Tone.Reverb({ decay: 1.4, wet: 0.16 }).connect(masterHP);
  bgmSynths.push(masterHP, lightVerb);

  // === FUNKY BASS === (synth bass, tight pluck)
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.001, decay: 0.18, sustain: 0.25, release: 0.12 },
    filter: { Q: 3, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.001, decay: 0.12, sustain: 0.25, release: 0.2, baseFrequency: 180, octaves: 2.5 }
  }).connect(masterHP);
  toneBass.volume.value = -7;

  // === RHODES ELECTRIC PIANO === (warm FM bell tone)
  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 3.5,
    modulationIndex: 7,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.003, decay: 0.6, sustain: 0.1, release: 0.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.02, decay: 0.4, sustain: 0, release: 0.3 }
  }).connect(lightVerb);
  tonePiano.volume.value = -13;

  // === KICK === (tight, punchy)
  const toneKick = new Tone.MembraneSynth({
    pitchDecay: 0.04,
    octaves: 5,
    envelope: { attack: 0.001, decay: 0.18, sustain: 0, release: 0.25 }
  }).connect(masterHP);
  toneKick.volume.value = -5;

  // === SNARE === (sharp, on 2 & 4)
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.11, sustain: 0 }
  });
  const snareHP = new Tone.Filter({ frequency: 1400, type: 'highpass' });
  toneDrum.chain(snareHP, masterHP);
  toneDrum.volume.value = -14;

  // === HI-HAT === (tight 8th notes)
  const toneHat = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.022, sustain: 0 }
  });
  const hatHP = new Tone.Filter({ frequency: 7000, type: 'highpass' });
  toneHat.chain(hatHP, masterHP);
  toneHat.volume.value = -24;

  // === VIBRAPHONE === (bright bell for melody)
  toneSparkle = new Tone.FMSynth({
    harmonicity: 2,
    modulationIndex: 9,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.003, decay: 0.9, sustain: 0.05, release: 1.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.01, decay: 0.6, sustain: 0, release: 0.7 }
  }).connect(lightVerb);
  toneSparkle.volume.value = -17;

  // Tempo: medium funk groove (Ocean's Eleven feel)
  Tone.Transport.bpm.value = 110;

  // === 4-bar progression: Am7 → Dm7 → G7 → Cmaj7 ===
  const PROG = [
    { bass: ['A1','A1','E2','A1','C2','A1','G2','A1'], chord: ['C4','E4','G4'] },     // Am7
    { bass: ['D2','D2','A2','D2','F2','D2','C3','D2'], chord: ['F4','A4','C5'] },     // Dm7
    { bass: ['G1','G1','D2','G1','B1','G1','F2','G1'], chord: ['B3','D4','F4'] },     // G7
    { bass: ['C2','C2','G2','C2','E2','C2','A2','C2'], chord: ['E4','G4','B4'] }      // Cmaj7
  ];

  let funkBar = 0;
  let funk8th = 0;
  let kick16 = 0;

  // FUNKY BASS — every 8th note
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    toneBass.triggerAttackRelease(bar.bass[funk8th % 8], '16n', time, 0.75);
    funk8th++;
    if (funk8th % 8 === 0) funkBar++;
  }, '8n');

  // KICK — beat 1, "and of 2", beat 3 (syncopated funk pattern)
  // 16th positions: 0, 6, 10
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const pos = kick16 % 16;
    if (pos === 0 || pos === 6 || pos === 10) {
      toneKick.triggerAttackRelease('C1', '8n', time, 0.95);
    }
    kick16++;
  }, '16n');

  // SNARE — beats 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    toneDrum.triggerAttackRelease('16n', time, 0.75);
  }, '2n', '4n');

  // HI-HAT — every 8th note (with slight accent on downbeats)
  let hatIdx = 0;
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const vel = (hatIdx % 2 === 0) ? 0.7 : 0.45;
    toneHat.triggerAttackRelease('32n', time, vel);
    hatIdx++;
  }, '8n');

  // RHODES CHORD STAB — beat 1 of each bar
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '8n', time, 0.55);
  }, '1m');

  // RHODES STAB — "and of 2" (typical funk syncopation)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled) return;
    const bar = PROG[funkBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time, 0.4);
  }, '1m', '4n.');

  // VIBRAPHONE — sparse melody (30% chance per half-note)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || Math.random() > 0.32) return;
    // A minor pentatonic + jazz colors
    const notes = ['A4','C5','D5','E5','G5','A5','C6','E5','B4','D5'];
    toneSparkle.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '8n', time, 0.55);
  }, '2n');

  // Track synths for disposal
  bgmSynths.push(toneBass, tonePiano, toneKick, toneDrum, toneHat, toneSparkle);
}

function setupLofiTrack() {
  // === LO-FI LATE NIGHT JAZZ ===
  // Lo-fi character: subtle vinyl crackle + tape wow + muffled highs
  const masterHP = new Tone.Filter({ frequency: 75, type: 'highpass' }).toDestination();
  const masterLP = new Tone.Filter({ frequency: 4000, type: 'lowpass', Q: 0.5 }).connect(masterHP);
  const lofiVerb = new Tone.Reverb({ decay: 3, wet: 0.3 }).connect(masterLP);
  bgmSynths.push(masterHP, masterLP, lofiVerb);

  // Upright bass — woody, mellow walking line
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.03, decay: 0.4, sustain: 0.4, release: 0.5 },
    filter: { Q: 1.5, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.03, decay: 0.4, sustain: 0.35, release: 0.5, baseFrequency: 130, octaves: 2.5 }
  }).connect(masterHP);
  toneBass.volume.value = -10;
  bgmSynths.push(toneBass);

  // Soft FM piano — slightly muffled
  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 1.4,
    modulationIndex: 2.5,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.025, decay: 1.3, sustain: 0.15, release: 2 },
    modulation: { type: 'triangle' },
    modulationEnvelope: { attack: 0.03, decay: 0.7, sustain: 0, release: 0.5 }
  }).connect(lofiVerb);
  tonePiano.volume.value = -13;
  bgmSynths.push(tonePiano);

  // Brushed snare
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.003, decay: 0.1, sustain: 0 }
  });
  const brushHP = new Tone.Filter({ frequency: 4500, type: 'highpass' });
  toneDrum.chain(brushHP, masterLP);
  toneDrum.volume.value = -22;
  bgmSynths.push(toneDrum, brushHP);

  // Vinyl noise bed
  const vinylNoise = new Tone.Noise({ type: 'pink' }).start();
  const vinylHP = new Tone.Filter({ frequency: 1500, type: 'highpass' });
  const vinylGain = new Tone.Gain(0.015);
  vinylNoise.chain(vinylHP, vinylGain, Tone.Destination);
  bgmSynths.push(vinylNoise, vinylHP, vinylGain);

  // Random vinyl pops
  const vinylPop = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.007, sustain: 0 }
  });
  const popFilter = new Tone.Filter({ frequency: 2500, type: 'bandpass', Q: 2 });
  vinylPop.chain(popFilter, Tone.Destination);
  vinylPop.volume.value = -34;
  const popInterval = setInterval(() => {
    if (bgmEnabled && currentTrack === 'lofi' && Math.random() < 0.4) {
      try { vinylPop.triggerAttackRelease('64n'); } catch (e) {}
    }
  }, 700);
  bgmSynths.push(vinylPop, popFilter, { dispose: () => clearInterval(popInterval) });

  Tone.Transport.bpm.value = 72;

  // Progression: Am9 → Dm11 → G13 → Cmaj9
  const PROG = [
    { bass: ['A1','E2','C2','G2'], chord: ['C3','E3','G3','B3'] },
    { bass: ['D2','A2','F2','C3'], chord: ['F3','A3','C4','E4'] },
    { bass: ['G1','D2','B1','F2'], chord: ['F3','A3','B3','E4'] },
    { bass: ['C2','G2','E2','B2'], chord: ['E3','G3','B3','D4'] }
  ];

  // Piano chord on beat 1
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    const ch = PROG[toneChordIdx % PROG.length];
    tonePiano.triggerAttackRelease(ch.chord, '2n.', time, 0.55);
  }, '1m');

  // Walking bass on quarter notes
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    const ch = PROG[toneChordIdx % PROG.length];
    toneBass.triggerAttackRelease(ch.bass[toneBeatIdx % 4], '4n', time, 0.6);
    toneBeatIdx++;
    if (toneBeatIdx % 4 === 0) toneChordIdx++;
  }, '4n');

  // Brush swish on 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'lofi') return;
    toneDrum.triggerAttackRelease('16n', time, 0.6);
  }, '2n', '4n');
}

function setupMinimalTrack() {
  // === MINIMAL PIANO — focus mode ===
  const highPass = new Tone.Filter({ frequency: 120, type: 'highpass' }).toDestination();
  const lightVerb = new Tone.Reverb({ decay: 2.5, wet: 0.22 }).connect(highPass);
  bgmSynths.push(highPass, lightVerb);

  tonePiano = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 2,
    modulationIndex: 3,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.04, decay: 1.6, sustain: 0.1, release: 2.5 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.05, decay: 0.5, sustain: 0, release: 0.3 }
  }).connect(lightVerb);
  tonePiano.volume.value = -14;
  bgmSynths.push(tonePiano);

  Tone.Transport.bpm.value = 60;

  // Spacious progression
  const PROG = [
    ['C3','E3','G3','B3'],
    ['A2','C3','E3','G3'],
    ['F2','A2','C3','E3'],
    ['G2','B2','D3','F3']
  ];
  let pIdx = 0;

  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'minimal') return;
    tonePiano.triggerAttackRelease(PROG[pIdx % PROG.length], '1n', time, 0.42);
    pIdx++;
  }, '2m');
}

// ===================== 🍺 HOLDEM PUB ACOUSTIC =====================
function setupPubTrack() {
  // Warm intimate pub feel — acoustic guitar arpeggios, woody bass, brushed drums
  const masterHP = new Tone.Filter({ frequency: 80, type: 'highpass' }).toDestination();
  const masterLP = new Tone.Filter({ frequency: 7000, type: 'lowpass', Q: 0.4 }).connect(masterHP);
  const pubVerb = new Tone.Reverb({ decay: 2.2, wet: 0.22 }).connect(masterLP);
  bgmSynths.push(masterHP, masterLP, pubVerb);

  // ACOUSTIC GUITAR (PluckSynth — sounds remarkably guitar-like)
  tonePiano = new Tone.PolySynth(Tone.PluckSynth, {
    attackNoise: 0.6,
    dampening: 4200,
    resonance: 0.85
  }).connect(pubVerb);
  tonePiano.volume.value = -8;
  bgmSynths.push(tonePiano);

  // WOODY UPRIGHT BASS
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.02, decay: 0.5, sustain: 0.4, release: 0.6 },
    filter: { Q: 1.2, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.02, decay: 0.5, sustain: 0.3, release: 0.5, baseFrequency: 150, octaves: 2 }
  }).connect(masterHP);
  toneBass.volume.value = -8;
  bgmSynths.push(toneBass);

  // BRUSH SNARE (pink noise — softer than white)
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.005, decay: 0.14, sustain: 0 }
  });
  const brushBP = new Tone.Filter({ frequency: 3500, type: 'bandpass', Q: 1.2 });
  toneDrum.chain(brushBP, masterLP);
  toneDrum.volume.value = -20;
  bgmSynths.push(toneDrum, brushBP);

  // SOFT VIBE — light melody sparkle
  toneSparkle = new Tone.FMSynth({
    harmonicity: 2.5,
    modulationIndex: 4,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.01, decay: 0.7, sustain: 0.1, release: 1.2 }
  }).connect(pubVerb);
  toneSparkle.volume.value = -22;
  bgmSynths.push(toneSparkle);

  Tone.Transport.bpm.value = 92;

  // Warm folk progression: C → Am → F → G (vi-IV-V in C major loops well in pub mood)
  const PROG = [
    { root: 'C', bass: ['C2','G2','E2','G2'], chord: ['E3','G3','C4','E4'], top: 'C5' },
    { root: 'Am', bass: ['A1','E2','C2','E2'], chord: ['C3','E3','A3','C4'], top: 'A4' },
    { root: 'F', bass: ['F1','C2','A1','C2'], chord: ['F3','A3','C4','F4'], top: 'F5' },
    { root: 'G', bass: ['G1','D2','B1','D2'], chord: ['G3','B3','D4','G4'], top: 'G5' }
  ];

  let pubBar = 0;
  let pubBeat = 0;

  // GUITAR ARPEGGIO — pluck each chord tone in sequence (1-3-5-3 pattern, 8th notes)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    const ch = PROG[pubBar % PROG.length].chord;
    const pluckIdx = pubBeat % 8;
    const pattern = [0, 2, 1, 3, 2, 1, 3, 2];
    tonePiano.triggerAttackRelease(ch[pattern[pluckIdx] % ch.length], '8n', time, 0.55);
    pubBeat++;
    if (pubBeat % 8 === 0) pubBar++;
  }, '8n');

  // WALKING BASS — quarter notes (root, 5th, 3rd, 5th)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    const ch = PROG[pubBar % PROG.length].bass;
    toneBass.triggerAttackRelease(ch[Math.floor(pubBeat / 2) % 4], '4n', time, 0.7);
  }, '4n');

  // BRUSH on 2 and 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub') return;
    toneDrum.triggerAttackRelease('16n', time, 0.5);
  }, '2n', '4n');

  // OCCASIONAL VIBE NOTE (sparse melody, 25%)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'pub' || Math.random() > 0.25) return;
    const notes = ['C5','E5','G5','A5','E5','G4','D5'];
    toneSparkle.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '4n', time, 0.5);
  }, '2n');
}

// ===================== 🎰 LAS VEGAS DISCO =====================
function setupVegasTrack() {
  // 70s disco funk — four-on-floor kick, syncopated bass, brassy stabs, slot bell
  const masterHP = new Tone.Filter({ frequency: 65, type: 'highpass' }).toDestination();
  const discoVerb = new Tone.Reverb({ decay: 1.0, wet: 0.13 }).connect(masterHP);
  bgmSynths.push(masterHP, discoVerb);

  // DISCO BASS — punchy sawtooth with envelope
  toneBass = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.001, decay: 0.12, sustain: 0.3, release: 0.1 },
    filter: { Q: 4, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.001, decay: 0.1, sustain: 0.3, release: 0.15, baseFrequency: 220, octaves: 3 }
  }).connect(masterHP);
  toneBass.volume.value = -6;
  bgmSynths.push(toneBass);

  // BRASSY STAB SYNTH (disco horn) — for the chord stabs
  tonePiano = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity: 1.8,
    oscillator: { type: 'sawtooth' },
    modulation: { type: 'square' },
    envelope: { attack: 0.01, decay: 0.18, sustain: 0.2, release: 0.25 },
    modulationEnvelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.3 }
  }).connect(discoVerb);
  tonePiano.volume.value = -14;
  bgmSynths.push(tonePiano);

  // PUNCHY DISCO KICK
  const discoKick = new Tone.MembraneSynth({
    pitchDecay: 0.05,
    octaves: 6,
    envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.3 }
  }).connect(masterHP);
  discoKick.volume.value = -4;
  bgmSynths.push(discoKick);

  // OPEN HI-HAT (8th notes for disco)
  const discoHat = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.08, sustain: 0 }
  });
  const hatHP = new Tone.Filter({ frequency: 8000, type: 'highpass' });
  discoHat.chain(hatHP, masterHP);
  discoHat.volume.value = -20;
  bgmSynths.push(discoHat, hatHP);

  // SNARE — claps on 2 & 4
  toneDrum = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.12, sustain: 0 }
  });
  const snareBP = new Tone.Filter({ frequency: 2000, type: 'bandpass', Q: 1.5 });
  toneDrum.chain(snareBP, masterHP);
  toneDrum.volume.value = -12;
  bgmSynths.push(toneDrum, snareBP);

  // SLOT MACHINE BELL — for rare jackpot sparkle
  toneSparkle = new Tone.FMSynth({
    harmonicity: 8,
    modulationIndex: 12,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.4 }
  }).connect(discoVerb);
  toneSparkle.volume.value = -22;
  bgmSynths.push(toneSparkle);

  Tone.Transport.bpm.value = 122;

  // Disco progression: i-VI-III-VII in A minor (Am - F - C - G) — classic 70s disco
  const PROG = [
    { bass: ['A1','A1','E2','A1','A1','C2','E2','A1'], chord: ['A3','C4','E4'] },
    { bass: ['F1','F1','C2','F1','F1','A1','C2','F1'], chord: ['F3','A3','C4'] },
    { bass: ['C2','C2','G2','C2','C2','E2','G2','C2'], chord: ['C4','E4','G4'] },
    { bass: ['G1','G1','D2','G1','G1','B1','D2','G1'], chord: ['G3','B3','D4'] }
  ];

  let vegasBar = 0;
  let vegas8th = 0;
  let vegas16 = 0;

  // KICK — four-on-floor (every beat)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    discoKick.triggerAttackRelease('C1', '8n', time, 0.95);
  }, '4n');

  // SNARE/CLAP — on 2 & 4
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    toneDrum.triggerAttackRelease('16n', time, 0.6);
  }, '2n', '4n');

  // HI-HAT — open on offbeats (8th note offbeats)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    discoHat.triggerAttackRelease('16n', time, 0.55);
  }, '4n', '8n');

  // BASS — syncopated octave pattern
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    toneBass.triggerAttackRelease(bar.bass[vegas8th % 8], '16n', time, 0.8);
    vegas8th++;
    if (vegas8th % 8 === 0) vegasBar++;
  }, '8n');

  // BRASSY STAB — on the "and" of beats 1 and 3 (disco syncopation)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time, 0.65);
  }, '2n', '8n');

  // BRASSY STAB — on beat 3
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas') return;
    const bar = PROG[vegasBar % PROG.length];
    tonePiano.triggerAttackRelease(bar.chord, '16n', time + 0.05, 0.45);
  }, '1m', '2n');

  // SLOT MACHINE BELL — random rare jackpot sparkle (~5% per bar)
  Tone.Transport.scheduleRepeat((time) => {
    if (!bgmEnabled || currentTrack !== 'vegas' || Math.random() > 0.18) return;
    // Quick bell roll
    const bellNotes = ['C6','E6','G6','C7'];
    bellNotes.forEach((n, i) => {
      try { toneSparkle.triggerAttackRelease(n, '32n', time + i * 0.06, 0.4); } catch (e) {}
    });
  }, '2m');
}

function scheduleBGMChord() {
  if (!bgmEnabled) return;
  // Tone.js handles everything once setup
  setupToneBGM().catch(err => {
    console.warn('Tone.js failed, falling back to synth BGM:', err);
    fallbackBGM();
  });
}

function fallbackBGM() {
  // Basic Web Audio fallback if Tone.js fails to load
  if (!audioCtx || !bgmEnabled) return;
  const chords = [
    [65.41, 82.41, 98.00, 123.47],
    [73.42, 87.31, 110.00, 130.81],
    [82.41, 98.00, 123.47, 146.83],
    [87.31, 110.00, 130.81, 164.81]
  ];
  const chord = chords[Math.floor(Math.random() * chords.length)];
  const now = audioCtx.currentTime;
  chord.forEach((freq) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 1.5);
    gain.gain.linearRampToValueAtTime(0, now + 5);
    osc.connect(gain); gain.connect(bgmGain);
    osc.start(now); osc.stop(now + 5);
  });
  bgmTimer = setTimeout(fallbackBGM, 5000);
}

function sfxChip() {
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 2; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(1400 + i * 400 + Math.random() * 200, now + i * 0.04);
    osc.frequency.exponentialRampToValueAtTime(500, now + i * 0.04 + 0.05);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.15, now + i * 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.08);
    osc.connect(gain);
    gain.connect(sfxGain);
    osc.start(now + i * 0.04);
    osc.stop(now + i * 0.04 + 0.08);
  }
}

function sfxCard() {

  filter.frequency.value = 1200;
  const gain = audioCtx.createGain();

  source.connect(filter);
  filter.connect(gain);
  gain.connect(sfxGain);
  source.start(now);
}

// ===================== CHIP ANIMATION =====================
function animateChipsToPot(fromSeatIdx, amount) {
  const seat = document.getElementById('seat-' + fromSeatIdx);
  const pot = document.querySelector('.header-pot');
  if (!seat || !pot) return;
  const seatRect = seat.getBoundingClientRect();
  const potRect = pot.getBoundingClientRect();
  const chipCount = Math.min(5, Math.max(1, Math.floor(Math.log10(Math.max(amount, 10)))));
  for (let i = 0; i < chipCount; i++) {
    setTimeout(() => createFlyingChip(seatRect, potRect), i * 60);
  }
  sfxChip();
}

function createFlyingChip(seatRect, potRect) {
  const chip = document.createElement('div');
  chip.className = 'flying-chip';
  chip.textContent = '◉';
  const startX = seatRect.left + seatRect.width / 2 + (Math.random() - 0.5) * 24;
  const startY = seatRect.top + seatRect.height / 2;
  const endX = potRect.left + potRect.width / 2;
  const endY = potRect.top + potRect.height / 2;
  chip.style.left = startX + 'px';
  chip.style.top = startY + 'px';
  document.body.appendChild(chip);
  chip.offsetHeight;
  const dx = endX - startX;
  const dy = endY - startY;
  requestAnimationFrame(() => {
    chip.style.transition = 'transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.55s';
    chip.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px) scale(0.4)`;
    chip.style.opacity = '0';
  });
  setTimeout(() => chip.remove(), 650);
}

// ===================== STREAK / COMBO =====================
function ensureStreak() {
  if (!career.streak) career.streak = { current: 0, best: 0 };
}

function updateStreak(won) {
  ensureStreak();
  if (won) {
    career.streak.current++;
    if (career.streak.current > career.streak.best) career.streak.best = career.streak.current;
    const c = career.streak.current;
    if (c === 3) showStreakToast('🔥 3연승!');
    else if (c === 5) { career.bankroll += 500; showStreakToast('✨ 5연승! +$500 보너스'); }
    else if (c === 7) { career.bankroll += 1500; showStreakToast('⚡ 7연승! +$1,500'); }
    else if (c === 10) { career.bankroll += 5000; showStreakToast('🌟 10연승!!! MASTER +$5,000'); }
  } else {
    career.streak.current = 0;
  }
  saveCareer();
}

function showStreakToast(text) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;top:120px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:var(--bg-deep);padding:14px 24px;border-radius:8px;font-weight:800;font-size:16px;box-shadow:0 0 30px rgba(255,217,61,0.7);z-index:2000;animation:announce-slide 3s ease-out forwards;`;
  toast.textContent = text;
  document.body.appendChild(toast);
  sfxLevelUp();
  setTimeout(() => toast.remove(), 3000);
}

function checkHandMilestone() {
  if (!career.lastMilestoneHand) career.lastMilestoneHand = 0;
  const since = career.handsPlayed - career.lastMilestoneHand;
  if (since >= 10) {
    career.lastMilestoneHand = career.handsPlayed;
    const bonus = (state?.venue?.bb || 10) * 3;
    career.bankroll += bonus;
    showStreakToast(`📊 ${career.handsPlayed}핸드 달성! +$${bonus.toLocaleString()}`);
    saveCareer();
  }
}

// ===================== BEGINNER'S LUCK (first 30 hands retention) =====================
const BEGINNER_HANDS = 30;

function getBeginnerLuck() {
  const played = career.handsPlayed || 0;
  if (played >= BEGINNER_HANDS) return { boost: 0, aiSkillPenalty: 0, aiBluffPenalty: 0, tier: 0 };
  if (played < 10) return { boost: 0.38, aiSkillPenalty: 0.15, aiBluffPenalty: 0.55, tier: 1 };
  if (played < 20) return { boost: 0.22, aiSkillPenalty: 0.08, aiBluffPenalty: 0.30, tier: 2 };
  return { boost: 0.10, aiSkillPenalty: 0.04, aiBluffPenalty: 0.15, tier: 3 };
}

function rankValue(r) {
  // RANKS: '2'~'10','J','Q','K','A'
  if (r === 'A') return 14;
  if (r === 'K') return 13;
  if (r === 'Q') return 12;
  if (r === 'J') return 11;
  if (r === '10') return 10;
  return parseInt(r);
}

function isStrongStartHand(c1, c2) {
  if (!c1 || !c2) return false;
  const v1 = rankValue(c1.rank), v2 = rankValue(c2.rank);
  if (v1 === v2 && v1 >= 7) return true; // 77+ pair
  const hi = Math.max(v1, v2), lo = Math.min(v1, v2);
  // Broadway combos: AK, AQ, AJ, AT, KQ, KJ, QJ, JT
  if (hi >= 11 && lo >= 10) return true;
  // Suited Ace
  if (c1.suit === c2.suit && hi === 14) return true;
  // Suited Broadway (KQs, KJs, QJs, JTs, T9s already covered if applicable)
  if (c1.suit === c2.suit && hi >= 12 && lo >= 9) return true;
  // Suited connectors 89+ (gives drawing power)
  if (c1.suit === c2.suit && hi - lo === 1 && lo >= 8) return true;
  return false;
}

function applyBeginnerLuck() {
  const luck = getBeginnerLuck();
  if (luck.boost <= 0) return;
  const me = state?.players?.[0];
  if (!me || me.busted || !me.cards || me.cards.length < 2) return;
  if (isStrongStartHand(me.cards[0], me.cards[1])) return; // already strong — leave alone
  if (Math.random() >= luck.boost) return; // probability gate

  const deck = state.deck;
  if (!deck || deck.length < 2) return;

  // Find a strong combo in the remaining deck
  for (let i = 0; i < deck.length; i++) {
    for (let j = i + 1; j < deck.length; j++) {
      if (isStrongStartHand(deck[i], deck[j])) {
        const orig1 = me.cards[0], orig2 = me.cards[1];
        const newCards = [deck[i], deck[j]];
        // Splice the higher index first so the lower index stays valid
        deck.splice(j, 1);
        deck.splice(i, 1);
        me.cards = newCards;
        // Return originals into the deck at random positions
        deck.splice(Math.floor(Math.random() * (deck.length + 1)), 0, orig1);
        deck.splice(Math.floor(Math.random() * (deck.length + 1)), 0, orig2);
        return;
      }
    }
  }
}

  const hands = career.handsPlayed || 0;
  for (const d of DAY_CAMPAIGN) {
    if (hands < d.handsTo) return d.day;
  }
  return 10;
}

function getDayConfig(day) {
  return DAY_CAMPAIGN.find(d => d.day === day);
}

function getDayProgress() {
  const day = getCurrentDay();
  const cfg = getDayConfig(day);
  const prevTo = day > 1 ? getDayConfig(day - 1).handsTo : 0;
  const hands = career.handsPlayed || 0;
  const handInDay = hands - prevTo;
  const totalInDay = cfg.handsTo - prevTo;
  return { day, cfg, handInDay, totalInDay, pct: Math.min(100, (handInDay / totalInDay) * 100) };
}

function ensureCareer() {
  if (!career.day) career.day = 1;
  if (!career.daysCompleted) career.daysCompleted = [];
  if (!career.championsMet) career.championsMet = [];
}

function checkDayProgress() {
  ensureCareer();
  const cur = getCurrentDay();
  if (cur <= career.day) {
    career.day = cur;
    return;
  }
  // Day advanced — trigger ceremony for each new day we just passed
  while (career.day < cur) {
    career.day++;
    triggerDayComplete(career.day - 1, career.day); // completed prev, entering new
  }
  saveCareer();
}

function triggerDayComplete(completedDay, newDay) {
  const completedCfg = getDayConfig(completedDay);
  if (!completedCfg) return;
  career.daysCompleted = career.daysCompleted || [];
  if (!career.daysCompleted.includes(completedDay)) {
    career.daysCompleted.push(completedDay);
    // Cash bonus
    career.bankroll += completedCfg.bonus;
    // Ability boost
    applyDayAbilityBoost(completedCfg.abilityBoost, completedCfg.abilityAmt);
    // Champion unlock
    if (completedCfg.champion && !career.championsMet.includes(completedCfg.champion)) {
      career.championsMet.push(completedCfg.champion);
    }
  }
  saveCareer();
  // Show story cutscene
  setTimeout(() => showDayStory(newDay), 800);
}

function applyDayAbilityBoost(stat, amt) {
  ensureAbilities();
  if (stat === 'all') {
    for (const k of Object.keys(ABILITY_DEFS)) {
      career.pokerAbilities[k].lv += amt;
    }
  } else if (career.pokerAbilities[stat]) {
    career.pokerAbilities[stat].lv += amt;
  }
}

  dayStorySlide = 0;

        </div>
        <div style="text-align:right;font-size:10px;">

    }
    html += `</div>`;
  }
  html += `<div style="text-align:center;margin-top:16px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

function getSlotInfo(idx) {
  try {
    const raw = localStorage.getItem(slotKey(idx));
    if (!raw) return null;
    const c = JSON.parse(raw);
    return {
      bankroll: c.bankroll || 0,
      handsPlayed: c.handsPlayed || 0,
      playerName: c.playerName || '',
      maxVenue: getMaxVenueUnlocked(c),
      lastPlayed: c._lastSaved || 0,
      day: c.day || 1
    };
  } catch (e) { return null; }
}

function getMaxVenueUnlocked(c) {
  if (!c || !c.bankroll && c.bankroll !== 0) return 'pub';
  let max = 'pub';
  for (const v of VENUES) {
    if (c.bankroll >= v.unlockBankroll) max = v.id;
  }
  return max;
}

function getTodayDate() {

function ensureDailyChallenges() {
  if (!career.challenges) career.challenges = { date: '', daily: [] };
  const today = getTodayDate();
  if (career.challenges.date !== today || !career.challenges.daily.length) {
    // Generate 3 random challenges
    const shuffled = [...CHALLENGE_POOL].sort(() => Math.random() - 0.5);
    career.challenges = {
      date: today,
      daily: shuffled.slice(0, 3).map(c => ({ ...c, progress: 0, completed: false, claimed: false }))
    };
    saveCareer();
  }
}

function updateChallengeProgress(type, amount = 1) {
  ensureDailyChallenges();
  let changed = false;
  for (const ch of career.challenges.daily) {
    if (ch.completed) continue;
    if (ch.type === type) {
      ch.progress = Math.min(ch.target, ch.progress + amount);
      if (ch.progress >= ch.target) {
        ch.completed = true;
        showChallengeCompleteToast(ch);
      }
      changed = true;
    }
  }
  if (changed) saveCareer();
}

function ensureDecisionHistory() {

}

function recordDecisionForHistory(decision) {
  ensureDecisionHistory();
  career.decisionHistory.push({
    street: decision.street,
    judgment: decision.judgment,
    ts: Date.now()
  });
  // Keep last 200
  if (career.decisionHistory.length > 200) {
    career.decisionHistory = career.decisionHistory.slice(-200);
  }
}

function getDecisionStats() {
  ensureDecisionHistory();
  const all = career.decisionHistory;
  const last100 = all.slice(-100);
  const byStreet = { preflop: [], flop: [], turn: [], river: [] };
  for (const d of last100) {
    if (byStreet[d.street]) byStreet[d.street].push(d.judgment);
  }
  const scoreOf = (arr) => {
    if (arr.length === 0) return null;
    const score = arr.reduce((sum, j) => sum + (j === 'good' ? 100 : j === 'ok' ? 60 : 20), 0) / arr.length;
    return Math.round(score);
  };
  const overall = scoreOf(last100.map(d => d.judgment));
  const streets = {
    preflop: scoreOf(byStreet.preflop),
    flop: scoreOf(byStreet.flop),
    turn: scoreOf(byStreet.turn),
    river: scoreOf(byStreet.river)
  };
  // Find weakest
  let weakest = null;
  let weakestScore = 200;
  for (const [s, sc] of Object.entries(streets)) {
    if (sc !== null && sc < weakestScore) { weakestScore = sc; weakest = s; }
  }
  return { overall, streets, weakest, total: last100.length };
}

// ===================== AI MEMORY (in-venue persistence) =====================
function getOrCreateAIStats(aiPlayer) {
  if (!aiPlayer._memId) aiPlayer._memId = aiPlayer.name + '_' + Math.random().toString(36).slice(2,8);
  if (!state.aiMemory) state.aiMemory = {};
  if (!state.aiMemory[aiPlayer._memId]) {
    state.aiMemory[aiPlayer._memId] = {
      name: aiPlayer.name,
      hands: 0, vpipHands: 0, pfrHands: 0,
      bets: 0, raises: 0, calls: 0, folds: 0,
      wonShowdown: 0, lostShowdown: 0,
      notes: []
    };
  }
  return state.aiMemory[aiPlayer._memId];
}

function trackAIMemory(p, action) {
  if (!p || p.isHuman || p.busted) return;
  const mem = getOrCreateAIStats(p);
  if (action === 'fold') mem.folds++;
  else if (action === 'call') mem.calls++;
  else if (action === 'bet' || action === 'raise') { mem.bets++; }
  else if (action === 'check') {}
}

  seoul: 'lofi',
  macau: 'lofi',
  vegas: 'funky',
  wsop: 'funky',
  triton: 'minimal'
};

function autoSwitchVenueBGM(venueId) {
  const targetTrack = VENUE_BGM[venueId] || 'funky';
  if (currentTrack === targetTrack) return;
  if (!bgmEnabled) return;  // user has BGM off
  changeBGMTrack(targetTrack);
}

function duckBGM(durationMs = 1500) {
  if (!bgmGain) return;
  const originalVol = bgmGain.gain.value;
  bgmGain.gain.setValueAtTime(originalVol, audioCtx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(originalVol * 0.2, audioCtx.currentTime + 0.1);
  setTimeout(() => {
    if (!bgmGain) return;
    bgmGain.gain.linearRampToValueAtTime(originalVol, audioCtx.currentTime + 0.3);
  }, durationMs);
}

function checkBossClear() {
  if (!state || !state.venue) return;
  const boss = BOSS_CHALLENGES[state.venue.id];
  if (!boss) return;
  if (!career.bossesCleared) career.bossesCleared = [];
  if (career.bossesCleared.includes(state.venue.id)) return;
  if (!boss.check()) return;
  // Boss cleared!
  career.bossesCleared.push(state.venue.id);
  if (boss.reward.chips) career.bankroll += boss.reward.chips;
  if (boss.reward.item) {
    ensureInventory();
    career.inventory.items.push(boss.reward.item);
  }
  saveCareer();
  setTimeout(() => showBossClearModal(boss), 800);
}

// === INVENTORY INITIALIZATION ===
function ensureInventory() {
  if (!career.character) {
    career.character = { avatar: 'cowboy', name: '나' };
  }
  if (!career.inventory) {
    career.inventory = {
      items: [],
      equipped: {}
    };
    // Starter items
    career.inventory.items.push('cap_basic', 'shades_cheap', 'deck_basic');
    career.inventory.equipped = { hat: 'cap_basic', cardDeck: 'deck_basic' };
  }
  if (!career.cardBack) career.cardBack = 'basic';
  if (!career.shopState) {
    career.shopState = { items: [], lastRefresh: 0 };
  }
}

// === ITEM STAT AGGREGATION ===
function getEquippedStats() {
  ensureInventory();
  const stats = {};
  for (const itemId of Object.values(career.inventory.equipped || {})) {
    if (!itemId || !ITEMS[itemId]) continue;
    for (const [k, v] of Object.entries(ITEMS[itemId].stats || {})) {
      stats[k] = (stats[k] || 0) + v;
    }
  }
  return stats;
}

// Override getEffectiveAbility to add item bonuses
const _origGetEffective = getEffectiveAbility;
getEffectiveAbility = function(stat) {
  const base = _origGetEffective(stat);
  const itemStats = getEquippedStats();
  return base + (itemStats[stat] || 0);
};

// === DROP SYSTEM ===
function rollItemDrop(luckBonus = 0) {
  // Roll for whether anything drops
  // Returns item ID or null
  // luckBonus: extra % (0-100)
  let roll = Math.random() * 100;
  // Rarity selection by weight
  const weights = [
    { rarity: 'common',    threshold: 70 - luckBonus * 0.3 },
    { rarity: 'rare',      threshold: 92 - luckBonus * 0.5 },
    { rarity: 'epic',      threshold: 99 - luckBonus * 0.2 },
    { rarity: 'legendary', threshold: 100 }
  ];
  let chosen = 'common';
  for (const w of weights) {
    if (roll <= w.threshold) { chosen = w.rarity; break; }
  }
  // Pick random item of that rarity
  const candidates = Object.entries(ITEMS).filter(([id, it]) => it.rarity === chosen);
  if (candidates.length === 0) return null;
  const [id, item] = candidates[Math.floor(Math.random() * candidates.length)];
  return id;
}

function tryHandWinDrop() {
  ensureInventory();
  // 5% chance to drop something on hand win
  if (Math.random() > 0.05) return;
  const dropId = rollItemDrop(0);
  if (dropId) showItemDrop(dropId);
}

function tryFamousKnockoutDrop() {
  ensureInventory();
  // Famous knockout: guaranteed drop with high luck (rare+ likely)
  const dropId = rollItemDrop(60);
  if (dropId) showItemDrop(dropId);
}

function showItemDrop(itemId) {
  const item = ITEMS[itemId];
  if (!item) return;
  const isNew = !career.inventory.items.includes(itemId);
  career.inventory.items.push(itemId);
  // Unlock related card back
  if (item.cardBackId && CARD_BACKS[item.cardBackId]) {
    CARD_BACKS[item.cardBackId].unlocked = true;
    if (!career.unlockedCardBacks) career.unlockedCardBacks = ['basic'];
    if (!career.unlockedCardBacks.includes(item.cardBackId)) {
      career.unlockedCardBacks.push(item.cardBackId);
    }
  }
  saveCareer();
  const color = RARITY_INFO[item.rarity].color;
  const rarityName = RARITY_INFO[item.rarity].name;
  // Toast notification
  const toast = document.createElement('div');
  toast.className = 'item-drop-toast';
  toast.style.borderColor = color;
  toast.style.boxShadow = `0 0 40px ${color}`;
  toast.innerHTML = `
    <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:${color};letter-spacing:2px;text-align:center;margin-bottom:6px;">
      ★ ${rarityName.toUpperCase()} ITEM DROP ★
    </div>
    <div style="text-align:center;">
      <span style="font-size:36px;">${item.icon}</span>
    </div>
    <div style="text-align:center;font-weight:700;color:${color};margin-top:6px;">${item.name}</div>
    <div style="text-align:center;font-size:11px;color:var(--text-dim);margin-top:4px;">

// === SHOP ===
function refreshShop() {
  career.shopState.items = [];
  // 8 random items: 4 common, 3 rare, 1 epic
  const byRarity = { common: [], rare: [], epic: [], legendary: [] };
  for (const [id, it] of Object.entries(ITEMS)) byRarity[it.rarity].push(id);
  const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
  const pick = (arr, n) => shuffle(arr).slice(0, n);
  career.shopState.items = [
    ...pick(byRarity.common, 4),
    ...pick(byRarity.rare, 3),
    ...pick(byRarity.epic, 1)
  ];
  career.shopState.lastRefresh = Date.now();
  saveCareer();
}

function buyItem(itemId) {
  const item = ITEMS[itemId];
  if (!item) return;
  const price = RARITY_INFO[item.rarity].price;
  if (career.bankroll < price) {
    alert(`자금 부족! 필요: $${price.toLocaleString()}, 보유: $${career.bankroll.toLocaleString()}`);
    return;
  }
  career.bankroll -= price;
  career.inventory.items.push(itemId);
  // Remove from shop
  career.shopState.items = career.shopState.items.filter(id => id !== itemId);
  saveCareer();
  openInventoryMenu();
}

function equipItem(itemId) {
  const item = ITEMS[itemId];
  if (!item) return;
  career.inventory.equipped[item.slot] = itemId;
  // If card deck, unlock card back
  if (item.cardBackId && !career.unlockedCardBacks?.includes(item.cardBackId)) {
    if (!career.unlockedCardBacks) career.unlockedCardBacks = ['basic'];
    career.unlockedCardBacks.push(item.cardBackId);
    career.cardBack = item.cardBackId;
  } else if (item.cardBackId) {
    career.cardBack = item.cardBackId;
  }
  saveCareer();
  openInventoryMenu();
}

function unequipSlot(slot) {
  delete career.inventory.equipped[slot];
  saveCareer();
  openInventoryMenu();
}

function setAvatar(avatarId) {
  career.character.avatar = avatarId;
  saveCareer();
  openInventoryMenu();
}

  return html;
}

function cardBackPreview(id) {
  const cb = CARD_BACKS[id];
  switch (cb.pattern) {
    case 'gradient': return `background:linear-gradient(135deg,${cb.color},#2a1a4a)`;
    case 'lattice':  return `background:repeating-linear-gradient(45deg,${cb.color},${cb.color} 4px,#000 4px,#000 8px)`;
    case 'grid':     return `background:linear-gradient(${cb.color}22,${cb.color}22),repeating-linear-gradient(0deg,#000,#000 6px,${cb.color}66 6px,${cb.color}66 7px),repeating-linear-gradient(90deg,#000,#000 6px,${cb.color}66 6px,${cb.color}66 7px)`;
    case 'diamond':  return `background:radial-gradient(circle at 50% 50%,${cb.color},#1a1a1a 70%);box-shadow:inset 0 0 12px ${cb.color}`;
    case 'crosshatch': return `background:${cb.color};background-image:repeating-linear-gradient(45deg,transparent 0,transparent 3px,${cb.color}99 3px,${cb.color}99 6px),repeating-linear-gradient(-45deg,transparent 0,transparent 3px,#33333399 3px,#33333399 6px)`;
    default: return `background:${cb.color}`;
  }
}

// Initialize abilities in career if not present
function ensureAbilities() {
  if (!career.pokerAbilities) {
    career.pokerAbilities = {
      insight:   { lv: 1, xp: 0 },
      pokerFace: { lv: 1, xp: 0 },
      bluff:     { lv: 1, xp: 0 },
      exploit:   { lv: 1, xp: 0 },
      mental:    { lv: 1, xp: 0 },
      patience:  { lv: 1, xp: 0 },
      math:      { lv: 1, xp: 0 },
      pressure:  { lv: 1, xp: 0 }
    };
  }
  if (!career.specialAbilities) {
    career.specialAbilities = { collected: [], active: null };
  }
}

function xpForNextLevel(lv) { return lv * 50; }

function gainXP(stat, amount, reason) {
  ensureAbilities();
  if (!career.pokerAbilities[stat]) return;
  // Apply XP multiplier from special ability
  const eff = getActiveEffects();
  const mult = eff.xpMultiplier || 1;
  const finalAmt = Math.round(amount * mult);
  const a = career.pokerAbilities[stat];
  a.xp += finalAmt;
  let leveledUp = false;
  while (a.xp >= xpForNextLevel(a.lv) && a.lv < 100) {
    a.xp -= xpForNextLevel(a.lv);
    a.lv++;
    leveledUp = true;
  }
  if (state && state.log) {
    state.log.push({
      text: `${ABILITY_DEFS[stat].icon} ${ABILITY_DEFS[stat].name} +${finalAmt} XP${reason ? ' ('+reason+')' : ''}`,
      highlight: false,
      system: true
    });
    if (leveledUp) {
      state.log.push({
        text: `✨ ${ABILITY_DEFS[stat].icon} ${ABILITY_DEFS[stat].name} Lv${a.lv} 달성!`,
        highlight: true,
        system: false
      });
      sfxLevelUp();
      updateChallengeProgress('level_up');
    }
  }
  saveCareer();
}

function getActiveEffects() {
  const active = career.specialAbilities?.active;
  if (!active || !SPECIAL_ABILITIES[active]) return {};
  return SPECIAL_ABILITIES[active].effects || {};
}

function getEffectiveAbility(stat) {
  ensureAbilities();
  const base = career.pokerAbilities[stat].lv;
  const eff = getActiveEffects();
  const bonus = (eff[stat] || 0) + (eff.all || 0);
  return base + bonus;
}

// AI pseudo-abilities based on skill + personality
function getAIAbility(p, stat) {
  if (!p || p.isHuman) return null;
  const skill = p.skill || 0.5;
  const personality = PERSONALITIES[p.personalityType] || {};
  const baseFromSkill = Math.round(skill * 80);
  switch (stat) {
    case 'pokerFace':
      // Maniac/LAG show their hand. Pros hide.
      if (p.personalityType === 'MANIAC') return Math.round(baseFromSkill * 0.4);
      if (p.personalityType === 'CALL_STATION') return Math.round(baseFromSkill * 0.6);
      if (p.personalityType === 'PRO' || p.personalityType === 'GTO_BOT') return Math.round(baseFromSkill * 1.1);
      return baseFromSkill;
    case 'insight':
      return baseFromSkill;
    case 'bluff':
      return Math.round(personality.bluffFreq ? personality.bluffFreq * 200 : baseFromSkill);
    case 'mental':
      return Math.round((1 - (personality.tiltSus || 0.3)) * 100);
    default:
      return baseFromSkill;
  }
}

// Read computation: Insight vs PokerFace
function computeRead(target) {
  if (!target || target.isHuman) return null;
  if (target.folded || target.busted) return null;
  const myInsight = getEffectiveAbility('insight');
  const targetFace = getAIAbility(target, 'pokerFace');
  let gap = myInsight - targetFace;

  // Hand progress bonus (more info per street)
  const streetIdx = ['preflop','flop','turn','river','showdown'].indexOf(state?.street || 'preflop');
  gap += streetIdx * 4;

  // Aggressive action bonus (raises reveal strength)
  if (target.totalBet > (state?.bb || 10) * 8) gap += 8;
  if (target.totalBet > (state?.bb || 10) * 20) gap += 6;

  // earlyRead special: Negreanu — see ahead by one street
  const eff = getActiveEffects();
  if (eff.earlyRead) gap += 12;

  if (gap < 12) return null;

  // Get target's actual hand strength to fabricate accurate read
  let actualStrength = 50;
  if (target.cards && target.cards.length === 2) {
    if (state.communityCards && state.communityCards.length >= 3) {
      actualStrength = postflopStrength(target.cards, state.communityCards);
    } else {
      actualStrength = preflopStrength(target.cards);
    }
  }

  let confidence, text;
  if (gap < 25) {
    confidence = 'low';
    text = actualStrength > 55 ? '강해 보임' : '약해 보임';
  } else if (gap < 45) {
    confidence = 'medium';
    if (actualStrength > 80) text = '프리미엄급';
    else if (actualStrength > 60) text = '톱페어 이상';
    else if (actualStrength > 40) text = '미들페어급';
    else text = '약한 핸드';
  } else if (gap < 65) {
    confidence = 'high';
    if (actualStrength > 85) text = '셋 또는 그 이상';
    else if (actualStrength > 70) text = '톱페어 톱키커';
    else if (actualStrength > 55) text = '탑페어';
    else if (actualStrength > 40) text = '미들/낮은 페어';
    else if (actualStrength > 25) text = '드로우';
    else text = '에어 (블러프?)';
  } else {
    confidence = 'very_high';
    // Near-perfect read
    if (actualStrength > 90) text = '너트급';
    else if (actualStrength > 75) text = '톱페어+';
    else if (actualStrength > 55) text = '미들 강도';
    else if (actualStrength > 35) text = '드로우/약함';
    else text = '에어 99% 블러프';
  }
  return { confidence, text, gap: Math.round(gap) };
}

function getRarityColor(r) { return RARITY_COLORS[r] || RARITY_COLORS.common; }

// Attempt absorption when a famous player busts
function checkFamousBust() {
  if (!state) return;
  for (const p of state.players) {
    if (p.isFamous && p.busted && !p._absorbChecked && !p.isHuman) {
      p._absorbChecked = true;
      // Match famousData.name to SPECIAL_ABILITIES key by owner
      const famousName = p.famousData ? p.famousData.name : null;
      let abilityKey = null;
      for (const [key, ab] of Object.entries(SPECIAL_ABILITIES)) {
        if (ab.owner === famousName || ab.owner === p.famousData?.name) {
          abilityKey = key;
          break;
        }
      }
      if (!abilityKey) continue;
      if (career.specialAbilities.collected.includes(abilityKey)) {
        log(`🔁 ${p.name} 격파! 이미 보유한 능력 (${SPECIAL_ABILITIES[abilityKey].name})`, true);
        continue;
      }
      // Trigger absorb modal
      setTimeout(() => showAbsorbModal(abilityKey, p), 800);
      // Bonus item drop on famous knockout
      setTimeout(() => tryFamousKnockoutDrop(), 1500);
      // Challenge progress
      updateChallengeProgress('beat_famous');
      // Onboarding for first famous encounter
      checkTutorial('famous_first');
    }
  }
}

function absorbAbility(key) {
  if (!career.specialAbilities.collected.includes(key)) {
    career.specialAbilities.collected.push(key);
    // Auto-equip first ability
    if (!career.specialAbilities.active) {
      career.specialAbilities.active = key;
    }
    saveCareer();
    const ab = SPECIAL_ABILITIES[key];
    if (state) log(`✨ ${ab.icon} ${ab.name} 능력 흡수 완료!`, true);
  }
  closeModal();
}

function equipSpecial(key) {
  career.specialAbilities.active = key;

  openAbilityMenu();

function unequipSpecial() {
  career.specialAbilities.active = null;

  openAbilityMenu();

function showAbilityDetail(stat) {
  ensureAbilities();
  const def = ABILITY_DEFS[stat];
  const tut = ABILITY_TUTORIALS[stat];
  if (!def || !tut) return;
  const a = career.pokerAbilities[stat];
  const eff = getActiveEffects();
  const bonus = (eff[stat] || 0) + (eff.all || 0);
  const effective = a.lv + bonus;
  const needXp = xpForNextLevel(a.lv);
  const pctXp = Math.min(100, (a.xp / needXp) * 100);
  const typeColor = { attack: '#ff5b5b', defense: '#5fb8d4', utility: '#a8ff7a' }[def.type];
  const typeLabel = { attack: '공격', defense: '방어', utility: '유틸리티' }[def.type];
  const counterLabel = def.counter ? ABILITY_DEFS[def.counter]?.name : null;

  const highList = tut.high.map(h => `<li style="margin:6px 0;line-height:1.6;">${h}</li>`).join('');
  const trainList = tut.train.map(t => `<li style="margin:6px 0;line-height:1.6;">${t}</li>`).join('');

  const html = `<div style="padding:8px 4px;">
    <h3 style="color:${typeColor};letter-spacing:1px;">${tut.title}</h3>
    <div style="display:inline-block;font-size:11px;background:${typeColor}22;color:${typeColor};padding:3px 10px;border-radius:4px;letter-spacing:2px;text-transform:uppercase;font-weight:700;">${typeLabel}</div>
    ${counterLabel ? `<span style="font-size:11px;color:var(--text-dim);margin-left:8px;">⚔️ 카운터: ${counterLabel}</span>` : ''}

    <div style="background:var(--bg-card-2);border-radius:8px;padding:12px;margin:14px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--text-dim);">현재 레벨</span>
        <span style="font-family:'Press Start 2P','Galmuri11',monospace;font-size:18px;color:var(--gold-bright);">Lv ${a.lv}${bonus > 0 ? ` <span style="color:${typeColor};font-size:14px;">+${bonus}</span> <span style="color:var(--text-dim);font-size:13px;">= ${effective}</span>` : ''}</span>
      </div>
      <div style="background:var(--bg-darker);height:10px;border-radius:5px;overflow:hidden;margin:8px 0 4px;">
        <div style="background:linear-gradient(90deg, ${typeColor} 0%, ${typeColor}aa 100%);height:100%;width:${pctXp}%;transition:width 0.3s;"></div>
      </div>
      <div style="font-size:11px;color:var(--text-dim);text-align:right;">${a.xp} / ${needXp} XP (다음 레벨까지 ${needXp - a.xp} XP)</div>
    </div>

    <h4 style="color:var(--gold-bright);margin-top:14px;font-size:14px;">📖 이 능력은 뭐야?</h4>
    <p style="font-size:13px;line-height:1.7;color:var(--text);">${tut.what}</p>

    <h4 style="color:var(--gold-bright);margin-top:18px;font-size:14px;">📈 높았을 때 효과</h4>
    <ul style="font-size:12px;color:var(--text);padding-left:20px;">${highList}</ul>

    <h4 style="color:var(--gold-bright);margin-top:18px;font-size:14px;">🎯 어떻게 훈련해?</h4>
    <ul style="font-size:12px;color:var(--text);padding-left:20px;">${trainList}</ul>

    <div style="text-align:center;margin-top:20px;display:flex;gap:8px;justify-content:center;">
      <button onclick="openAbilityMenu()" style="padding:10px 18px;font-size:12px;">← 능력 목록</button>
      <button class="btn-primary" onclick="closeModal()" style="padding:10px 18px;font-size:12px;">닫기</button>
    </div>
  </div>`;
  showModal(html);
}

let currentMatrixScenario = 'utg';

function openGTOMatrix() {
  const data = GTO_MATRIX[currentMatrixScenario];

  let scenarioTabs = '';
  for (const [id, info] of Object.entries(GTO_MATRIX)) {
    const active = id === currentMatrixScenario;
    scenarioTabs += `<button onclick="switchMatrix('${id}')" style="padding:6px 12px;font-size:11px;${active ? 'background:var(--gold-bright);color:var(--bg-deep);border-color:var(--gold-bright);font-weight:700;' : ''}">${info.name}</button>`;
  }

  // Color schemes
  const colorByAction = {
    'R': { bg: '#c0392b', text: '#fff', label: '레이즈' },
    'C': { bg: '#27ae60', text: '#fff', label: '콜' },
    'M': { bg: '#f39c12', text: '#fff', label: '믹스' },
    'F': { bg: '#1a2230', text: '#5a6a85', label: '폴드' }
  };

  let gridHtml = `<table class="gto-matrix" style="border-collapse:collapse;margin:0 auto;font-family:'Press Start 2P','Galmuri11',monospace;">`;
  gridHtml += `<tr><th style="width:22px;"></th>`;
  for (const r of HAND_RANK_ORDER) {
    gridHtml += `<th style="padding:3px;font-size:10px;color:var(--gold-bright);width:32px;text-align:center;">${r}</th>`;
  }
  gridHtml += `</tr>`;

  let counts = { R: 0, C: 0, M: 0, F: 0 };
  for (let i = 0; i < 13; i++) {
    gridHtml += `<tr><th style="padding:3px;font-size:10px;color:var(--gold-bright);text-align:center;">${HAND_RANK_ORDER[i]}</th>`;
    for (let j = 0; j < 13; j++) {
      const action = data.grid[i].charAt(j);
      counts[action] = (counts[action] || 0) + 1;
      let hand;
      if (i === j) hand = HAND_RANK_ORDER[i] + HAND_RANK_ORDER[i];
      else if (j > i) hand = HAND_RANK_ORDER[i] + HAND_RANK_ORDER[j] + 's';
      else hand = HAND_RANK_ORDER[j] + HAND_RANK_ORDER[i] + 'o';

      const c = colorByAction[action] || colorByAction['F'];
      // Pair cells slightly highlighted
      const borderStyle = (i === j) ? 'border:2px solid #ffd93d;' : 'border:1px solid rgba(0,0,0,0.3);';
      gridHtml += `<td style="background:${c.bg};color:${c.text};padding:5px 2px;font-size:9px;font-weight:700;text-align:center;${borderStyle}width:32px;height:26px;line-height:1;" title="${hand} → ${c.label}">${hand}</td>`;
    }
    gridHtml += `</tr>`;
  }
  gridHtml += `</table>`;

  // Stats
  const total = 169;
  const playCount = counts.R + counts.M + counts.C;
  const playPct = ((playCount / total) * 100).toFixed(0);

  const legend = `<div style="display:flex;gap:8px;justify-content:center;margin-top:14px;font-size:11px;flex-wrap:wrap;">
    <span style="display:flex;align-items:center;gap:4px;"><span style="background:#c0392b;color:#fff;padding:3px 8px;border-radius:3px;font-weight:700;">R</span> 레이즈 (${counts.R || 0})</span>

    <span style="display:flex;align-items:center;gap:4px;"><span style="background:#27ae60;color:#fff;padding:3px 8px;border-radius:3px;font-weight:700;">C</span> 콜 (${counts.C || 0})</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="background:#1a2230;color:#5a6a85;padding:3px 8px;border-radius:3px;font-weight:700;">F</span> 폴드 (${counts.F || 0})</span>
  </div>`;

  const html = `<h3>🎯 GTO 핸드 매트릭스</h3>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 14px;">${scenarioTabs}</div>
  <div style="margin-bottom:10px;padding:10px 14px;background:var(--bg-card-2);border-radius:6px;border:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
      <strong style="font-size:15px;color:var(--gold-bright);">${data.name}</strong>
      <span style="font-size:12px;color:var(--text-dim);">참가율 <b style="color:var(--gold-bright);">${playPct}%</b> · 표기 ${data.pct}</span>
    </div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.5;">${data.desc}</div>
  </div>
  <div style="overflow-x:auto;padding:8px 0;">${gridHtml}</div>
  ${legend}
  <p style="font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center;line-height:1.5;">
    <b>대각선</b> = 페어 (골드 보더) · <b>우상단 삼각형</b> = 수티드 · <b>좌하단 삼각형</b> = 오프수트<br>

  </p>
  <div style="text-align:center;margin-top:14px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

let gtoStats = { total: 0, correct: 0, byCategory: {} };
try {
  const s = localStorage.getItem('holdem-gto-stats');
  if (s) gtoStats = JSON.parse(s);
} catch (e) {}

function saveGtoStats() {
  try { localStorage.setItem('holdem-gto-stats', JSON.stringify(gtoStats)); } catch (e) {}
}

let currentQuiz = null;

function openGTOQuiz() {
  const catNames = {
    preflop: { icon: '📍', name: '프리플랍 핸드 차트', desc: '포지션별 오픈/콜/3-bet 결정' },
    postflop: { icon: '🎲', name: '포스트플랍 시츄에이션', desc: 'C-bet, 체크-레이즈, 드로우 플레이' },
    potodds: { icon: '📐', name: '팟 오즈 & MDF', desc: '필요 에쿼티 계산 마스터' },
    bluffcatch: { icon: '🎭', name: '블러프 캐치', desc: '상대 라인 읽기 + 익스플로잇' }
  };
  let catsHtml = '';
  for (const [id, info] of Object.entries(catNames)) {
    const stat = gtoStats.byCategory[id];
    const accuracy = stat && stat.total > 0 ? Math.round(stat.correct / stat.total * 100) : null;
    catsHtml += `<button onclick="startQuiz('${id}')" style="padding:14px;text-align:left;width:100%;border-radius:8px;display:flex;align-items:center;gap:12px;">
      <div style="font-size:24px;">${info.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;color:var(--text);">${info.name}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:3px;">${info.desc}</div>
        ${accuracy !== null ? `<div style="font-size:11px;color:var(--gold-bright);margin-top:4px;">${stat.correct}/${stat.total} 정답 (${accuracy}%)</div>` : ''}
      </div>
    </button>`;
  }
  const overallAccuracy = gtoStats.total > 0 ? Math.round(gtoStats.correct / gtoStats.total * 100) : 0;
  const html = `<h3>🎓 GTO 공부 — 상황별 퀴즈</h3>
    <p style="color:var(--text-dim);font-size:13px;">실전 시츄에이션 기반 의사결정 훈련</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;">${catsHtml}</div>
    <div style="margin-top:18px;padding:12px;background:var(--bg-card-2);border-radius:8px;text-align:center;">
      <div style="font-size:11px;color:var(--text-dim);">전체 통계</div>
      <div style="font-weight:700;font-size:16px;margin-top:4px;color:var(--gold-bright);">${gtoStats.correct} / ${gtoStats.total} <span style="color:var(--text);font-size:13px;">(${overallAccuracy}%)</span></div>
    </div>
    <div style="text-align:center;margin-top:14px;"><button onclick="closeModal()">닫기</button></div>`;
  showModal(html);
}

function startQuiz(category) {
  const questions = GTO_QUIZ_DATA[category];
  if (!questions || questions.length === 0) return;
  const q = questions[Math.floor(Math.random() * questions.length)];
  currentQuiz = { category, q, answered: false, chosen: -1 };
  renderQuiz();
}

function renderQuiz() {
  const { category, q, answered, chosen } = currentQuiz;
  const catNames = { preflop: '프리플랍', postflop: '포스트플랍', potodds: '팟 오즈 / MDF', bluffcatch: '블러프 캐치' };
  let optsHtml = q.opts.map((opt, i) => {
    let extra = '';
    if (answered) {
      if (i === q.correct) extra = 'background:rgba(110,208,126,0.18);border:2px solid var(--green);color:var(--green);';
      else if (i === chosen) extra = 'background:rgba(255,91,91,0.18);border:2px solid var(--red);color:var(--red);';
    }
    return `<button onclick="answerQuiz(${i})" ${answered ? 'disabled' : ''} style="padding:12px;text-align:left;width:100%;border-radius:6px;${extra}">
      ${String.fromCharCode(65 + i)}. ${opt}
    </button>`;
  }).join('');

  let html = `<h3>🎓 ${catNames[category]} 퀴즈</h3>
  <div style="background:var(--bg-card-2);padding:16px;border-radius:8px;margin:14px 0;border:1px solid var(--border);">
    <div style="font-size:14px;line-height:1.7;">${q.q}</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;">${optsHtml}</div>`;

  if (answered) {
    const isCorrect = chosen === q.correct;
    html += `<div style="margin-top:14px;padding:14px;background:${isCorrect ? 'rgba(110,208,126,0.1)' : 'rgba(255,91,91,0.1)'};border:1px solid ${isCorrect ? 'var(--green)' : 'var(--red)'};border-radius:8px;">
      <div style="font-weight:700;font-size:14px;color:${isCorrect ? 'var(--green)' : 'var(--red)'};margin-bottom:8px;">
        ${isCorrect ? '✓ 정답!' : '✗ 오답'}
      </div>
      <div style="font-size:13px;line-height:1.7;color:var(--text);">${q.explain}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-primary" onclick="startQuiz('${category}')" style="flex:1;">▶ 다음 문제</button>
      <button onclick="openGTOQuiz()" style="flex:1;">메뉴로</button>
    </div>`;
  } else {
    html += `<div style="text-align:center;margin-top:14px;"><button onclick="openGTOQuiz()">취소</button></div>`;
  }
  showModal(html);
}

function answerQuiz(chosen) {
  if (!currentQuiz || currentQuiz.answered) return;
  currentQuiz.answered = true;
  currentQuiz.chosen = chosen;
  gtoStats.total++;
  const cat = currentQuiz.category;
  if (!gtoStats.byCategory[cat]) gtoStats.byCategory[cat] = { total: 0, correct: 0 };
  gtoStats.byCategory[cat].total++;
  if (chosen === currentQuiz.q.correct) {
    gtoStats.correct++;
    gtoStats.byCategory[cat].correct++;
  }
  saveGtoStats();
  renderQuiz();
}

// ===================== FIREBASE CLOUD SYNC =====================
// 👇 여기에 본인 Firebase 프로젝트 설정 입력 (Firebase Console → 프로젝트 설정 → 일반 → 내 앱)
const FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};

let firebaseReady = false;
let firebaseUser = null;
let firebaseDb = null;
let firebaseSyncEnabled = false;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) {
    return; // not configured
  }
  try {
    if (!window.firebase) {
      await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');
    }
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    firebaseDb = firebase.firestore();
    firebase.auth().onAuthStateChanged(async (user) => {
      firebaseUser = user;
      firebaseReady = !!user;
      if (user) {
        await loadFromCloud();
        firebaseSyncEnabled = true;
      }
      updateCloudStatus();
    });
    await firebase.auth().signInAnonymously();
  } catch (e) {
    console.error('Firebase 초기화 실패:', e);
    updateCloudStatus(e.message);
  }
}

async function loadFromCloud() {
  if (!firebaseUser || !firebaseDb) return;
  try {
    const doc = await firebaseDb.collection('careers').doc(firebaseUser.uid).get();
    if (doc.exists) {
      const cloudData = doc.data();
      const cloudHands = cloudData.handsPlayed || 0;
      const localHands = career.handsPlayed || 0;
      // Use cloud version if it has more progress, otherwise keep local
      if (cloudHands >= localHands) {
        career = Object.assign({}, career, cloudData);
        // Ensure nested objects exist
        if (!career.stats || typeof career.stats !== 'object') career.stats = {};
        if (!career.recentHands) career.recentHands = [];
        saveCareer();
        renderLobby();
        showSaveToast('☁️ 클라우드 데이터 불러옴 (' + cloudHands + ' 핸드)');
      } else {
        // Local is newer, push to cloud
        saveToCloud(true);
      }
    } else {
      // First time - push local to cloud
      saveToCloud(true);
    }
  } catch (e) {
    console.error('클라우드 불러오기 실패:', e);
  }
}

async function saveToCloud(silent = false) {
  if (!firebaseUser || !firebaseDb || !firebaseSyncEnabled) return;
  try {
    await firebaseDb.collection('careers').doc(firebaseUser.uid).set({
      ...career,
      _lastSync: Date.now(),
      _uid: firebaseUser.uid
    });
    if (!silent) showSaveToast('☁️ 클라우드 저장 완료');
  } catch (e) {
    console.error('클라우드 저장 실패:', e);
    if (!silent) showSaveToast('⚠️ 클라우드 저장 실패');
  }
}

function manualCloudSync() {
  if (!firebaseReady) {
    if (!FIREBASE_CONFIG.apiKey) {
      alert('Firebase 설정이 필요합니다.\n\n파일을 열어 FIREBASE_CONFIG 블록에 본인의 Firebase 프로젝트 정보를 입력하세요.\n\nFirebase Console → 프로젝트 설정 → 일반 → 내 앱에서 확인 가능합니다.');
    } else {
      alert('Firebase 연결 중... 잠시 후 다시 시도해주세요.');
    }
    return;
  }
  saveToCloud(false);
}

function updateCloudStatus(errMsg) {
  const el = document.getElementById('cloud-status');
  if (!el) return;
  if (!FIREBASE_CONFIG.apiKey) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">☁️ 클라우드 동기화 비활성 (Firebase 설정 필요)</span>';
  } else if (firebaseReady && firebaseUser) {
    const shortUid = firebaseUser.uid.substring(0, 8);
    el.innerHTML = `<span style="color:var(--green);font-size:12px;">☁️ 클라우드 연결됨 (UID: ${shortUid}...)</span>`;
  } else if (errMsg) {
    el.innerHTML = `<span style="color:var(--red);font-size:12px;">⚠️ ${errMsg}</span>`;
  } else {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">☁️ 연결 중...</span>';
  }
}

// Auto-save to cloud on key events (wraps saveCareer)
(function() {
  const _originalSaveCareer = saveCareer;
  let _cloudTimer = null;
  window.saveCareer = function() {
    _originalSaveCareer();
    if (firebaseSyncEnabled) {
      clearTimeout(_cloudTimer);
      _cloudTimer = setTimeout(() => saveToCloud(true), 5000);
    }
  };
})();

// ===================== Init =====================
loadCareer();
renderLobby();
initFirebase();
</script>
</body>
</html>
